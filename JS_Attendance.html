// صفحة التأخر والاستئذان (النسخة النهائية)

var attPermissionRecords = [];

// =================================================================
// قوائم الاستئذان
// =================================================================
var PERMISSION_REASONS = ['ظرف صحي', 'ظرف أسري', 'موعد حكومي', 'طلب ولي الأمر'];
var PERMISSION_RECEIVERS = ['الأب', 'الأخ', 'الأم', 'الجد', 'العم', 'آخر'];
var PERMISSION_RESPONSIBLES = ['الموجه الطلابي', 'الوكيل', 'المدير'];
var LATE_PERIODS = ['الأولى', 'الثانية', 'الثالثة', 'الرابعة', 'الخامسة', 'السادسة', 'السابعة'];
var DAYS_AR = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

// =================================================================
// دالة استخراج اليوم من التاريخ
// =================================================================
function getDayNameFromDate(dateStr) {
    if (!dateStr) return '';
    try {
        // التاريخ يأتي بصيغة yyyy/MM/dd HH:mm
        var parts = dateStr.split(' ')[0].split('/');
        if (parts.length < 3) return '';
        var date = new Date(parts[0], parts[1] - 1, parts[2]);
        return DAYS_AR[date.getDay()] || '';
    } catch (e) {
        return '';
    }
}

// =================================================================
// دالة استخراج الوقت فقط
// =================================================================
function getTimeOnly(dateStr) {
    if (!dateStr) return '-';
    try {
        var parts = dateStr.split(' ');
        return parts[1] || dateStr;
    } catch (e) {
        return dateStr;
    }
}

// =================================================================
// 2. تبديل التبويبات
// =================================================================
function switchAttTab(tab) {
    attCurrentTab = tab;
    
    document.querySelectorAll('[id^="att-tab-"]').forEach(function(btn) {
        if (btn.id === 'att-tab-content') return;
        btn.classList.remove('border-red-500', 'border-purple-500', 'border-gray-500', 'text-red-600', 'text-purple-600', 'text-gray-700', 'bg-red-50', 'bg-purple-50', 'bg-gray-50');
        btn.classList.add('border-transparent', 'text-gray-500');
    });
    
    var activeBtn = document.getElementById('att-tab-' + tab);
    if (tab === 'late') {
        activeBtn.classList.add('border-red-500', 'text-red-600', 'bg-red-50');
    } else if (tab === 'permission') {
        activeBtn.classList.add('border-purple-500', 'text-purple-600', 'bg-purple-50');
    } else {
        activeBtn.classList.add('border-gray-500', 'text-gray-700', 'bg-gray-50');
    }
    activeBtn.classList.remove('border-transparent', 'text-gray-500');
    
    if (tab === 'late') {
        renderLateTab();
    } else if (tab === 'permission') {
        renderPermissionTab();
    } else {
        renderArchiveTab();
    }
}

    var today = new Date();
    var weekAgo = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
    document.getElementById('archive-to').value = today.toISOString().split('T')[0];
    document.getElementById('archive-from').value = weekAgo.toISOString().split('T')[0];
}

function loadArchive() {
    var type = document.getElementById('archive-type').value;
    var dateFrom = document.getElementById('archive-from').value;
    var dateTo = document.getElementById('archive-to').value;

    if (!dateFrom || !dateTo) {
        showEnhancedToast('warning', 'يرجى تحديد تاريخ البداية والنهاية');
        return;
    }

    var container = document.getElementById('archive-content');
    container.innerHTML = `
        <div class="text-center py-16">
            <div class="loading-bar mx-auto"><div class="loading-bar-progress"></div></div>
            <p class="text-gray-500 mt-4">جاري تحميل الأرشيف...</p>
        </div>
    `;
    
    var func = type === 'late' ? 'getLateArchive' : 'getPermissionArchive';
    
    google.script.run.withSuccessHandler(function(result) {
        if (result && result.success) {
            displayArchive(result.records || [], type);
        } else {
            displayArchive([], type);
        }
    }).withFailureHandler(function(err) {
        console.log('خطأ:', err);
        displayArchive([], type);
    })[func](currentStage, dateFrom, dateTo);
}

function displayArchive(records, type) {
    var container = document.getElementById('archive-content');
    
    if (records.length === 0) {
        container.innerHTML = `
            <div class="text-center py-16">
                <span class="material-symbols-outlined text-gray-300 text-6xl">search_off</span>
                <p class="text-gray-500 mt-3">لا توجد سجلات في هذه الفترة</p>
            </div>
        `;
        return;
    }
    
    var isLate = type === 'late';
    var colorClass = isLate ? 'red' : 'purple';
    
    var html = '<div class="overflow-x-auto"><table class="min-w-full divide-y divide-gray-200">';
    html += `
        <thead class="bg-${colorClass}-50">
            <tr>
                <th class="px-4 py-3 text-right text-xs font-bold text-gray-600">الطالب</th>
                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600">الصف</th>
                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600">اليوم والتاريخ</th>
                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600">${isLate ? 'نوع التأخر' : 'وقت الخروج'}</th>
                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600">${isLate ? 'الحصة' : 'السبب'}</th>
                <th class="px-4 py-3 text-center text-xs font-bold text-gray-600">المسجل</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
    `;
    
    records.forEach(function(rec) {
        var dayName = getDayNameFromDate(rec['وقت_الإدخال']);
        var hijriDate = rec['التاريخ_هجري'] || '';
        var dateDisplay = dayName + ' ' + hijriDate;
        
        html += `
            <tr class="hover:bg-gray-50">
                <td class="px-4 py-3 font-bold text-gray-800">${escapeHtml(rec['اسم_الطالب'] || '')}</td>
                <td class="px-4 py-3 text-center text-sm">${escapeHtml(rec['الصف'] || '')} / ${escapeHtml(rec['الفصل'] || '')}</td>
                <td class="px-4 py-3 text-center text-sm text-gray-600">${escapeHtml(dateDisplay)}</td>
                <td class="px-4 py-3 text-center">
                    <span class="px-2 py-1 bg-${colorClass}-100 text-${colorClass}-700 rounded text-xs font-bold">
                        ${escapeHtml(isLate ? (rec['نوع_التأخر'] || 'صباحي') : (rec['وقت_الخروج'] || '-'))}
                    </span>
                </td>
                <td class="px-4 py-3 text-center text-sm text-gray-600">${escapeHtml(isLate ? (rec['الحصة'] || '-') : (rec['السبب'] || '-'))}</td>
                <td class="px-4 py-3 text-center text-sm text-gray-500">${escapeHtml(rec['المسجل'] || '')}</td>
            </tr>
        `;
    });
    
    html += '</tbody></table></div>';
    html += `<div class="mt-4 text-center text-sm text-gray-500">إجمالي السجلات: <span class="font-bold">${records.length}</span></div>`;
    
    container.innerHTML = html;
}

// =================================================================
// 11. تعبئة القوائم
// =================================================================
function populateAttGrades(prefix) {
    var grades = [];
    var seen = {};
    APP_DATA.students.filter(function(s) { return s['المرحلة'] === currentStage; }).forEach(function(s) {
        if (!seen[s['الصف']]) {
            seen[s['الصف']] = true;
            grades.push(s['الصف']);
        }
    });
    
    var gradeOrder = ["أول", "ثاني", "ثالث"];
    grades.sort(function(a, b) {
        var indexA = gradeOrder.findIndex(function(key) { return a.includes(key); });
        var indexB = gradeOrder.findIndex(function(key) { return b.includes(key); });
        return indexA - indexB;
    });
    
    var select = document.getElementById(prefix + '-grade');
    select.innerHTML = '<option value="">اختر الصف</option>';
    grades.forEach(function(g) { select.add(new Option(g, g)); });
}

function handleLateGradeChange() { handleAttGradeChange('late'); }
function handlePermGradeChange() { handleAttGradeChange('perm'); }

function handleAttGradeChange(prefix) {
    var grade = document.getElementById(prefix + '-grade').value;
    var classSelect = document.getElementById(prefix + '-class');
    var studentSelect = document.getElementById(prefix + '-students');
    
    classSelect.innerHTML = '<option value="">اختر الفصل</option>';
    studentSelect.innerHTML = '<option value="">اختر الطلاب</option>';
    classSelect.disabled = !grade;
    studentSelect.disabled = true;
    
    if (grade) {
        var classes = [];
        var seen = {};
        APP_DATA.students.filter(function(s) {
            return s['المرحلة'] === currentStage && s['الصف'] === grade;
        }).forEach(function(s) {
            if (!seen[s['الفصل']]) {
                seen[s['الفصل']] = true;
                classes.push(s['الفصل']);
            }
        });
        classes.sort();
        classes.forEach(function(c) { classSelect.add(new Option(c, c)); });
    }
}

function handleLateClassChange() { handleAttClassChange('late'); }
function handlePermClassChange() { handleAttClassChange('perm'); }

function handleAttClassChange(prefix) {
    var grade = document.getElementById(prefix + '-grade').value;
    var cls = document.getElementById(prefix + '-class').value;
    var studentSelect = document.getElementById(prefix + '-students');
    
    studentSelect.innerHTML = '';
    studentSelect.disabled = !cls;
    
    if (grade && cls) {
        var students = APP_DATA.students.filter(function(s) {
            return s['المرحلة'] === currentStage && s['الصف'] === grade && s['الفصل'] == cls;
        });
        students.sort(function(a, b) { return a['اسم الطالب'].localeCompare(b['اسم الطالب'], 'ar'); });
        students.forEach(function(s) {
            var opt = new Option(s['اسم الطالب'], s['رقم الطالب']);
            opt.dataset.name = s['اسم الطالب'];
            opt.dataset.grade = s['الصف'];
            opt.dataset.class = s['الفصل'];
            opt.dataset.phone = s['رقم الجوال'] || '';
            studentSelect.add(opt);
        });
    }
}

// =================================================================
function saveLateMultiple() {
    var lateType = document.querySelector('input[name="late-type"]:checked').value;
    var period = document.getElementById('late-period').value;
    var studentSelect = document.getElementById('late-students');
    var selectedOptions = Array.from(studentSelect.selectedOptions);
    
    if (selectedOptions.length === 0) {
        showEnhancedToast('warning', 'يرجى اختيار طالب واحد على الأقل');
        return;
    }
    
    if (lateType === 'تأخر حصة' && !period) {
        showEnhancedToast('warning', 'يرجى اختيار الحصة');
        return;
    }
    
    var students = selectedOptions.map(function(opt) {
        return {
            studentId: opt.value,
            studentName: opt.dataset.name,
            grade: opt.dataset.grade,
            class: opt.dataset.class,
            phone: opt.dataset.phone
        };
    });
    
    var data = {
        stage: currentStage,
        lateType: lateType,
        period: period,
        students: students
    };
    
    showEnhancedToast('info', 'جاري حفظ ' + students.length + ' طالب...');
    
    google.script.run.withSuccessHandler(function(res) {
        if (res.success) {
            showEnhancedToast('success', res.message);
            closeAttLateModal();
            loadTodayLateRecords();
            loadTodayStats();
        } else {
            showEnhancedToast('danger', 'خطأ: ' + res.error);
        }
    }).withFailureHandler(function(err) {
        showEnhancedToast('danger', 'خطأ: ' + err);
    }).saveLateRecords(data);
}

    var selectedOptions = Array.from(studentSelect.selectedOptions);
    
    if (selectedOptions.length === 0) {
        showEnhancedToast('warning', 'يرجى اختيار طالب واحد على الأقل');
        return;
    }
    
    if (!reason) {
        showEnhancedToast('warning', 'يرجى اختيار السبب');
        return;
    }
    
    if (!receiver) {
        showEnhancedToast('warning', 'يرجى اختيار المستلم');
        return;
    }
    
    if (!responsible) {
        showEnhancedToast('warning', 'يرجى اختيار المسؤول');
        return;
    }
    
    var students = selectedOptions.map(function(opt) {
        return {
            studentId: opt.value,
            studentName: opt.dataset.name,
            grade: opt.dataset.grade,
            class: opt.dataset.class,
            phone: opt.dataset.phone
        };
    });
    
    var data = {
        stage: currentStage,
        exitTime: exitTime,
        reason: reason,
        receiver: receiver,
        responsible: responsible,
        students: students
    };
    
    showEnhancedToast('info', 'جاري حفظ ' + students.length + ' طالب...');
    
    google.script.run.withSuccessHandler(function(res) {
        if (res.success) {
            showEnhancedToast('success', res.message);
            closeAttPermModal();
            loadTodayPermissionRecords();
            loadTodayStats();
        } else {
            showEnhancedToast('danger', 'خطأ: ' + res.error);
        }
    }).withFailureHandler(function(err) {
        showEnhancedToast('danger', 'خطأ: ' + err);
    }).savePermissionRecords(data);
}

// =================================================================

// =================================================================
function deleteAttRecord(type, rowIndex) {
    showStyledConfirm_({title: 'حذف السجل', message: 'هل تريد حذف هذا السجل؟', icon: 'delete', color: 'red', onConfirm: function() {

            else loadTodayPermissionRecords();

        }
    }).withFailureHandler(function(err) {
        showEnhancedToast('danger', 'خطأ في الاتصال: ' + (err.message || ''));
    })[func](currentStage, rowIndex);
    }});
}

// =================================================================
// 15. التحديد والإرسال
// =================================================================
function toggleAttSelectAll(type) {
    var checkboxClass = type === 'late' ? '.att-late-checkbox' : '.att-perm-checkbox';
    var selectAllId = type === 'late' ? 'att-late-select-all' : 'att-perm-select-all';
    var isChecked = document.getElementById(selectAllId).checked;
    document.querySelectorAll(checkboxClass).forEach(function(cb) { cb.checked = isChecked; });
}

function selectAllAttRecords(type) {
    var checkboxClass = type === 'late' ? '.att-late-checkbox' : '.att-perm-checkbox';
    document.querySelectorAll(checkboxClass).forEach(function(cb) { cb.checked = true; });
}

function openAttSendModal(type) {
    var checkboxClass = type === 'late' ? '.att-late-checkbox:checked' : '.att-perm-checkbox:checked';
    var selected = document.querySelectorAll(checkboxClass);
    
    if (selected.length === 0) {
        showEnhancedToast('warning', 'يرجى تحديد سجل واحد على الأقل');
        return;
    }
    
    var recipients = [];
    var recipientsHTML = [];
    
    selected.forEach(function(cb) {
        var phone = cb.dataset.phone;
        var name = cb.dataset.name;
        var idx = cb.dataset.index;
        var rowIndex = cb.dataset.row;
        
        recipients.push({ phone: phone, name: name, index: idx, type: type, rowIndex: rowIndex, grade: cb.dataset.grade || '', cls: cb.dataset.cls || '' });
        recipientsHTML.push('<span class="px-3 py-1 bg-white rounded-full text-sm text-gray-700 border">ولي أمر: ' + escapeHtml(name) + '</span>');
    });
    
    document.getElementById('att-send-recipients').innerHTML = recipientsHTML.join('');
    document.getElementById('att-send-count').innerText = recipients.length;
    document.getElementById('att-send-modal').dataset.recipients = JSON.stringify(recipients);
    document.getElementById('att-send-modal').dataset.type = type;
    
    var template = type === 'late' 
        ? 'السلام عليكم ورحمة الله وبركاته\n\nولي أمر الطالب: {اسم_الطالب}\n\nنود إبلاغكم بتأخر ابنكم عن الحضور للمدرسة اليوم.\n\nنأمل الحرص على الحضور المبكر.\n\nمع تحيات إدارة مدرسة ' + (APP_DATA.settings.school_name || 'المدرسة') + ''
        : 'السلام عليكم ورحمة الله وبركاته\n\nولي أمر الطالب: {اسم_الطالب}\n\nنود إبلاغكم باستئذان ابنكم من المدرسة اليوم.\n\nمع تحيات إدارة مدرسة ' + (APP_DATA.settings.school_name || 'المدرسة') + '';
    
    document.getElementById('att-send-message').value = template;
    document.getElementById('att-send-modal').classList.remove('hidden');
}

function sendSingleAtt(type, idx) {
    var records = type === 'late' ? attLateRecords : attPermissionRecords;
    var rec = records[idx];
    
    var recipients = [{ phone: getStudentPhone(rec), name: rec['اسم_الطالب'], index: idx, type: type, rowIndex: rec.rowIndex, grade: rec['الصف'] || '', cls: rec['الفصل'] || '' }];
    
    document.getElementById('att-send-recipients').innerHTML = '<span class="px-3 py-1 bg-white rounded-full text-sm text-gray-700 border">ولي أمر: ' + escapeHtml(rec['اسم_الطالب']) + '</span>';
    document.getElementById('att-send-count').innerText = '1';
    document.getElementById('att-send-modal').dataset.recipients = JSON.stringify(recipients);
    document.getElementById('att-send-modal').dataset.type = type;
    
    var lateInfo = type === 'late' ? '\nنوع التأخر: ' + (rec['نوع_التأخر'] || 'صباحي') + (rec['الحصة'] ? '\nالحصة: ' + rec['الحصة'] : '') : '';
    var permInfo = type === 'permission' ? '\nوقت الخروج: ' + (rec['وقت_الخروج'] || '-') + '\nالسبب: ' + (rec['السبب'] || '-') : '';
    
    var template = type === 'late' 
        ? 'السلام عليكم ورحمة الله وبركاته\n\nولي أمر الطالب: ' + rec['اسم_الطالب'] + '\n\nنود إبلاغكم بتأخر ابنكم عن الحضور للمدرسة اليوم.' + lateInfo + '\n\nنأمل الحرص على الحضور المبكر.\n\nمع تحيات إدارة مدرسة ' + (APP_DATA.settings.school_name || 'المدرسة') + ''
        : 'السلام عليكم ورحمة الله وبركاته\n\nولي أمر الطالب: ' + rec['اسم_الطالب'] + '\n\nنود إبلاغكم باستئذان ابنكم من المدرسة اليوم.' + permInfo + '\n\nمع تحيات إدارة مدرسة ' + (APP_DATA.settings.school_name || 'المدرسة') + '';
    
    document.getElementById('att-send-message').value = template;
    document.getElementById('att-send-modal').classList.remove('hidden');
}

// =================================================================
// 16. إرسال الرسائل
// =================================================================
function sendAttMessages() {
    var modal = document.getElementById('att-send-modal');
    var recipients = JSON.parse(modal.dataset.recipients || '[]');
    var type = modal.dataset.type;
    var messageTemplate = document.getElementById('att-send-message').value;
    var sendMethod = document.querySelector('input[name="send-method"]:checked').value;
    
    if (recipients.length === 0) {
        showEnhancedToast('warning', 'لا يوجد مستلمين');
        return;
    }
    
    showEnhancedToast('info', 'جاري إرسال ' + recipients.length + ' رسالة عبر ' + (sendMethod === 'both' ? 'الواتساب و SMS' : sendMethod === 'whatsapp' ? 'الواتساب' : 'SMS') + '...');
    closeAttSendModal();
    
    var successCount = 0;
    var failCount = 0;
    var totalOperations = recipients.length * (sendMethod === 'both' ? 2 : 1);
    var completedOperations = 0;
    
    recipients.forEach(function(recipient, index) {
        var message = messageTemplate.replace('{اسم_الطالب}', recipient.name);
        
        setTimeout(function() {
            if (sendMethod === 'whatsapp' || sendMethod === 'both') {
                google.script.run.withSuccessHandler(function(res) {
                    if (res && res.success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                    completedOperations++;
                    checkSendComplete();
                }).withFailureHandler(function() {
                    failCount++;
                    completedOperations++;
                    checkSendComplete();
                }).sendWhatsAppWithLog({
                    phone: recipient.phone,
                    message: message,
                    studentName: recipient.name,
                    grade: recipient.grade || '',
                    class: recipient.cls || '',
                    messageType: type === 'late' ? 'تأخر' : 'استئذان',
                    messageTitle: type === 'late' ? 'إشعار تأخر' : 'إشعار استئذان'
                }, currentStage);
            }
            
            if (sendMethod === 'sms' || sendMethod === 'both') {
                google.script.run.withSuccessHandler(function(res) {
                    if (res && res.success) {
                        successCount++;
                    } else {
                        failCount++;
                    }
                    completedOperations++;
                    checkSendComplete();
                }).withFailureHandler(function() {
                    failCount++;
                    completedOperations++;
                    checkSendComplete();
                }).sendSingleSMS(recipient.phone, message);
            }
            
            var updateFunc = type === 'late' ? 'updateLateSentStatus' : 'updatePermissionSentStatus';
            google.script.run.withSuccessHandler(function(res) {
                if (res && !res.success) { console.error('فشل تحديث حالة الإرسال:', res.error || ''); }
            }).withFailureHandler(function(e){ console.error('فشل تحديث حالة الإرسال:', e); })[updateFunc](currentStage, recipient.rowIndex);
            
        }, index * 1500);
    });
    
    function checkSendComplete() {
        if (completedOperations >= totalOperations) {
            showEnhancedToast('success', 'تم الإرسال: ' + successCount + ' ناجح، ' + failCount + ' فاشل');
            if (type === 'late') loadTodayLateRecords();
            else loadTodayPermissionRecords();
        }
    }
}

// =================================================================
function loadTodayStats() {
    google.script.run.withSuccessHandler(function(result) {
        if (result && result.success) {
            var stats = result.stats;
            var el = document.getElementById('att-today-stats');
            if (el) el.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-2 text-center">
                    <div class="text-2xl font-black text-red-600">${stats.lateCount}</div>
                    <div class="text-xs text-red-500">متأخر</div>
                </div>
                <div class="bg-purple-50 border border-purple-200 rounded-xl px-4 py-2 text-center">
                    <div class="text-2xl font-black text-purple-600">${stats.permissionCount}</div>
                    <div class="text-xs text-purple-500">مستأذن</div>
                </div>
            `;
        }
    }).withFailureHandler(function(err) {
        console.error('فشل تحميل الإحصائيات:', err);
    }).getTodayAttendanceStats(currentStage);
}

// =================================================================
// 18. الطباعة
// =================================================================
function printAttList(type) {
    var records = type === 'late' ? attLateRecords : attPermissionRecords;
    var title = type === 'late' ? 'سجل المتأخرين' : 'سجل المستأذنين';
    var color = type === 'late' ? '#dc2626' : '#7c3aed';
    
    if (records.length === 0) {
        showEnhancedToast('warning', 'لا توجد بيانات للطباعة');
        return;
    }
    
    var rows = records.map(function(rec, i) {
        var dayName = getDayNameFromDate(rec['وقت_الإدخال']);
        var hijriDate = rec['التاريخ_هجري'] || '';
        
        if (type === 'late') {
            return '<tr>' +
                '<td class="data-cell">' + toIndic(i + 1) + '</td>' +
                '<td class="name-cell">' + escapeHtml(rec['اسم_الطالب'] || '') + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['الصف'] || '') + ' / ' + escapeHtml(rec['الفصل'] || '') + '</td>' +
                '<td class="data-cell">' + escapeHtml(dayName + ' ' + hijriDate) + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['نوع_التأخر'] || 'صباحي') + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['الحصة'] || '-') + '</td>' +
                '</tr>';
        } else {
            return '<tr>' +
                '<td class="data-cell">' + toIndic(i + 1) + '</td>' +
                '<td class="name-cell">' + escapeHtml(rec['اسم_الطالب'] || '') + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['الصف'] || '') + ' / ' + escapeHtml(rec['الفصل'] || '') + '</td>' +
                '<td class="data-cell">' + escapeHtml(dayName + ' ' + hijriDate) + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['وقت_الخروج'] || '-') + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['السبب'] || '-') + '</td>' +
                '<td class="data-cell">' + escapeHtml(rec['المستلم'] || '-') + '</td>' +
                '</tr>';
        }
    }).join('');
    
    var headers = type === 'late' 
        ? '<th>م</th><th>اسم الطالب</th><th>الصف</th><th>اليوم والتاريخ</th><th>نوع التأخر</th><th>الحصة</th>'
        : '<th>م</th><th>اسم الطالب</th><th>الصف</th><th>اليوم والتاريخ</th><th>وقت الخروج</th><th>السبب</th><th>المستلم</th>';
    
    var hijri = new Date().toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var colCount = type === 'late' ? 6 : 7;
    var headersFormatted = headers.replace(/<th>/g, '<th class="col-header">');
    
    var win = window.open('', '_blank');
    if (!win) { showEnhancedToast('danger', 'يرجى السماح بالنوافذ المنبثقة للطباعة'); return; }
    win.document.write(buildSharedPrintPage_({
        title: title,
        subtitle: currentStage,
        dateText: hijri + ' | العدد: ' + toArShared_(records.length),
        colCount: colCount,
        headers: headersFormatted,
        rows: rows,
        total: toArShared_(records.length) + (type === 'late' ? ' متأخر' : ' مستأذن')
    }));
    win.document.close();
    setTimeout(function() { win.focus(); win.print(); }, 500);
}

function printArchive() {
    var type = document.getElementById('archive-type').value;
    showEnhancedToast('info', 'جاري تحضير الطباعة...');
    
    setTimeout(function() {
        var container = document.getElementById('archive-content');
        var table = container.querySelector('table');
        if (!table) {
            showEnhancedToast('warning', 'لا توجد بيانات للطباعة');
            return;
        }
        
        var title = type === 'late' ? 'أرشيف التأخر' : 'أرشيف الاستئذان';
        var hijri = new Date().toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
        
        // Extract rows from existing table
        var tbody = table.querySelector('tbody');
        var thead = table.querySelector('thead');
        var rows = tbody ? tbody.innerHTML : '';
        var headerRow = thead ? thead.querySelector('tr') : null;
        var headerCells = headerRow ? headerRow.innerHTML.replace(/<th/g, '<th class="col-header"') : '';
        var colCount = headerRow ? headerRow.querySelectorAll('th').length : 7;
        
        var win = window.open('', '_blank');
        if (!win) { showEnhancedToast('danger', 'يرجى السماح بالنوافذ المنبثقة للطباعة'); return; }
        win.document.write(buildSharedPrintPage_({
            title: title,
            subtitle: currentStage,
            dateText: hijri,
            colCount: colCount,
            headers: headerCells,
            rows: rows,
            total: ''
        }));
        win.document.close();
        setTimeout(function() { win.focus(); win.print(); }, 500);
    }, 500);
}
