var LATE_PERIODS = ['الأولى', 'الثانية', 'الثالثة', 'الرابعة', 'الخامسة', 'السادسة', 'السابعة'];
var DAYS_AR = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

function getDayNameFromDate(dateStr) {
    if (!dateStr) return '';
    try {
        var parts = dateStr.split(' ')[0].split('/');
        if (parts.length < 3) return '';
        var date = new Date(parts[0], parts[1] - 1, parts[2]);
        return DAYS_AR[date.getDay()] || '';
    } catch (e) { return ''; }
}

function getTimeOnly(dateStr) {
    if (!dateStr) return '-';
    try { return dateStr.split(' ')[1] || dateStr; } catch (e) { return dateStr; }
}

function switchTardTab(tab) {
    tardCurrentTab = tab;
    document.querySelectorAll('.sec-tardiness .tab-item').forEach(function(t) { t.classList.remove('active'); });
    var activeBtn = document.getElementById('tard-tab-' + tab);
    if (activeBtn) activeBtn.classList.add('active');

    if (tab === 'today') renderTardTodayTab();
    else if (tab === 'approved') renderTardApprovedTab();
    else renderTardReportsTab();
}

// =================================================================
function renderTardTodayTab() {
    var today = new Date();
    var hijriDate = today.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var miladiDate = today.toLocaleDateString('ar-SA', { day: 'numeric', month: 'long', year: 'numeric' });

    document.getElementById('tard-tab-content').innerHTML = `

                <button onclick="openTardAddModal()" class="btn-hero btn-hero-primary">

                </button>
                <button onclick="loadTardTodayRecords()" class="btn-hero btn-hero-outline">
                    <span class="material-symbols-outlined" style="font-size:18px">refresh</span> تحديث
                </button>
            </div>
            <div class="action-group">
                <button onclick="sendAllTodayTard()" id="btn-send-all-tard" class="btn-hero btn-hero-success" disabled>

function loadTardTodayRecords() {
    showEnhancedToast('info', 'جاري تحديث البيانات...');
    google.script.run.withSuccessHandler(function(result) {
        if (result && result.success) tardTodayRecords = result.records || [];
        else tardTodayRecords = [];
        displayTardTodayTable();
        updateTardCounts();
        showEnhancedToast('success', 'تم التحديث ✓ (' + tardTodayRecords.length + ' متأخر اليوم)');
    }).withFailureHandler(function(err) {
        tardTodayRecords = [];
        displayTardTodayTable();
        showEnhancedToast('error', 'خطأ في التحديث: ' + err.message);
    }).getTodayLateRecords(currentStage);
}

function displayTardTodayTable() {
    var container = document.getElementById('tard-today-table');
    if (!tardTodayRecords || tardTodayRecords.length === 0) {
        container.innerHTML = '<div class="text-center py-16"><span class="material-symbols-outlined text-gray-300 text-7xl">event_available</span><p class="text-gray-500 mt-4 text-lg">لا يوجد متأخرون اليوم</p><button onclick="openTardAddModal()" class="mt-6 px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm font-bold"><span class="material-symbols-outlined align-middle ml-1">add_circle</span> تسجيل تأخر</button></div>';
        var btn = document.getElementById('btn-send-all-tard'); if (btn) btn.disabled = true;
        return;
    }
    var btn = document.getElementById('btn-send-all-tard'); if (btn) btn.disabled = false;
    var el = document.getElementById('tard-today-total'); if (el) el.textContent = tardTodayRecords.length;

    // حساب عدد تأخرات كل طالب من كل السجلات
    var prevCounts = {};
    (tardAllRecords || []).forEach(function(r) {
        var id = getF_(r, 'رقم_الطالب') || getF_(r, 'اسم_الطالب');
        if (id) prevCounts[id] = (prevCounts[id] || 0) + 1;
    });

    var sorted = sortRecordsByClass_(tardTodayRecords);
    var groups = sheetGroupInfo_(sorted);

    var html = '<table class="sht"><thead><tr style="background:#dc2626">';
    html += '<th style="width:36px">#</th>';
    html += '<th style="min-width:130px">اسم الطالب</th>';
    html += '<th>نوع التأخر</th>';
    html += '<th>الحصة</th>';
    html += '<th>الوقت</th>';
    html += '<th style="width:60px">مرات</th>';
    html += '<th style="width:80px">الإرسال</th>';
    html += '<th style="width:60px">طباعة</th>';
    html += '<th style="width:36px"></th>';
    html += '</tr></thead><tbody>';

    sorted.forEach(function(rec, idx) {
        var g = groups[idx];
        var origIdx = tardTodayRecords.indexOf(rec);
        var isSent = getF_(rec, 'تم_الإرسال') === 'نعم';
        var lateType = getF_(rec, 'نوع_التأخر') || 'تأخر صباحي';
        var cls = (idx % 2 === 0) ? 'rw' : 'rg';

        if (g.first) {
            var classLabel = escapeHtml((getF_(rec, 'الصف') || '') + ' / ' + (getF_(rec, 'الفصل') || ''));
            if (idx > 0) html += '<tr class="sht-sep"><td colspan="9"></td></tr>';
            html += '<tr class="sht-gh"><td colspan="9"><span class="sht-gl">' + classLabel + '</span> <span class="sht-gc">(' + g.span + ')</span></td></tr>';
        }

        var lateTypeBadge = lateType.indexOf('حصة') >= 0
            ? '<span class="text-amber-600 font-bold text-xs">حصة</span>'
            : '<span class="text-red-600 font-bold text-xs">صباحي</span>';

        // عدد المرات السابقة
        var sid = getF_(rec, 'رقم_الطالب') || getF_(rec, 'اسم_الطالب');
        var cnt = prevCounts[sid] || 1;
        var cntCls = cnt >= 4 ? 'cnt-4' : cnt === 3 ? 'cnt-3' : cnt === 2 ? 'cnt-2' : '';

        html += '<tr class="' + cls + '">';
        html += '<td>' + (idx + 1) + '</td>';
        html += '<td class="nm">' + escapeHtml(getF_(rec, 'اسم_الطالب') || '-') + '</td>';
        html += '<td>' + lateTypeBadge + '</td>';
        html += '<td><span class="px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs font-bold">' + escapeHtml(getF_(rec, 'الحصة') || '-') + '</span></td>';
        html += '<td class="text-xs text-gray-500">' + escapeHtml(getTimeOnly(rec['وقت_الإدخال'])) + '</td>';
        html += '<td class="' + cntCls + ' font-bold">' + toArabicNum_(cnt) + '</td>';
        html += '<td>' + countBadge_(isSent, 'sendTardWhatsApp(' + origIdx + ')') + '</td>';
        html += '<td><div class="flex gap-0.5 justify-center"><button onclick="printTardTodayDoc(\'ehalat_absence\',' + origIdx + ')" class="p-1 text-blue-500 hover:bg-blue-50 rounded" title="إحالة"><span class="material-symbols-outlined text-[15px]">forward_to_inbox</span></button><button onclick="printTardTodayDoc(\'tawtheeq_tawasol\',' + origIdx + ')" class="p-1 text-green-500 hover:bg-green-50 rounded" title="توثيق تواصل"><span class="material-symbols-outlined text-[15px]">contact_phone</span></button></div></td>';
        html += '<td><button onclick="deleteTardRecord(' + rec.rowIndex + ')" class="p-1 hover:bg-red-50 rounded text-red-400 hover:text-red-600"><span class="material-symbols-outlined text-[18px]">delete</span></button></td>';
        html += '</tr>';
    });

    html += '</tbody></table>';
    // إحصائيات
    var cntSent = sorted.filter(function(r){return getF_(r,'تم_الإرسال')==='نعم';}).length;
    html += '<div class="tbl-footer">';
    html += '<div class="s"><div class="d" style="background:#fff;border-color:#d1d5db"></div> مرة واحدة</div>';
    html += '<div class="s"><div class="d" style="background:#FFFF99"></div> مرتين</div>';
    html += '<div class="s"><div class="d" style="background:#FFCC99"></div> ٣ مرات</div>';
    html += '<div class="s"><div class="d" style="background:#FF9999"></div> ٤+ مرات</div>';
    html += '<div class="s" style="margin-right:auto"><div class="d" style="background:#d1fae5"></div> تم: ' + cntSent + '</div>';
    html += '<div class="s"><div class="d" style="background:#fef3c7"></div> لم يُرسل: ' + (sorted.length - cntSent) + '</div>';
    html += '</div>';

    container.innerHTML = html;
    injectCheckboxes_tard();
}

function updateTardCounts() {
    var el1 = document.getElementById('tard-today-count'); if (el1) el1.textContent = tardTodayRecords.length;
    var el2 = document.getElementById('tard-today-total'); if (el2) el2.textContent = tardTodayRecords.length;

// =================================================================
// 4. إرسال واتساب
// =================================================================
function sendTardWhatsApp(idx) {
    var rec = tardTodayRecords[idx];
    if (!rec) return;
    var phone = getStudentPhone(rec);
    if (!phone) { showEnhancedToast('warning', 'لا يوجد رقم جوال'); return; }
    var today = new Date();
    var dayName = today.toLocaleDateString('ar-SA', { weekday: 'long' });
    var hijri = today.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var defaultMsg = '⏰ *إشعار تأخر*\n\nالسلام عليكم ورحمة الله وبركاته\nولي أمر الطالب: *' + getF_(rec,'اسم_الطالب') + '*\nالصف: ' + getF_(rec,'الصف') + ' - ' + getF_(rec,'الفصل') + '\n\nنود إبلاغكم بتأخر ابنكم عن الحضور.\n⏰ نوع التأخر: ' + (getF_(rec,'نوع_التأخر')||'صباحي') + '\n📅 اليوم: ' + dayName + ' - ' + hijri + '\n\nمع تحيات إدارة مدرسة ' + (APP_DATA.settings.school_name || 'المدرسة') + '';
    showMessageEditor_({
        phone: phone, studentName: getF_(rec,'اسم_الطالب'), type: 'تأخر',
        defaultMessage: defaultMsg,
        data: { 'اسم_الطالب': getF_(rec,'اسم_الطالب'), 'الصف': getF_(rec,'الصف'), 'الفصل': getF_(rec,'الفصل'), 'نوع_التأخر': getF_(rec,'نوع_التأخر')||'صباحي', 'اليوم': dayName, 'التاريخ': hijri },
        onSend: function(editedMsg) {
            showEnhancedToast('info', 'جاري الإرسال...');
            google.script.run.withSuccessHandler(function(r) {
                if (r && r.success) {
                    showEnhancedToast('success', 'تم الإرسال ✓');
                    google.script.run.updateLateSentStatus(currentStage, rec.rowIndex);
                    loadTardTodayRecords();
                }
                else showEnhancedToast('danger', r.error || 'فشل');
            }).withFailureHandler(function(e) { showEnhancedToast('danger', e.message); })
            .sendWhatsAppWithLog({ phone: phone, message: editedMsg, studentName: getF_(rec,'اسم_الطالب'), type: 'تأخر' }, currentStage);
        }
    });
}

function sendAllTodayTard() {
    var unsent = tardTodayRecords.filter(function(r) { return r['تم_الإرسال'] !== 'نعم'; });
    if (unsent.length === 0) { showEnhancedToast('info', 'تم إرسال الجميع سابقاً'); return; }
    showStyledConfirm_({title: 'إرسال إشعارات', message: 'سيتم إرسال إشعارات لـ ' + unsent.length + ' ولي أمر. متابعة؟', icon: 'send', color: 'red', onConfirm: function() {
        showEnhancedToast('info', 'جاري إرسال ' + unsent.length + ' إشعار... (تقريباً ' + Math.ceil(unsent.length * 35 / 60) + ' دقائق)');
        unsent.forEach(function(rec, i) {
            var delay = i * 30000 + Math.floor(Math.random() * 10000);
            setTimeout(function() { sendTardWhatsApp(tardTodayRecords.indexOf(rec)); }, delay);
        });
    }});
}

function deleteTardRecord(rowIndex) {
    // حذف بمنبثقة مصممة - يتم التعامل معه في السياق
    google.script.run.withSuccessHandler(function(res) {
        if (res.success) { showEnhancedToast('success', 'تم الحذف'); loadTardTodayRecords(); }
        else showEnhancedToast('danger', 'خطأ: ' + res.error);
    }).deleteLateRecord(currentStage, rowIndex);
}

// =================================================================
// ★★★ نظام محرر الرسائل ★★★
var _msgEditorCallback = null;
var _msgEditorType = '';
var _msgEditorData = {};
var _templateCache = {};

function showMessageEditor_(opts) {
    if (!document.getElementById('msg-editor-modal')) {
        var d = document.createElement('div');
        d.innerHTML = '<div id="msg-editor-modal" class="fixed inset-0 bg-gray-900/50 hidden z-[999] flex items-center justify-center backdrop-blur-sm" onclick="if(event.target===this)_closeEditor()">'
            + '<div class="bg-white rounded-2xl shadow-2xl ring-1 ring-black/5 w-full max-w-lg mx-4 overflow-hidden">'
            + '<div class="px-5 py-3 bg-green-600 text-white flex justify-between items-center">'
            + '<h3 class="font-bold flex items-center gap-2"><span class="material-symbols-outlined">edit_note</span> تعديل الرسالة قبل الإرسال</h3>'
            + '<button onclick="_closeEditor()" class="text-white/80 hover:text-white"><span class="material-symbols-outlined">close</span></button></div>'
            + '<div class="px-5 py-3 bg-green-50 border-b flex justify-between items-center">'
            + '<div><span class="text-sm font-bold text-gray-700" id="me-student"></span>'
            + '<span class="text-xs text-gray-500 mr-2" id="me-type-badge"></span></div>'
            + '<span class="text-xs text-gray-400" id="me-phone" style="direction:ltr"></span></div>'
            + '<div class="p-5">'
            + '<textarea id="me-text" rows="12" class="w-full border border-gray-300 rounded-lg p-3 text-sm leading-relaxed resize-y focus:ring-2 focus:ring-green-400" style="direction:rtl;font-family:Traditional Arabic,Tahoma,serif"></textarea>'
            + '<div id="me-tmpl-note" class="hidden mt-2 px-3 py-1.5 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-600">'
            + '<span class="material-symbols-outlined text-[14px] align-middle">info</span> يتم استخدام قالبك المحفوظ</div></div>'
            + '<div class="px-5 py-3 bg-gray-50 flex justify-between items-center gap-2 flex-wrap">'
            + '<div class="flex gap-2">'
            + '<button onclick="_saveAsDefault()" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">bookmark</span> حفظ كقالب افتراضي</button>'
            + '<button onclick="_resetTemplate()" class="px-3 py-2 bg-gray-200 text-gray-600 rounded-lg text-xs font-bold hover:bg-gray-300 flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">restart_alt</span> استعادة</button></div>'
            + '<div class="flex gap-2">'
            + '<button onclick="_closeEditor()" class="px-4 py-2 text-gray-600 hover:bg-gray-200 rounded-lg text-sm font-bold">إلغاء</button>'
            + '<button onclick="_confirmSend()" class="px-6 py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700 flex items-center gap-2 shadow-md"><span class="material-symbols-outlined text-[18px]">send</span> إرسال</button>'
            + '</div></div></div></div>';
        document.body.appendChild(d.firstElementChild);
    }
    _msgEditorType = opts.type || '';
    _msgEditorData = opts.data || {};
    _msgEditorCallback = opts.onSend || null;
    document.getElementById('me-student').textContent = opts.studentName || '';
    document.getElementById('me-type-badge').textContent = opts.type || '';
    document.getElementById('me-phone').textContent = opts.phone || '';
    var cached = _templateCache[_msgEditorType];
    if (cached !== undefined) { _loadMsgEditor(cached, opts); }
    else if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(r) {
            var t = (r && r.template) ? r.template : '';
            _templateCache[_msgEditorType] = t;
            _loadMsgEditor(t, opts);
        }).withFailureHandler(function() { _templateCache[_msgEditorType]=''; _loadMsgEditor('', opts); }).getMessageTemplate(_msgEditorType);
    } else { _loadMsgEditor('', opts); }
    document.getElementById('msg-editor-modal').classList.remove('hidden');
}
function _loadMsgEditor(saved, opts) {
    var note = document.getElementById('me-tmpl-note');
    var txt;
    if (saved) {
        txt = saved; for (var k in (opts.data||{})) { txt = txt.split('{'+k+'}').join(opts.data[k]||''); }
        note.classList.remove('hidden');
    } else { txt = opts.defaultMessage || ''; note.classList.add('hidden'); }
    var el = document.getElementById('me-text');
    el.value = txt; el.dataset.defaultMsg = opts.defaultMessage || '';
}
function _confirmSend() {
    var msg = document.getElementById('me-text').value;
    if (!msg.trim()) { showEnhancedToast('warning', 'الرسالة فارغة'); return; }
    _closeEditor(); if (_msgEditorCallback) _msgEditorCallback(msg);
}
function _saveAsDefault() {
    var msg = document.getElementById('me-text').value;
    var tmpl = msg;
    var entries = [];
    for (var k in _msgEditorData) { if (_msgEditorData[k] && String(_msgEditorData[k]).trim()) entries.push({k:k,v:String(_msgEditorData[k])}); }
    entries.sort(function(a,b){return b.v.length-a.v.length;});
    entries.forEach(function(e){ tmpl = tmpl.split(e.v).join('{'+e.k+'}'); });
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(r) {
            if (r && r.success) { _templateCache[_msgEditorType]=tmpl; showEnhancedToast('success','تم حفظ القالب كافتراضي ✓'); document.getElementById('me-tmpl-note').classList.remove('hidden'); }
            else showEnhancedToast('danger','فشل الحفظ');
        }).saveMessageTemplate(_msgEditorType, tmpl);
    }
}
function _resetTemplate() {
    document.getElementById('me-text').value = document.getElementById('me-text').dataset.defaultMsg || '';
    document.getElementById('me-tmpl-note').classList.add('hidden');
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(){ _templateCache[_msgEditorType]=''; showEnhancedToast('info','تم استعادة القالب الافتراضي'); }).deleteMessageTemplate(_msgEditorType);
    }
}
function _closeEditor() { document.getElementById('msg-editor-modal').classList.add('hidden'); }


// ★★★ نظام التحديد - التأخر ★★★
var selected_tard = new Set();
function toggleSelect_tard(idx) {
    if (selected_tard.has(idx)) selected_tard.delete(idx); else selected_tard.add(idx);
    updateSelBar_tard();
    var allChks = document.querySelectorAll('.sel-tard');

function printTodayTard() {
    var _printRecs = (typeof getSelectedRecords_tard==='function') ? getSelectedRecords_tard() : tardTodayRecords;
    if (_printRecs.length === 0) { showEnhancedToast('warning', 'لا يوجد بيانات'); return; }
    var today = new Date();
    var hijri = today.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var miladi = today.toLocaleDateString('ar-SA', { day: 'numeric', month: 'long', year: 'numeric' });
    var dayName = today.toLocaleDateString('ar-SA', { weekday: 'long' });
    var stageName = getStageName_(currentStage);
    var sorted = sortRecordsByClass_(tardTodayRecords);
    var rows = '', lastKey = '';
    sorted.forEach(function(rec, i) {
        var grade = getF_(rec, 'الصف'), cls = getF_(rec, 'الفصل');
        var key = grade + cls;
        if (key !== lastKey && i > 0) rows += '<tr class="sep-row"><td colspan="7"></td></tr>';
        lastKey = key;
        var isSent = getF_(rec, 'تم_الإرسال') === 'نعم';
        rows += '<tr>'
            + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
            + '<td class="name-cell">' + escapeHtml(getF_(rec, 'اسم_الطالب') || '-') + '</td>'
            + '<td class="data-cell">' + formatClassShared_(escapeHtml(grade), escapeHtml(cls)) + '</td>'
            + '<td class="data-cell">' + escapeHtml(getF_(rec, 'نوع_التأخر') || 'صباحي') + '</td>'
            + '<td class="data-cell">' + toArShared_(escapeHtml(getF_(rec, 'الحصة') || '-')) + '</td>'
            + '<td class="data-cell">' + toArShared_(escapeHtml(getTimeOnly(getF_(rec, 'وقت_الإدخال')))) + '</td>'
            + '<td class="data-cell" style="color:' + (isSent ? 'green' : '#999') + ';font-weight:bold">' + (isSent ? 'تم' : '-') + '</td>'
            + '</tr>';
    });
    var win = window.open('', '_blank');
    win.document.write(buildSharedPrintPage_({
        title: 'سجل المتأخرين ليوم ' + dayName,
        subtitle: stageName,
        dateText: hijri + ' \u00A0الموافق\u00A0 ' + miladi + ' م',
        colCount: 7,
        headers: '<th class="col-header" style="width:5%">م</th><th class="col-header" style="width:28%">اسم الطالب</th><th class="col-header" style="width:10%">الصف</th><th class="col-header" style="width:15%">نوع التأخر</th><th class="col-header" style="width:8%">الحصة</th><th class="col-header" style="width:12%">الوقت</th><th class="col-header" style="width:7%">التواصل</th>',
        rows: rows,
        total: toArShared_(_printRecs.length) + ' متأخر'
    }));
    win.document.close(); setTimeout(function(){ win.print(); }, 300);
}

function populateTardFilters() {
    var grades = []; var seen = {};
    APP_DATA.students.filter(function(s) { return s['المرحلة'] === currentStage; }).forEach(function(s) {
        if (!seen[s['الصف']]) { seen[s['الصف']] = true; grades.push(s['الصف']); }
    });
    var gradeOrder = ["أول", "ثاني", "ثالث", "رابع", "خامس", "سادس"];
    grades.sort(function(a, b) { var iA = gradeOrder.findIndex(function(k){return a.includes(k)}); var iB = gradeOrder.findIndex(function(k){return b.includes(k)}); return (iA===-1?99:iA) - (iB===-1?99:iB); });
    var sel = document.getElementById('tard-grade-filter');
    sel.innerHTML = '<option value="">كل الصفوف</option>';
    grades.forEach(function(g) { sel.add(new Option(g, g)); });
}

function tardGradeChanged() {
    var grade = document.getElementById('tard-grade-filter').value;
    var classSel = document.getElementById('tard-class-filter');
    classSel.innerHTML = '<option value="">كل الفصول</option>';
    if (grade) {
        var classes = []; var seen = {};
        APP_DATA.students.filter(function(s) { return s['المرحلة'] === currentStage && s['الصف'] === grade; }).forEach(function(s) {
            if (!seen[s['الفصل']]) { seen[s['الفصل']] = true; classes.push(s['الفصل']); }
        });
        classes.sort(); classes.forEach(function(c) { classSel.add(new Option(c, c)); });
    }
}

function loadTardArchiveRecords() {
    google.script.run.withSuccessHandler(function(result) {
        if (result && result.success) tardAllRecords = result.records || [];
        else tardAllRecords = [];
        var el = document.getElementById('tard-total-count'); if (el) el.textContent = tardAllRecords.length;
        var el2 = document.getElementById('tard-unsent-count'); if (el2) el2.textContent = tardAllRecords.filter(function(r){return r['تم_الإرسال'] !== 'نعم';}).length;
        filterTardApproved();
    }).withFailureHandler(function(err) {
        tardAllRecords = []; filterTardApproved();
    }).getLateArchive(currentStage, '', '');
}

function filterTardApproved() {
    var search = (document.getElementById('tard-search')?.value || '').trim();
    var grade = document.getElementById('tard-grade-filter')?.value || '';
    var cls = document.getElementById('tard-class-filter')?.value || '';
    var typeF = document.getElementById('tard-type-filter')?.value || '';
    var dateFrom = document.getElementById('tard-date-from')?.value || '';
    var dateTo = document.getElementById('tard-date-to')?.value || '';

    var filtered = tardAllRecords.filter(function(r) {
        if (search && !(r['اسم_الطالب'] || '').includes(search)) return false;
        if (grade && r['الصف'] !== grade) return false;
        if (cls && r['الفصل'] != cls) return false;
        if (typeF && (r['نوع_التأخر'] || 'تأخر صباحي') !== typeF) return false;
        return true;
    });

    var container = document.getElementById('tard-approved-container');
    if (!filtered || filtered.length === 0) {
        container.innerHTML = '<div class="text-center py-16 bg-white rounded-xl border border-gray-200"><span class="material-symbols-outlined text-gray-300 text-6xl">search_off</span><p class="text-gray-500 mt-2">لا توجد سجلات مطابقة</p></div>';
        return;
    }

    if (tardViewMode === 'table') {
        container.innerHTML = createTardApprovedTable(filtered);
    } else {
        container.innerHTML = createTardApprovedCards(filtered);
    }
    container.innerHTML += '<div class="mt-4 text-center text-sm text-gray-500">إجمالي: <span class="font-bold">' + filtered.length + '</span> سجل</div>';
    var countEl = document.getElementById('tard-results-count');
    if (countEl) countEl.textContent = filtered.length + ' سجل';
}

function toggleTardView(view) {
    tardViewMode = view;
    var cardsBtn = document.getElementById('tard-view-cards');
    var tableBtn = document.getElementById('tard-view-table');
    if (cardsBtn) { cardsBtn.className = 'p-1 rounded ' + (view === 'cards' ? 'text-red-600 bg-white' : 'text-gray-400'); }
    if (tableBtn) { tableBtn.className = 'p-1 rounded ' + (view === 'table' ? 'text-red-600 bg-white' : 'text-gray-400'); }
    filterTardApproved();
}

function createTardApprovedCards(records) {
    var groups = {};
    records.forEach(function(rec) {
        var key = String(rec['رقم_الطالب'] || rec['اسم_الطالب']);
        if (!groups[key]) groups[key] = { info: rec, records: [] };
        groups[key].records.push(rec);
    });
    var orderedIds = [];
    var seen = {};
    records.forEach(function(r) { var k = String(r['رقم_الطالب'] || r['اسم_الطالب']); if (!seen[k]) { seen[k] = true; orderedIds.push(k); } });
    tardStudentGroups = orderedIds.map(function(id) { return groups[id]; });

    var html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
    tardStudentGroups.forEach(function(g, gIdx) {
        var recs = g.records;
        var name = g.info['اسم_الطالب'];
        var grade = g.info['الصف'];
        var cls = g.info['الفصل'];
        var total = recs.length;
        var morningCount = recs.filter(function(r) { return (r['نوع_التأخر'] || 'تأخر صباحي') === 'تأخر صباحي'; }).length;
        var periodCount = total - morningCount;

        var border = 'border-gray-200', badge = '', badgeClass = '';
        if (total >= 10) { border = 'border-red-500'; badge = 'متكرر جداً'; badgeClass = 'text-white bg-red-600'; }
        else if (total >= 7) { border = 'border-red-400'; badge = 'متكرر'; badgeClass = 'text-red-800 bg-red-100 border border-red-300'; }
        else if (total >= 5) { border = 'border-orange-400'; badge = 'ملاحظ'; badgeClass = 'text-orange-800 bg-orange-100 border border-orange-300'; }
        else if (total >= 3) { border = 'border-yellow-400'; badge = 'تنبيه'; badgeClass = 'text-yellow-800 bg-yellow-100 border border-yellow-300'; }

        html += '<div class="bg-white rounded-xl border-2 ' + border + ' p-4 hover:shadow-lg transition-all cursor-pointer group" onclick="openTardDetailModal(' + gIdx + ')">';
        html += '<div class="flex justify-between items-start mb-3"><div class="flex items-center gap-1"><span class="text-[22px] font-black ' + (total >= 7 ? 'text-red-600' : total >= 4 ? 'text-orange-600' : 'text-gray-600') + '">' + total + '</span><span class="text-[10px] text-gray-400">تأخر</span></div>';
        html += (badge ? '<span class="text-[10px] font-bold ' + badgeClass + ' px-2 py-0.5 rounded-full">' + badge + '</span>' : '') + '</div>';
        html += '<h3 class="font-bold text-gray-800 text-sm leading-tight">' + escapeHtml(name) + '</h3>';
        html += '<p class="text-xs text-gray-500 mt-0.5 mb-3">' + escapeHtml(grade) + ' / ' + escapeHtml(cls) + '</p>';
        html += '<div class="flex gap-1.5 justify-center mb-3">';
        if (morningCount > 0) html += '<div class="flex-1 text-center rounded-lg py-1.5 bg-red-50 border border-red-200"><p class="text-base font-black text-red-700">' + morningCount + '</p><p class="text-[8px] text-red-600">صباحي</p></div>';
        if (periodCount > 0) html += '<div class="flex-1 text-center rounded-lg py-1.5 bg-amber-50 border border-amber-200"><p class="text-base font-black text-amber-700">' + periodCount + '</p><p class="text-[8px] text-amber-600">حصة</p></div>';
        html += '</div>';
        html += '<div class="text-center text-[11px] text-purple-600 font-bold group-hover:text-purple-800 flex items-center justify-center gap-1"><span class="material-symbols-outlined text-[14px]">open_in_new</span> عرض التفاصيل</div>';
        html += '</div>';
    });
    html += '</div>';
    return html;
}

function openTardDetailModal(groupIndex) {
    var group = tardStudentGroups[groupIndex];
    if (!group) return;
    var name = group.info['اسم_الطالب'];
    var grade = group.info['الصف'] + ' / ' + group.info['الفصل'];
    document.getElementById('tard-detail-title').textContent = name + ' - ' + grade;
    var recs = group.records;
    var morningCount = recs.filter(function(r){return (r['نوع_التأخر']||'تأخر صباحي')==='تأخر صباحي';}).length;
    var periodCount = recs.length - morningCount;
    var sentCount = recs.filter(function(r){return r['تم_الإرسال']==='نعم';}).length;

    var body = '<div class="grid grid-cols-4 gap-3 mb-4">';
    body += '<div class="text-center p-3 bg-red-50 rounded-xl border border-red-200"><div class="text-xl font-black text-red-600">' + recs.length + '</div><div class="text-[10px] text-red-500">الإجمالي</div></div>';
    body += '<div class="text-center p-3 bg-orange-50 rounded-xl border border-orange-200"><div class="text-xl font-black text-orange-600">' + morningCount + '</div><div class="text-[10px] text-orange-500">صباحي</div></div>';
    body += '<div class="text-center p-3 bg-amber-50 rounded-xl border border-amber-200"><div class="text-xl font-black text-amber-600">' + periodCount + '</div><div class="text-[10px] text-amber-500">حصة</div></div>';

function generateTardCharts() {
    var grade = document.getElementById('trep-grade').value;
    var cls = document.getElementById('trep-class').value;
    var filtered = tardAllRecords.filter(function(r) {
        if (grade && r['الصف'] !== grade) return false;
        if (cls && r['الفصل'] != cls) return false;
        return true;
    });
    var total = filtered.length;
    var morningCount = filtered.filter(function(r){return (r['نوع_التأخر']||'تأخر صباحي') === 'تأخر صباحي';}).length;
    var periodCount = total - morningCount;
    var uniqueStudents = new Set(filtered.map(function(r){return r['رقم_الطالب'];})).size;

    document.getElementById('trep-total').textContent = total;
    document.getElementById('trep-students').textContent = uniqueStudents;
    document.getElementById('trep-morning').textContent = morningCount;
    document.getElementById('trep-period').textContent = periodCount;

    // أكثر الطلاب
    var sc = {};
    filtered.forEach(function(r) { var k=r['رقم_الطالب']; if(!sc[k])sc[k]={name:r['اسم_الطالب'],cls:r['الصف']+' '+r['الفصل'],count:0}; sc[k].count++; });
    var top = Object.values(sc).sort(function(a,b){return b.count-a.count;}).slice(0,10);
    var topHtml = '<div class="space-y-2">';
    top.forEach(function(s,i) {
        topHtml += '<div class="flex items-center justify-between p-2 rounded-lg '+(i<3?'bg-red-50':'bg-gray-50')+'"><div class="flex items-center gap-2"><span class="w-6 h-6 rounded-full '+(i<3?'bg-red-500 text-white':'bg-gray-300 text-gray-600')+' flex items-center justify-center text-xs font-bold">'+(i+1)+'</span><div><span class="text-sm font-medium">'+escapeHtml(s.name)+'</span><span class="text-xs text-gray-400 mr-2">'+escapeHtml(s.cls)+'</span></div></div><span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">'+s.count+' مرة</span></div>';
    });
    topHtml += '</div>';
    document.getElementById('trep-top').innerHTML = top.length ? topHtml : '<p class="text-gray-400 text-center py-8">لا توجد بيانات</p>';

    // حسب الفصل
    var cc = {};
    filtered.forEach(function(r) { var k=(r['الصف']||'')+' '+(r['الفصل']||''); cc[k]=(cc[k]||0)+1; });
    var classHtml = '<div class="space-y-2">';
    Object.entries(cc).sort(function(a,b){return b[1]-a[1];}).forEach(function(e) {
        var pct = total>0 ? Math.round((e[1]/total)*100) : 0;
        classHtml += '<div class="flex items-center gap-3"><span class="text-sm font-medium w-32 truncate">'+escapeHtml(e[0])+'</span><div class="flex-1 bg-gray-200 rounded-full h-4"><div class="bg-red-500 h-4 rounded-full" style="width:'+pct+'%"></div></div><span class="text-sm font-bold text-gray-600 w-12 text-left">'+e[1]+'</span></div>';
    });
    classHtml += '</div>';
    document.getElementById('trep-by-class').innerHTML = Object.keys(cc).length ? classHtml : '<p class="text-gray-400 text-center py-8">لا توجد بيانات</p>';
}

    sent.forEach(function(rec, i) {
        rows += '<tr>'
            + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
            + '<td class="name-cell">' + escapeHtml(getF_(rec, 'اسم_الطالب') || '') + '</td>'
            + '<td class="data-cell">' + formatClassShared_(escapeHtml(getF_(rec, 'الصف')), escapeHtml(getF_(rec, 'الفصل'))) + '</td>'
            + '<td class="data-cell">' + escapeHtml(getF_(rec, 'نوع_التأخر') || 'تأخر صباحي') + '</td>'
            + '<td class="data-cell">' + escapeHtml(getF_(rec, 'التاريخ_هجري') || '') + '</td>'
            + '<td class="data-cell" style="color:green;font-weight:bold">تم</td>'
            + '</tr>';
    });
    var win = window.open('', '_blank');
    win.document.write(buildSharedPrintPage_({
        title: 'تقرير التواصل مع أولياء الأمور',
        subtitle: 'التأخر - ' + currentStage,
        dateText: hijri + ' | عدد الطلاب: ' + toArShared_(sent.length),
        colCount: 6,
        headers: '<th class="col-header">م</th><th class="col-header" style="width:28%">اسم الطالب</th><th class="col-header">الصف</th><th class="col-header">نوع التأخر</th><th class="col-header">التاريخ</th><th class="col-header">التواصل</th>',
        rows: rows,
        total: toArShared_(sent.length) + ' سجل'
    }));
    win.document.close(); setTimeout(function(){ win.focus(); win.print(); }, 300);
}

</script>
