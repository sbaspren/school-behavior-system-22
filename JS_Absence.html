// =================================================================
// 5. استيراد Excel من نظام نور
// =================================================================
function handleExcelImport(input) {
    if (!input.files || !input.files[0]) return;
    
    const file = input.files[0];
    showEnhancedToast('info', 'جاري قراءة الملف...');
    
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            
            // ★ معالجة الخلايا المدمجة (merged cells) — ملء القيم للأسفل
            if (sheet['!merges']) {
                sheet['!merges'].forEach(function(merge) {
                    var startR = merge.s.r, startC = merge.s.c;
                    var endR = merge.e.r;
                    var cellRef = XLSX.utils.encode_cell({r: startR, c: startC});
                    var srcCell = sheet[cellRef];
                    if (srcCell) {
                        for (var r = startR + 1; r <= endR; r++) {
                            var targetRef = XLSX.utils.encode_cell({r: r, c: startC});
                            if (!sheet[targetRef]) {
                                sheet[targetRef] = {t: srcCell.t, v: srcCell.v};
                                if (srcCell.w) sheet[targetRef].w = srcCell.w;
                            }
                        }
                    }
                });
            }
            
            const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
            
            // ★ تأمين إضافي: ملء الفراغات في الأعمدة الرئيسية (الفصل/المرحلة)
            fillDownEmptyCells(jsonData);
            
            processNoorExcelData(jsonData);
        } catch (err) {
            showEnhancedToast('error', 'خطأ في قراءة الملف: ' + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
    input.value = '';
}

// ★ ملء الخلايا الفارغة في الأعمدة الرئيسية (الفصل، المرحلة) من أعلى لأسفل
function fillDownEmptyCells(data) {
    if (!data || data.length < 2) return;
    
    // تحديد صف الرؤوس
    var headerRowIdx = -1;
    for (var i = 0; i < Math.min(10, data.length); i++) {
        if (data[i] && data[i].some(function(c) { return c && String(c).includes('الإسم'); })) {
            headerRowIdx = i;
            break;
        }
    }
    if (headerRowIdx === -1) return;
    
    var headers = data[headerRowIdx];
    // الأعمدة التي يجب ملؤها: الفصل، المرحلة، نوع الغياب
    var fillCols = [];
    headers.forEach(function(h, idx) {
        if (h && (String(h).includes('الفصل') || String(h).includes('المرحلة') || String(h).includes('نوع'))) {
            fillCols.push(idx);
        }
    });
    
    // ملء من أعلى لأسفل
    for (var c = 0; c < fillCols.length; c++) {
        var colIdx = fillCols[c];
        var lastVal = '';
        for (var r = headerRowIdx + 1; r < data.length; r++) {
            if (!data[r]) continue;
            var val = data[r][colIdx];
            if (val && String(val).trim()) {
                lastVal = String(val).trim();
            } else if (lastVal) {
                data[r][colIdx] = lastVal;
            }
        }
    }
}

function processNoorExcelData(data) {
    // البحث عن صف الرؤوس
    let headerRowIndex = -1;
    for (let i = 0; i < Math.min(10, data.length); i++) {
        const row = data[i];
        if (row && row.some(cell => cell && String(cell).includes('الإسم'))) {
            headerRowIndex = i;
            break;
        }
    }
    
    if (headerRowIndex === -1) {
        showEnhancedToast('error', 'لم يتم التعرف على هيكل الملف');
        return;
    }
    
    const headers = data[headerRowIndex];
    const nameCol = headers.findIndex(h => h && String(h).includes('الإسم'));
    const idCol = headers.findIndex(h => h && String(h).includes('الهوية'));
    const phoneCol = headers.findIndex(h => h && String(h).includes('الجوال'));
    const stageCol = headers.findIndex(h => h && String(h).includes('المرحلة'));
    const classCol = headers.findIndex(h => h && String(h).includes('الفصل'));
    const typeCol = headers.findIndex(h => h && String(h).includes('نوع'));
    
    var enrichedCount = 0, totalCount = 0;
    const students = [];
    for (let i = headerRowIndex + 1; i < data.length; i++) {
        const row = data[i];
        if (!row || !row[nameCol]) continue;
        
        var studentId = String(row[idCol] || '').trim();
        var studentName = String(row[nameCol] || '').trim();
        var excelPhone = String(row[phoneCol] || '').trim();
        var excelGrade = String(row[stageCol] || '').trim();
        var excelClass = String(row[classCol] || '').trim();
        
        // ★ البحث في بيانات الطلاب الأصلية لجلب الصف والفصل الصحيح
        var matched = null;
        if (APP_DATA && APP_DATA.students && APP_DATA.students.length > 0) {
            // المحاولة ١: بالرقم (رقم الهوية)
            if (studentId) {
                matched = APP_DATA.students.find(function(s) {
                    return String(s['رقم الطالب'] || s['رقم_الطالب'] || '').trim() === studentId;
                });
            }
            // المحاولة ٢: بالاسم (تطابق كامل بعد تنظيف المسافات)
            if (!matched && studentName) {
                var cleanName = studentName.replace(/\s+/g, ' ').trim();
                matched = APP_DATA.students.find(function(s) {
                    var sName = String(s['اسم الطالب'] || s['اسم_الطالب'] || '').replace(/\s+/g, ' ').trim();
                    return sName === cleanName;
                });
                // المحاولة ٣: بدون "بن" مقابل بمسافة
                if (!matched) {
                    var normName = cleanName.replace(/\s+بن\s+/g, ' ');
                    matched = APP_DATA.students.find(function(s) {
                        var sName = String(s['اسم الطالب'] || s['اسم_الطالب'] || '').replace(/\s+/g, ' ').trim().replace(/\s+بن\s+/g, ' ');
                        return sName === normName;
                    });
                }
                // المحاولة ٤: بدون تشكيل + تطبيع الألف والهمزة
                if (!matched) {
                    var normName2 = normalizeArabic_(cleanName);
                    matched = APP_DATA.students.find(function(s) {
                        var sName = normalizeArabic_(String(s['اسم الطالب'] || s['اسم_الطالب'] || ''));
                        return sName === normName2;
                    });
                }
                // المحاولة ٥: الاسم الأول + الأخير (تطابق جزئي)
                if (!matched) {
                    var nameParts = cleanName.split(' ');
                    if (nameParts.length >= 2) {
                        var firstName = nameParts[0];
                        var lastName = nameParts[nameParts.length - 1];
                        var candidates = APP_DATA.students.filter(function(s) {
                            var sName = String(s['اسم الطالب'] || s['اسم_الطالب'] || '').replace(/\s+/g, ' ').trim();
                            var sParts = sName.split(' ');
                            return sParts.length >= 2 && sParts[0] === firstName && sParts[sParts.length - 1] === lastName;
                        });
                        if (candidates.length === 1) matched = candidates[0]; // فقط لو نتيجة وحيدة
                    }
                }
            }
        }
        
        var finalGrade, finalClass, finalPhone;
        if (matched) {
            finalGrade = matched['الصف'] || excelGrade;
            finalClass = matched['الفصل'] || excelClass;
            finalPhone = matched['رقم الجوال'] || excelPhone;
            enrichedCount++;
        } else {
            // لم يُطابق — نحاول فصل عمود الفصل المدمج من نور
            // مثال: "الثالث الثانوي المسار العام / 2" → الصف: "الثالث الثانوي المسار العام" ، الفصل: "2"
            if (excelClass && excelClass.includes('/')) {
                var parts = excelClass.split('/');
                finalGrade = parts[0].trim();
                finalClass = parts[parts.length - 1].trim();
            } else {
                finalGrade = excelGrade;
                finalClass = excelClass;
            }
            finalPhone = excelPhone;
        }
        
        students.push({
            id: studentId,
            name: studentName,
            phone: finalPhone,
            grade: finalGrade,
            class: finalClass,
            absenceType: row[typeCol] ? String(row[typeCol]).trim() : 'غياب بدون عذر',
            _matched: !!matched
        });
        totalCount++;
    }
    
    if (students.length === 0) {
        showEnhancedToast('warning', 'لم يتم العثور على بيانات طلاب');
        return;
    }
    
    // عرض إحصائية التطابق
    if (enrichedCount < totalCount) {
        showEnhancedToast('warning', 'تم مطابقة ' + enrichedCount + ' من ' + totalCount + ' طالب مع بيانات النظام');
    } else {
        showEnhancedToast('success', 'تم مطابقة جميع الطلاب (' + totalCount + ') مع بيانات النظام ✓');
    }
    
    // عرض نافذة التأكيد
    openExcelPreviewModal(students, enrichedCount, totalCount);
}

            + '<button onclick="_saveAsDefault()" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700 flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">bookmark</span> حفظ كقالب افتراضي</button>'

            + '<div class="flex gap-2">'

            + '<button onclick="_confirmSend()" class="px-6 py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700 flex items-center gap-2 shadow-md"><span class="material-symbols-outlined text-[18px]">send</span> إرسال</button>'

        document.body.appendChild(d.firstElementChild);
    }
    _msgEditorType = opts.type || '';
    _msgEditorData = opts.data || {};
    _msgEditorCallback = opts.onSend || null;
    document.getElementById('me-student').textContent = opts.studentName || '';
    document.getElementById('me-type-badge').textContent = opts.type || '';
    document.getElementById('me-phone').textContent = opts.phone || '';
    var cached = _templateCache[_msgEditorType];
    if (cached !== undefined) { _loadMsgEditor(cached, opts); }
    else if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(r) {
            var t = (r && r.template) ? r.template : '';
            _templateCache[_msgEditorType] = t;
            _loadMsgEditor(t, opts);
        }).withFailureHandler(function() { _templateCache[_msgEditorType]=''; _loadMsgEditor('', opts); }).getMessageTemplate(_msgEditorType);
    } else { _loadMsgEditor('', opts); }
    document.getElementById('msg-editor-modal').classList.remove('hidden');
}
function _loadMsgEditor(saved, opts) {
    var note = document.getElementById('me-tmpl-note');
    var txt;
    if (saved) {
        txt = saved; for (var k in (opts.data||{})) { txt = txt.split('{'+k+'}').join(opts.data[k]||''); }
        // ★ إضافة النص الديناميكي (مثل رابط العذر) إذا لم يكن موجوداً في القالب
        if (opts.appendText && txt.indexOf(opts.appendText.trim().substring(0, 30)) === -1) {
            // نضيفه قبل آخر سطر (التحيات)
            var lastNewline = txt.lastIndexOf('\n\nمع تحيات');
            if (lastNewline > -1) {
                txt = txt.substring(0, lastNewline) + opts.appendText + txt.substring(lastNewline);
            } else {
                txt += opts.appendText;
            }
        }
        note.classList.remove('hidden');
    } else { txt = opts.defaultMessage || ''; note.classList.add('hidden'); }
    var el = document.getElementById('me-text');
    el.value = txt; el.dataset.defaultMsg = opts.defaultMessage || '';
}
function _confirmSend() {
    var msg = document.getElementById('me-text').value;
    if (!msg.trim()) { showEnhancedToast('warning', 'الرسالة فارغة'); return; }
    _closeEditor(); if (_msgEditorCallback) _msgEditorCallback(msg);
}
function _saveAsDefault() {
    var msg = document.getElementById('me-text').value;
    var tmpl = msg;
    var entries = [];
    for (var k in _msgEditorData) { if (_msgEditorData[k] && String(_msgEditorData[k]).trim()) entries.push({k:k,v:String(_msgEditorData[k])}); }
    entries.sort(function(a,b){return b.v.length-a.v.length;});
    entries.forEach(function(e){ tmpl = tmpl.split(e.v).join('{'+e.k+'}'); });
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(r) {
            if (r && r.success) { _templateCache[_msgEditorType]=tmpl; showEnhancedToast('success','تم حفظ القالب كافتراضي ✓'); document.getElementById('me-tmpl-note').classList.remove('hidden'); }
            else showEnhancedToast('danger','فشل الحفظ');

var selected_abs = new Set();

function toggleSelect_abs(idx) {
    if (selected_abs.has(idx)) selected_abs.delete(idx);
    else selected_abs.add(idx);
    updateSelBar_abs();
    var allChks = document.querySelectorAll('.sel-abs');
    var sa = document.getElementById('sel-all-abs');
    if (sa) sa.checked = selected_abs.size === allChks.length && allChks.length > 0;
}

function toggleSelectAll_abs(cb) {
    document.querySelectorAll('.sel-abs').forEach(function(c) {
        c.checked = cb.checked;
        var idx = parseInt(c.dataset.idx);
        if (cb.checked) selected_abs.add(idx);
        else selected_abs.delete(idx);
    });
    updateSelBar_abs();
}

function updateSelBar_abs() {
    var bar = document.getElementById('sel-bar-abs');
    if (!bar) return;
    if (selected_abs.size > 0) {
        bar.classList.remove('hidden');
        document.getElementById('sel-cnt-abs').textContent = toArShared_(selected_abs.size);
    } else bar.classList.add('hidden');
}

function clearSel_abs() {
    selected_abs.clear();
    document.querySelectorAll('.sel-abs').forEach(function(c){ c.checked=false; });
    var sa = document.getElementById('sel-all-abs'); if(sa) sa.checked=false;
    updateSelBar_abs();
}

function getSelectedRecords_abs() {
    if (selected_abs.size === 0) return absenceTodayRecords.slice();
    return Array.from(selected_abs).sort().map(function(i){ return absenceTodayRecords[i]; }).filter(Boolean);
}

function injectCheckboxes_abs() {
    var table = document.querySelector('#abs-today-table table');
    if (!table) return;
    selected_abs.clear();
    var thead = table.querySelector('thead tr');
    if (thead && !thead.querySelector('.sel-all-th')) {
        var th = document.createElement('th');
        th.className = 'px-2 py-3 w-8 sel-all-th';
        th.innerHTML = '<input type="checkbox" id="sel-all-abs" onchange="toggleSelectAll_abs(this)" class="w-4 h-4 rounded accent-indigo-600 cursor-pointer">';
        thead.insertBefore(th, thead.firstChild);
    }
    var rows = table.querySelectorAll('tbody tr');
    var dataIdx = 0;
    rows.forEach(function(row) {
        if (row.querySelector('td[colspan]') || row.children.length <= 1) {
            var td = row.querySelector('td[colspan]');
            if (td) td.colSpan = parseInt(td.colSpan || td.children.length) + 1;

        }
        var td = document.createElement('td');

        td.innerHTML = '<input type="checkbox" class="sel-abs w-4 h-4 rounded accent-indigo-600 cursor-pointer" data-idx="' + dataIdx + '" onchange="toggleSelect_abs(' + dataIdx + ')">';
        row.insertBefore(td, row.firstChild);

        var bar = document.createElement('div');

function printTodayAbsence() {
    var _printRecs = (typeof getSelectedRecords_abs === 'function') ? getSelectedRecords_abs() : absenceTodayRecords;
    if (_printRecs.length === 0) { showEnhancedToast('warning', 'لا يوجد بيانات للطباعة'); return; }
    var today = new Date();
    var hijri = today.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var miladi = today.toLocaleDateString('ar-SA', { day: 'numeric', month: 'long', year: 'numeric' });

    var rows = '', lastKey = '';

        var key = grade + cls;
        if (key !== lastKey && i > 0) rows += '<tr class="sep-row"><td colspan="6"></td></tr>';

            + '</tr>';

        title: 'كشف الغياب اليومي ليوم ' + dayName,

function getExcuseDaysBadge(excuse) {
    if (!excuse.miladiDate) return '';
    try {
        var submitted = new Date(excuse.miladiDate);
        if (isNaN(submitted.getTime())) return '';
        var now = new Date();
        now.setHours(0,0,0,0);
        submitted.setHours(0,0,0,0);
        var diff = Math.floor((now - submitted) / (1000 * 60 * 60 * 24));
        if (diff < 0) diff = 0;
        if (diff > 5) return '';
        var color = diff <= 1 ? 'green' : (diff <= 3 ? 'amber' : 'red');
        var text = diff === 0 ? 'اليوم' : (diff === 1 ? 'مضى يوم' : 'مضى ' + diff + ' أيام');
        return '<span class="px-2 py-0.5 text-xs rounded-full bg-' + color + '-100 text-' + color + '-700 font-bold flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">timer</span>' + text + '</span>';
    } catch(e) { return ''; }
}

function filterExcusesByDate(excuses) {
    if (excuseDateFilter === 'all') return excuses;
    var now = new Date();
    var startDate = new Date();
    if (excuseDateFilter === 'week') {
        var day = now.getDay();
        startDate.setDate(now.getDate() - day);
    } else if (excuseDateFilter === 'month') {
        startDate.setDate(1);
    }
    startDate.setHours(0,0,0,0);
    return excuses.filter(function(e) {
        try {
            // ★ استخدام التاريخ الميلادي (miladiDate) بدلاً من الهجري
            var dateStr = e.miladiDate || '';
            if (!dateStr) return true; // إذا لا يوجد تاريخ ميلادي، أظهره
            var d = new Date(dateStr);
            return !isNaN(d.getTime()) && d >= startDate;
        } catch(err) { return true; }
    });
}

function groupExcusesByDay(excuses) {
    var days = {};
    var dayOrder = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس'];
    excuses.forEach(function(e) {
        var dayName = e.day || '';
        if (!dayName) {
            try {
                // ★ استخدام التاريخ الميلادي
                var d = new Date(e.miladiDate || '');
                if (!isNaN(d.getTime())) {
                    dayName = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'][d.getDay()] || 'غير محدد';
                } else {
                    dayName = 'غير محدد';
                }
            } catch(err) { dayName = 'غير محدد'; }
        }
        if (!days[dayName]) days[dayName] = [];
        days[dayName].push(e);
    });
    var sorted = [];
    dayOrder.forEach(function(d) { if (days[d]) sorted.push({day: d, items: days[d]}); });
    for (var k in days) { if (dayOrder.indexOf(k) < 0) sorted.push({day: k, items: days[k]}); }
    return sorted;
}

function displayExcusesList(filter) {
    const container = document.getElementById('excuses-container');

    let filtered = absenceExcusesRecords;
    if (filter !== 'all') {
        filtered = absenceExcusesRecords.filter(e => e.status === filter);
    }
    filtered = filterExcusesByDate(filtered);

    // ★ ترتيب: الأحدث أولاً (بالتاريخ الميلادي)
    filtered.sort(function(a, b) {
        var dateA = a.miladiDate || '0000-00-00';
        var dateB = b.miladiDate || '0000-00-00';
        if (dateA !== dateB) return dateB.localeCompare(dateA);
        // إذا نفس التاريخ، أعذار أولياء الأمور أولاً
        if (a.source === 'parent' && b.source !== 'parent') return -1;
        if (b.source === 'parent' && a.source !== 'parent') return 1;
        return (parseInt(b.id.replace('pe_','')) || 0) - (parseInt(a.id.replace('pe_','')) || 0);
    });

    if (filtered.length === 0) {
        displayEmptyExcuses();
        return;
    }

    let html = '';

    if (excuseDateFilter === 'week') {
        var groups = groupExcusesByDay(filtered);
        groups.forEach(function(group) {
            html += '<div class="mb-5"><div class="flex items-center gap-2 mb-3 px-1"><span class="material-symbols-outlined text-purple-500 text-[18px]">calendar_today</span><h3 class="font-bold text-purple-700 text-sm">' + group.day + ' <span class="text-gray-400 font-normal">(' + group.items.length + ')</span></h3><div class="flex-1 h-px bg-purple-100"></div></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
            group.items.forEach(function(excuse) { html += buildExcuseCard(excuse); });
            html += '</div></div>';
        });
    } else {
        html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">';
        filtered.forEach(function(excuse) { html += buildExcuseCard(excuse); });
        html += '</div>';
    }

    container.innerHTML = html;
}

function buildExcuseCard(excuse) {
    const statusClass = excuse.status === 'pending' ? 'amber' : (excuse.status === 'approved' ? 'green' : 'red');
    const statusText = excuse.status === 'pending' ? 'معلق' : (excuse.status === 'approved' ? 'مقبول' : 'مرفوض');
    const statusIcon = excuse.status === 'pending' ? 'schedule' : (excuse.status === 'approved' ? 'check_circle' : 'cancel');
    const isParent = excuse.source === 'parent';
    const daysBadge = isParent && excuse.status === 'pending' ? getExcuseDaysBadge(excuse) : '';

    // لون الحدود حسب الحالة (مثل بطاقة المعتمد)
    var border = 'border-gray-200';
    if (excuse.status === 'pending') border = isParent ? 'border-purple-400' : 'border-amber-400';
    else if (excuse.status === 'approved') border = 'border-green-400';
    else border = 'border-red-400';

    // شارة المصدر
    var sourceTag = isParent
        ? '<span class="text-[10px] font-bold text-purple-800 bg-purple-100 px-2 py-0.5 rounded-full border border-purple-300">ولي أمر</span>'
        : '<span class="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-0.5 rounded-full border border-gray-300">يومي</span>';

    // شارة المرفقات
    var attachTag = excuse.hasAttachment
        ? '<span class="text-[10px] font-bold text-blue-700 bg-blue-100 px-2 py-0.5 rounded-full border border-blue-300">📎 مرفق</span>'
        : '';

    // ★ شارة "جديد" للأعذار المقدمة اليوم
    var newTag = '';
    if (excuse.source === 'parent' && excuse.miladiDate) {
        try {
            var today = new Date(); today.setHours(0,0,0,0);
            var excDate = new Date(excuse.miladiDate); excDate.setHours(0,0,0,0);
            var diffDays = Math.floor((today - excDate) / (1000*60*60*24));
            if (diffDays === 0) {
                newTag = '<span class="text-[10px] font-bold text-white bg-red-500 px-2 py-0.5 rounded-full animate-pulse">🆕 جديد</span>';
            } else if (diffDays === 1) {
                newTag = '<span class="text-[10px] font-bold text-orange-700 bg-orange-100 px-2 py-0.5 rounded-full border border-orange-300">أمس</span>';
            }
        } catch(e) {}
    }

    // أزرار الإجراءات (مثل نمط المعتمد)
    var actions = '';
    if (excuse.status === 'pending') {
        actions += '<button onclick="event.stopPropagation();approveExcuse(\'' + excuse.id + '\')" class="flex-1 flex items-center justify-center gap-1 px-2 py-1.5 bg-green-50 text-green-700 rounded-lg hover:bg-green-100 text-[11px] font-bold border border-green-200"><span class="material-symbols-outlined text-[14px]">check_circle</span> قبول</button>';
        actions += '<button onclick="event.stopPropagation();rejectExcuse(\'' + excuse.id + '\')" class="flex-1 flex items-center justify-center gap-1 px-2 py-1.5 bg-red-50 text-red-700 rounded-lg hover:bg-red-100 text-[11px] font-bold border border-red-200"><span class="material-symbols-outlined text-[14px]">cancel</span> رفض</button>';
        actions += '<button onclick="event.stopPropagation();openExcuseMessageModal(\'' + excuse.id + '\')" class="flex-1 flex items-center justify-center gap-1 px-2 py-1.5 bg-blue-50 text-blue-700 rounded-lg hover:bg-blue-100 text-[11px] font-bold border border-blue-200"><span class="material-symbols-outlined text-[14px]">message</span> رسالة</button>';
    }

    return '<div class="bg-white rounded-xl border-2 ' + border + ' p-4 hover:shadow-md transition-all relative cursor-pointer" onclick="openExcuseDetailsModal(\'' + excuse.id + '\')">'
        // ★ أيقونة الحالة (أعلى يسار) - مثل نسبة المواظبة في المعتمد
        + '<div class="absolute top-3 left-3 flex items-center gap-1">'
        + '<div class="w-8 h-8 bg-' + statusClass + '-100 rounded-full flex items-center justify-center">'
        + '<span class="material-symbols-outlined text-' + statusClass + '-600 text-[18px]">' + statusIcon + '</span>'
        + '</div>'
        + '<span class="text-[11px] font-bold text-' + statusClass + '-700">' + statusText + '</span>'
        + '</div>'
        // ★ شارات (أعلى يمين) - مثل badge الحالة في المعتمد
        + '<div class="absolute top-3 right-3 flex gap-1">'
        + newTag + sourceTag + attachTag + daysBadge
        + '</div>'
        // ★ اسم الطالب + الصف (وسط)
        + '<div class="mt-10 mb-3">'
        + '<h3 class="font-bold text-gray-800 text-sm leading-tight">' + escapeHtml(excuse.studentName || '-') + '</h3>'
        + '<p class="text-xs text-gray-500 mt-0.5">' + escapeHtml(excuse.className || '-') + '</p>'
        + '</div>'
        // ★ معلومات العذر (3 أعمدة مثل المعتمد)
        + '<div class="grid grid-cols-3 gap-2 text-center mb-3">'
        + '<div class="rounded-lg py-1.5 bg-gray-50"><p class="text-[11px] font-bold text-gray-800 leading-tight truncate px-1">' + escapeHtml(excuse.absenceDate || '-') + '</p><p class="text-[9px] text-gray-500">التاريخ</p></div>'
        + '<div class="rounded-lg py-1.5 bg-gray-50"><p class="text-[11px] font-bold text-gray-800 leading-tight truncate px-1">' + escapeHtml(excuse.day || '-') + '</p><p class="text-[9px] text-gray-500">اليوم</p></div>'
        + '<div class="rounded-lg py-1.5 bg-gray-50"><p class="text-[11px] font-bold text-gray-800 leading-tight truncate px-1">' + escapeHtml(excuse.reason || '-') + '</p><p class="text-[9px] text-gray-500">العذر</p></div>'
        + '</div>'
        // ★ أزرار الإجراءات (أسفل) - مثل المعتمد
        + (actions ? '<div class="flex gap-1.5 flex-wrap" onclick="event.stopPropagation()">' + actions + '</div>' : '')
        + '</div>';
}

function printExcusesReport() {
    if (absenceExcusesRecords.length === 0) { showEnhancedToast('warning', 'لا يوجد أعذار للطباعة'); return; }

    var today = new Date();
    var hijri = today.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var miladi = today.toLocaleDateString('ar-SA', { day: 'numeric', month: 'long', year: 'numeric' });
    var dayName = today.toLocaleDateString('ar-SA', { weekday: 'long' });
    var stageName = getStageName_(currentStage);

    // فلترة حسب الفترة المحددة
    var filtered = filterExcusesByDate(absenceExcusesRecords);

    // تقسيم: أعذار مقدمة (معلق + مقبول) و بدون عذر (مرفوض)
    var withExcuse = filtered.filter(function(e) { return e.status === 'pending' || e.status === 'approved'; });
    var withoutExcuse = filtered.filter(function(e) { return e.status === 'rejected'; });

    // ترتيب حسب الفصل
    withExcuse.sort(function(a,b) {
        var ka = (a.className||'') + (a.studentName||'');
        var kb = (b.className||'') + (b.studentName||'');
        return ka.localeCompare(kb, 'ar');
    });
    withoutExcuse.sort(function(a,b) {
        var ka = (a.className||'') + (a.studentName||'');
        var kb = (b.className||'') + (b.studentName||'');
        return ka.localeCompare(kb, 'ar');
    });

    // بناء صفوف أعذار مقدمة
    var rowsWithExcuse = '';
    withExcuse.forEach(function(e, i) {
        var statusText = e.status === 'pending' ? 'معلق' : 'مقبول';
        var statusColor = e.status === 'pending' ? '#d97706' : '#16a34a';
        var source = e.source === 'parent' ? 'ولي أمر' : 'يومي';
        rowsWithExcuse += '<tr>'
            + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
            + '<td class="name-cell">' + escapeHtml(e.studentName || '-') + '</td>'
            + '<td class="data-cell">' + escapeHtml(e.className || '-') + '</td>'
            + '<td class="detail-cell">' + escapeHtml(e.reason || '-') + '</td>'
            + '<td class="data-cell">' + escapeHtml(e.absenceDate || '-') + '</td>'
            + '<td class="data-cell" style="color:' + statusColor + ';font-weight:bold">' + statusText + '</td>'
            + '<td class="data-cell">' + source + '</td>'
            + '</tr>';
    });

    // بناء صفوف بدون عذر (مرفوض)
    var rowsWithoutExcuse = '';
    withoutExcuse.forEach(function(e, i) {
        rowsWithoutExcuse += '<tr>'
            + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
            + '<td class="name-cell">' + escapeHtml(e.studentName || '-') + '</td>'
            + '<td class="data-cell">' + escapeHtml(e.className || '-') + '</td>'
            + '<td class="detail-cell">' + escapeHtml(e.reason || '-') + '</td>'
            + '<td class="data-cell">' + escapeHtml(e.absenceDate || '-') + '</td>'
            + '<td class="data-cell">' + escapeHtml(e.details || '-') + '</td>'
            + '</tr>';
    });

    var filterLabel = excuseDateFilter === 'week' ? ' (هذا الأسبوع)' : (excuseDateFilter === 'month' ? ' (هذا الشهر)' : '');

    // صفحة طباعة أولى: أعذار مقدمة
    var page1 = buildSharedPrintPage_({
        title: 'كشف الأعذار المقدمة' + filterLabel,
        subtitle: stageName,
        dateText: hijri + ' \u00A0الموافق\u00A0 ' + miladi + ' م',
        colCount: 7,
        headers: '<th class="col-header" style="width:5%">م</th><th class="col-header" style="width:22%">اسم الطالب</th><th class="col-header" style="width:10%">الفصل</th><th class="col-header" style="width:25%">العذر</th><th class="col-header" style="width:13%">تاريخ الغياب</th><th class="col-header" style="width:10%">الحالة</th><th class="col-header" style="width:8%">المصدر</th>',
        rows: rowsWithExcuse || '<tr><td colspan="7" class="data-cell" style="padding:20px;color:#999">لا توجد أعذار مقدمة</td></tr>',
        total: toArShared_(withExcuse.length) + ' طالب'
    });

    // صفحة طباعة ثانية: مرفوض / بدون عذر
    var page2 = buildSharedPrintPage_({
        title: 'كشف الأعذار المرفوضة' + filterLabel,
        subtitle: stageName,
        dateText: hijri + ' \u00A0الموافق\u00A0 ' + miladi + ' م',
        colCount: 6,
        headers: '<th class="col-header" style="width:5%">م</th><th class="col-header" style="width:24%">اسم الطالب</th><th class="col-header" style="width:10%">الفصل</th><th class="col-header" style="width:25%">العذر المقدم</th><th class="col-header" style="width:13%">تاريخ الغياب</th><th class="col-header" style="width:18%">سبب الرفض</th>',
        rows: rowsWithoutExcuse || '<tr><td colspan="6" class="data-cell" style="padding:20px;color:#999">لا توجد أعذار مرفوضة</td></tr>',
        total: toArShared_(withoutExcuse.length) + ' طالب'
    });

    // فتح نافذتين
    var win1 = window.open('', '_blank');
    win1.document.write(page1); win1.document.close();
    setTimeout(function(){ win1.print(); }, 300);

    if (withoutExcuse.length > 0) {
        setTimeout(function() {
            var win2 = window.open('', '_blank');
            win2.document.write(page2); win2.document.close();
            setTimeout(function(){ win2.print(); }, 300);
        }, 500);
    }
}

function populateReportsFilters() {
    const gradeSelect = document.getElementById('rep-grade');
    const classSelect = document.getElementById('rep-class');
    
    if (APP_DATA && APP_DATA.students) {
        const grades = [...new Set(APP_DATA.students.filter(s => s['المرحلة'] === currentStage).map(s => s['الصف']))];
        grades.forEach(g => gradeSelect.add(new Option(g, g)));
    }
    
    gradeSelect.addEventListener('change', function() {
        classSelect.innerHTML = '<option value="">كل الفصول</option>';
        if (this.value && APP_DATA && APP_DATA.students) {
            const classes = [...new Set(APP_DATA.students.filter(s => s['المرحلة'] === currentStage && s['الصف'] === this.value).map(s => s['الفصل']))];
            classes.forEach(c => classSelect.add(new Option(c, c)));
        }
    });
}

function loadReportsData() {
    const grade = document.getElementById('rep-grade').value;
    const cls = document.getElementById('rep-class').value;
    const dateFrom = document.getElementById('rep-from').value;
    const dateTo = document.getElementById('rep-to').value;
    const type = document.getElementById('rep-type').value;
    
    showEnhancedToast('info', 'جاري تحميل التقارير...');
    
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
            .withSuccessHandler(function(result) {
                if (result && result.success) {
                    displayReportsData(result.stats);
                    showEnhancedToast('success', 'تم تحميل التقارير');
                } else {
                    showEnhancedToast('error', result.error || 'فشل التحميل');
                }
            })
            .getAbsenceStatistics(currentStage, dateFrom, dateTo, grade, cls, type);
    } else {
        // وضع تجريبي
        displayReportsData({
            total: 0, withExcuse: 0, withoutExcuse: 0, late: 0,
            topStudents: [], byClass: {}, byDay: {}
        });
    }
}

function displayReportsData(stats) {
    // تحديث الإحصائيات
    document.getElementById('stat-total').textContent = stats.total || 0;
    document.getElementById('stat-unexcused').textContent = stats.withoutExcuse || 0;
    document.getElementById('stat-excused').textContent = stats.withExcuse || 0;
    document.getElementById('stat-late').textContent = stats.late || 0;
    
    // أكثر الطلاب غياباً
    const topContainer = document.getElementById('top-absent-students');
    if (stats.topStudents && stats.topStudents.length > 0) {
        let html = '<div class="space-y-2">';
        stats.topStudents.forEach((s, i) => {
            html += `
                <div class="flex items-center justify-between p-2 rounded-lg ${i < 3 ? 'bg-red-50' : 'bg-gray-50'}">
                    <div class="flex items-center gap-2">
                        <span class="w-6 h-6 rounded-full ${i < 3 ? 'bg-red-500 text-white' : 'bg-gray-300 text-gray-600'} flex items-center justify-center text-xs font-bold">${i + 1}</span>
                        <span class="text-sm font-medium">${escapeHtml(s.name)}</span>
                    </div>
                    <span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs font-bold">${s.count} يوم</span>
                </div>
            `;
        });
        html += '</div>';
        topContainer.innerHTML = html;
    } else {
        topContainer.innerHTML = '<p class="text-gray-400 text-center py-8">لا توجد بيانات</p>';
    }
    
    // الغياب حسب الفصل
    const classContainer = document.getElementById('absence-by-class');
    if (stats.byClass && Object.keys(stats.byClass).length > 0) {
        let html = '<div class="space-y-2">';
        Object.entries(stats.byClass).sort((a, b) => b[1] - a[1]).forEach(([cls, count]) => {
            const percent = stats.total > 0 ? Math.round((count / stats.total) * 100) : 0;
            html += `
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium w-32 truncate">${cls}</span>
                    <div class="flex-1 bg-gray-200 rounded-full h-4">
                        <div class="bg-indigo-500 h-4 rounded-full" style="width: ${percent}%"></div>
                    </div>
                    <span class="text-sm font-bold text-gray-600 w-12 text-left">${count}</span>
                </div>
            `;
        });
        html += '</div>';
        classContainer.innerHTML = html;
    } else {
        classContainer.innerHTML = '<p class="text-gray-400 text-center py-8">لا توجد بيانات</p>';
    }
    
    // الغياب حسب اليوم
    const dayContainer = document.getElementById('absence-by-day');
    if (stats.byDay && Object.keys(stats.byDay).length > 0) {
        let html = '<div class="flex justify-center gap-4 flex-wrap">';
        const days = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس'];
        days.forEach(day => {
            const count = stats.byDay[day] || 0;
            const percent = stats.total > 0 ? Math.round((count / stats.total) * 100) : 0;
            html += `
                <div class="text-center p-4 bg-gray-50 rounded-xl w-24">
                    <div class="text-2xl font-black text-emerald-600 mb-1">${count}</div>
                    <div class="text-xs text-gray-500">${day}</div>
                    <div class="text-[10px] text-gray-400 mt-1">${percent}%</div>
                </div>
            `;
        });
        html += '</div>';
        dayContainer.innerHTML = html;
    } else {
        dayContainer.innerHTML = '<p class="text-gray-400 text-center py-8">لا توجد بيانات</p>';
    }
}

function saveAbsenceRecord() {
    const selected = document.querySelectorAll('.abs-student-cb:checked');
    if (selected.length === 0) {
        showEnhancedToast('warning', 'يرجى اختيار طالب واحد على الأقل');

    const absenceType = document.getElementById('abs-add-type').value;

    selected.forEach(cb => {

            id: cb.dataset.id,
            name: cb.dataset.name,
            grade: cb.dataset.grade,
            class: cb.dataset.class,
            phone: cb.dataset.phone
        });
    });
    
    closeAbsenceAddModal();
    showEnhancedToast('info', 'جاري الحفظ...');
    
    if (typeof google !== 'undefined' && google.script && google.script.run) {

            .withSuccessHandler(function(result) {
                if (result && result.success) {

                    showEnhancedToast('error', result.error || 'فشل الحفظ');

function executePrint() {
    document.getElementById('print-modal').classList.add('hidden');
    var printType = document.getElementById('print-type') ? document.getElementById('print-type').value : 'class_report';
    var filterClass = document.getElementById('print-filter-class') ? document.getElementById('print-filter-class').value : '';
    var records = allAbsenceData || [];
    if (filterClass) {
        records = records.filter(function(r) {
            return (r.grade + ' / ' + r.class) === filterClass || (r.grade + '/' + r.class) === filterClass;
        });
    }
    if (records.length === 0) { showEnhancedToast('warning', 'لا توجد بيانات'); return; }
    var hijri = new Date().toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var stageName = getStageName_(currentStage);
    
    if (printType === 'discipline_report') {
        // كشف المتميزين بالانضباط (صفر غياب)
        var disciplined = records.filter(function(r) { return (r.unexcused || 0) === 0 && (r.excused || 0) === 0; });
        if (disciplined.length === 0) { showEnhancedToast('warning', 'لا يوجد طلاب بصفر غياب'); return; }
        var rows = '';
        disciplined.forEach(function(rec, i) {
            rows += '<tr>'
                + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
                + '<td class="name-cell">' + escapeHtml(rec.name || '') + '</td>'
                + '<td class="data-cell">' + formatClassShared_(rec.grade || '', rec.class || '') + '</td>'
                + '</tr>';
        });
        var win = window.open('', '_blank');
        win.document.write(buildSharedPrintPage_({
            title: 'كشف المتميزين بالانضباط',
            subtitle: stageName + (filterClass ? ' - ' + filterClass : ''),
            dateText: hijri,
            colCount: 3,
            headers: '<th class="col-header" style="width:8%">م</th><th class="col-header" style="width:55%">اسم الطالب</th><th class="col-header" style="width:20%">الصف</th>',
            rows: rows,
            total: toArShared_(disciplined.length) + ' طالب'
        }));
        win.document.close(); setTimeout(function(){ win.print(); }, 300);
    } else {
        // كشف متابعة غياب
        records.sort(function(a, b) {
            var gA = a.grade || '', gB = b.grade || '';
            if (gA !== gB) return gA.localeCompare(gB, 'ar');
            var cA = String(a.class || ''), cB = String(b.class || '');
            if (cA !== cB) return cA.localeCompare(cB, 'ar');
            return (a.name || '').localeCompare(b.name || '', 'ar');
        });
        var rows = '', lastKey = '';
        records.forEach(function(rec, i) {
            var key = (rec.grade || '') + (rec.class || '');
            if (key !== lastKey && i > 0) rows += '<tr class="sep-row"><td colspan="7"></td></tr>';
            lastKey = key;
            var total = (rec.unexcused || 0) + (rec.excused || 0);
            rows += '<tr>'
                + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
                + '<td class="name-cell">' + escapeHtml(rec.name || '') + '</td>'
                + '<td class="data-cell">' + formatClassShared_(rec.grade || '', rec.class || '') + '</td>'
                + '<td class="data-cell">' + toArShared_(rec.unexcused || 0) + '</td>'
                + '<td class="data-cell">' + toArShared_(rec.excused || 0) + '</td>'
                + '<td class="data-cell" style="font-weight:bold">' + toArShared_(total) + '</td>'
                + '<td class="data-cell">' + toArShared_(rec.sentCount || 0) + '</td>'
                + '</tr>';
        });
        var win = window.open('', '_blank');
        win.document.write(buildSharedPrintPage_({
            title: 'كشف متابعة الغياب',
            subtitle: stageName + (filterClass ? ' - ' + filterClass : ''),
            dateText: hijri + ' | عدد الطلاب: ' + toArShared_(records.length),
            colCount: 7,
            headers: '<th class="col-header" style="width:5%">م</th><th class="col-header" style="width:26%">اسم الطالب</th><th class="col-header" style="width:10%">الصف</th><th class="col-header">بدون عذر</th><th class="col-header">بعذر</th><th class="col-header">الإجمالي</th><th class="col-header">الرسائل</th>',
            rows: rows,
            total: toArShared_(records.length) + ' طالب'
        }));
        win.document.close(); setTimeout(function(){ win.print(); }, 300);
    }
}

function loadAbsenceData() {
    const container = document.getElementById('absence-container');
    if (container) container.innerHTML = '<div class="text-center py-16"><div class="loading-bar mx-auto"><div class="loading-bar-progress"></div></div><p class="text-gray-500 mt-4">جاري تحميل البيانات...</p></div>';
    
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
            .withSuccessHandler(function(result) {
                allAbsenceData = (result && result.success) ? (result.records || []) : [];
                populateAbsenceFilters();
                filterAbsence();
            })
            .withFailureHandler(function(err) {
                console.error('خطأ:', err);
                allAbsenceData = [];
                const c = document.getElementById('absence-container');
                if (c) c.innerHTML = '<div class="text-center py-16"><span class="material-symbols-outlined text-red-300 text-6xl">error</span><p class="text-red-500 mt-2">حدث خطأ في تحميل البيانات</p><button onclick="loadAbsenceData()" class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">إعادة المحاولة</button></div>';
            })

    } else {
        allAbsenceData = [];
        filterAbsence();
    }
}

function populateAbsenceFilters() {
    const grades = [...new Set(allAbsenceData.map(r => r.grade).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'ar'));
    const classes = [...new Set(allAbsenceData.map(r => r.class).filter(Boolean))].sort((a,b) => String(a).localeCompare(String(b), 'ar'));
    const gradeSelect = document.getElementById('abs-grade-filter');
    const classSelect = document.getElementById('abs-class-filter');
    if (gradeSelect) gradeSelect.innerHTML = '<option value="">كل الصفوف</option>' + grades.map(g => '<option value="'+escapeHtml(g)+'">'+escapeHtml(g)+'</option>').join('');
    if (classSelect) classSelect.innerHTML = '<option value="">كل الفصول</option>' + classes.map(c => '<option value="'+escapeHtml(c)+'">'+escapeHtml(c)+'</option>').join('');
}

function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.abs-filter-btn').forEach(btn => btn.classList.remove('active', 'ring-2', 'ring-offset-1', 'ring-indigo-400'));
    document.getElementById('btn-filter-' + filter)?.classList.add('active', 'ring-2', 'ring-offset-1', 'ring-indigo-400');
    filterAbsence();
}

function filterAbsence() {
    const search = (document.getElementById('abs-search')?.value || '').trim();
    const grade = document.getElementById('abs-grade-filter')?.value || '';
    const cls = document.getElementById('abs-class-filter')?.value || '';
    
    let filtered = allAbsenceData.filter(r => {
        if (search && !(r.name || '').includes(search)) return false;
        if (grade && r.grade !== grade) return false;
        if (cls && String(r.class) !== cls) return false;
        const u = (r.unexcused || 0), e = (r.excused || 0);
        switch(currentFilter) {
            case 'zero': return u === 0 && e === 0;
            case 'warning': return u >= 3 && u <= 4;
            case 'danger': return u >= 5 && u <= 9;
            case 'critical': return u >= 10;
            case 'mo_ref': return e >= 3 && e <= 4;
            case 'mo_com': return e >= 5 && e <= 9;
            case 'mo_risk': return e >= 10;
            default: return true;
        }
    });
    filtered.sort((a, b) => {
        if (currentSort === 'alpha') return (a.name || '').localeCompare(b.name || '', 'ar');
        const tA = (a.unexcused || 0) + (a.excused || 0), tB = (b.unexcused || 0) + (b.excused || 0);
        return currentSort === 'asc' ? tA - tB : tB - tA;
    });
    displayAbsenceApproved(filtered);
}

function displayAbsenceApproved(records) {
    const container = document.getElementById('absence-container');
    if (!container) return;
    if (!records || records.length === 0) {
        container.innerHTML = '<div class="text-center py-16 bg-white rounded-xl border border-gray-200"><span class="material-symbols-outlined text-gray-300 text-6xl">event_available</span><p class="text-gray-500 mt-4 text-lg">لا توجد سجلات غياب مطابقة</p></div>';
        hideBulkBar();
        return;
    }
    if (currentView === 'table') displayAbsenceTable(records);
    else displayAbsenceCards(records);
}

function toggleAbsSelectAll(master) {
    document.querySelectorAll('.abs-row-cb').forEach(cb => cb.checked = master.checked);
    updateAbsSelection();
}

function updateAbsSelection() {
    const checked = document.querySelectorAll('.abs-row-cb:checked');
    const count = checked.length;
    const bar = document.getElementById('abs-bulk-bar');
    const counter = document.getElementById('abs-selected-count');
    
    if (count > 0) {
        bar?.classList.remove('hidden');
        if (counter) counter.textContent = count;
    } else {
        hideBulkBar();
    }
}

function hideBulkBar() {
    document.getElementById('abs-bulk-bar')?.classList.add('hidden');
}

function clearAbsSelection() {
    document.querySelectorAll('.abs-row-cb').forEach(cb => cb.checked = false);
    const selectAll = document.getElementById('abs-select-all');
    if (selectAll) selectAll.checked = false;
    hideBulkBar();
}

function getSelectedAbsStudents() {
    const checked = document.querySelectorAll('.abs-row-cb:checked');
    return Array.from(checked).map(cb => ({
        id: cb.dataset.id,
        name: cb.dataset.name,
        grade: cb.dataset.grade,

// تقرير التواصل الجماعي للغياب
function printAbsContactReport() {
    var records = absenceStudentData || [];
    var sent = records.filter(function(r) { return (r.sentCount || 0) > 0; });
    if (sent.length === 0) { showEnhancedToast('warning', 'لا يوجد سجلات تم إرسالها'); return; }
    var hijri = new Date().toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var rows = '';
    sent.forEach(function(rec, i) {
        var total = (rec.unexcused || 0) + (rec.excused || 0);
        rows += '<tr>'
            + '<td class="data-cell">' + toArShared_(i+1) + '</td>'
            + '<td class="name-cell">' + escapeHtml(rec.name || '') + '</td>'
            + '<td class="data-cell">' + escapeHtml(formatClassShared_(rec.grade || '', rec.class || '')) + '</td>'
            + '<td class="data-cell">' + toArShared_(total) + '</td>'
            + '<td class="data-cell">' + toArShared_(rec.unexcused || 0) + '</td>'
            + '<td class="data-cell">' + toArShared_(rec.excused || 0) + '</td>'
            + '<td class="data-cell">' + toArShared_(rec.sentCount || 0) + '</td>'
            + '<td class="data-cell" style="color:green;font-weight:bold">تم</td>'
            + '</tr>';
    });
    var win = window.open('', '_blank');
    win.document.write(buildSharedPrintPage_({
        title: 'تقرير التواصل مع أولياء الأمور',
        subtitle: 'الغياب - ' + currentStage,
        dateText: hijri + ' | عدد الطلاب: ' + toArShared_(sent.length),
        colCount: 8,
        headers: '<th class="col-header">م</th><th class="col-header" style="width:24%">اسم الطالب</th><th class="col-header">الصف</th><th class="col-header">إجمالي</th><th class="col-header">بدون عذر</th><th class="col-header">بعذر</th><th class="col-header">الرسائل</th><th class="col-header">التواصل</th>',
        rows: rows,
        total: toArShared_(sent.length) + ' طالب'
    }));
    win.document.close(); setTimeout(function(){ win.focus(); win.print(); }, 300);
}

// ★ إرسال فردي لطالب غائب عبر واتساب

function sendSingleAbsence(idx) {
    var rec = absenceTodayRecords[idx];
    if (!rec) return;
    var phone = getStudentPhone(rec);
    if (!phone) { showEnhancedToast('warning', 'لا يوجد رقم جوال لهذا الطالب'); return; }
    var today = new Date();
    var dayName = today.toLocaleDateString('ar-SA', { weekday: 'long' });
    var hijri = today.toLocaleDateString('ar-SA-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' });
    var studentName = getF_(rec, 'اسم_الطالب') || '';
    var grade = getF_(rec, 'الصف') || '';
    var cls = getF_(rec, 'الفصل') || '';
    var studentId = getF_(rec, 'رقم_الطالب') || getF_(rec, 'رقم_الهوية') || '';

    // ★ جلب رابط ولي الأمر من السيرفر ثم فتح محرر الرسالة
    showEnhancedToast('info', 'جاري تجهيز الرسالة...');
    var buildAndShow = function(parentLink) {
        var defaultMsg = '📋 *إشعار غياب*\n\nالسلام عليكم ورحمة الله وبركاته\nولي أمر الطالب: *' + studentName + '*\n\nنفيدكم بأن ابنكم *' + studentName + '* غائب اليوم\n📅 ' + dayName + ' - ' + hijri + '\nالصف: ' + grade + ' - الفصل: ' + cls;
        if (parentLink) {
            defaultMsg += '\n\n📝 لكتابة العذر:\n' + parentLink + '\n(صالح لمدة ٢٤ ساعة)';
        }
        defaultMsg += '\n\nمع تحيات إدارة مدرسة ' + (APP_DATA.settings.school_name || 'المدرسة');
        showMessageEditor_({
            phone: phone, studentName: studentName, type: 'غياب',
            defaultMessage: defaultMsg,
            data: { 'اسم_الطالب': studentName, 'الصف': grade, 'الفصل': cls, 'اليوم': dayName, 'التاريخ': hijri, 'رابط_العذر': parentLink || '' },
            appendText: parentLink ? '\n\n📝 لكتابة العذر:\n' + parentLink + '\n(صالح لمدة ٢٤ ساعة)' : '',
            onSend: function(editedMsg) {
                showEnhancedToast('info', 'جاري الإرسال...');
                google.script.run.withSuccessHandler(function(r) {
                    if (r && r.success) {
                        showEnhancedToast('success', 'تم الإرسال ✓');
                        google.script.run.updateAbsenceSentStatus(currentStage, [rec.rowIndex]);
                        loadAbsenceTodayRecords();
                    }
                    else showEnhancedToast('danger', r.error || 'فشل');
                }).withFailureHandler(function(e) { showEnhancedToast('danger', e.message); })
                .sendWhatsAppWithLog({ phone: phone, message: editedMsg, studentName: studentName, studentId: studentId, grade: grade, 'class': cls, messageType: 'غياب', messageTitle: 'إشعار غياب' }, currentStage);
            }
        });
    };

    // ★ جلب رابط عذر ولي الأمر - مع تشخيص في حال فشل
    if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(function(r) {
            if (!r || !r.success || !r.link) {
                showEnhancedToast('warning', 'الرابط لم يُولّد: ' + (r && r.error ? r.error : 'الرابط فارغ'));
            }
            buildAndShow((r && r.success && r.link) ? r.link : '');
        }).withFailureHandler(function(err) {
            showEnhancedToast('danger', 'فشل توليد الرابط: ' + err.message);
            buildAndShow('');
        }).getParentExcuseLinkForStudent(studentId, currentStage);
    } else {
        buildAndShow('');
    }
}
