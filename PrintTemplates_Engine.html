<script>
    // =================================================================
    // 1. دالة تحويل الأرقام للهندية
    // =================================================================
    function toIndic(n) {
        if (n == null || n === '') return '';
        return n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
    }

    // دالة حماية XSS — مطلوبة داخل سياق نافذة الطباعة المعزولة
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // دالة لتقليص الاسم (الأول + الثاني + الأخير)
    function shortenName(fullName) {
        if (!fullName) return '';
        const parts = fullName.trim().split(/\s+/);
        if (parts.length <= 3) return fullName; // إذا كان الاسم قصيراً، كما هو
        // أخذ الأول + الثاني + الأخير
        return parts[0] + ' ' + parts[1] + ' ' + parts[parts.length - 1];
    }

    // =================================================================
    // 2. دالة ضبط حجم الخط تلقائياً (محسّنة)
    // =================================================================
    function adjustFontSize(element) {
        if (!element) return;

        const text = element.innerText || element.textContent;
        if (!text || text.trim() === '') return;

        // الحصول على العرض المتاح
        let maxWidth = element.offsetWidth;

        // إذا لم يكن للعنصر عرض، نستخدم عرض الأب
        if (maxWidth <= 0) {
            maxWidth = element.parentElement ? element.parentElement.offsetWidth * 0.8 : 200;
        }

        // الحصول على نمط min-width إن وجد
        const minWidthStyle = element.style.minWidth;
        if (minWidthStyle && minWidthStyle.includes('px')) {
            const minW = parseInt(minWidthStyle);
            if (minW > maxWidth) maxWidth = minW;
        }

        // البدء بحجم خط أصغر (14 بدلاً من 16)
        let fontSize = 14;
        const minFontSize = 9;

        // إنشاء عنصر مؤقت للقياس
        const temp = document.createElement('span');
        temp.style.cssText = 'visibility:hidden;position:absolute;white-space:nowrap;font-family:"Traditional Arabic","Amiri",serif;font-weight:bold;';
        temp.innerText = text;
        document.body.appendChild(temp);

        // تصغير الخط حتى يتناسب مع العرض
        temp.style.fontSize = fontSize + 'pt';
        while (temp.offsetWidth > maxWidth && fontSize > minFontSize) {
            fontSize -= 0.5;
            temp.style.fontSize = fontSize + 'pt';
        }

        // تطبيق الحجم الجديد
        element.style.fontSize = fontSize + 'pt';
        element.style.lineHeight = '1.2';

        // إزالة العنصر المؤقت
        document.body.removeChild(temp);
    }

    // =================================================================
    // 3. دالة تعبئة حقل مع ضبط الخط
    // =================================================================
    // دالة تعبئة الحقول (معدلة لتقبل الرقم صفر وتطبعه، وتحول الأرقام تلقائياً، وتزيل الشرط من الإجراءات)
    function fillField(elementId, value, convertToIndic = false) {
        const element = document.getElementById(elementId);
        if (!element) return;

        // تنظيف إجراءات المخالفة من الشرطة (-) في البداية
        if (elementId.startsWith('proc_') && typeof value === 'string') {
            value = value.replace(/^-\s*/, '');
        }

        // الشرط هنا: إذا كانت القيمة 0 أو "0" اعتبرها نصاً واطبعها، وإلا تعامل معها كالمعتاد
        let finalValue = (value === 0 || value === '0') ? '0' : (value || '');

        // التحويل القسري للأرقام العربية إذا تم تمرير convertToIndic أو إذا كان العنصر يحتوي على كلاس indic-num
        if ((convertToIndic || element.classList.contains('indic-num')) && finalValue !== '') {
            finalValue = toIndic(finalValue);
        }

        element.innerText = finalValue;
    }

    // =================================================================
    // 4. دالة إظهار النموذج المطلوب وإخفاء الباقي
    // =================================================================
    function showTemplate(formId) {
        // إخفاء جميع النماذج
        document.querySelectorAll('.print-template').forEach(template => {
            template.style.display = 'none';
        });

        // إظهار النموذج المطلوب
        const targetForm = document.getElementById('form-' + formId);
        if (targetForm) {
            targetForm.style.display = 'block';
            // تأمين مزدوج: إعادة الإظهار بعد فترة قصيرة لمنع الاختفاء
            setTimeout(function () {
                targetForm.style.display = 'block';
            }, 200);
        } else {
            console.error('النموذج غير موجود: form-' + formId);
            // محاولة بدون بادئة form-
            var altForm = document.getElementById(formId);
            if (altForm) {
                altForm.style.display = 'block';
            }
        }
    }

    // =================================================================
    // 5. دالة ضبط جميع الحقول المعبأة
    // =================================================================
    function adjustAllFields() {
        document.querySelectorAll('.with-dots').forEach(function (el) {
            if (el.innerText && el.innerText.trim() !== '') {
                adjustFontSize(el);
            }
        });
    }

    // =================================================================
    // 6. دالة التعبئة الرئيسية (تُستدعى من النظام)
    // =================================================================
    function fillForm(formId, data) {
        // ★ تحديث الكليشة من الإعدادات (إذا مُررت)
        if (data._letterhead) {
            applyLetterhead_(data._letterhead);
        }

        // إظهار النموذج المطلوب
        showTemplate(formId);

        // تعبئة البيانات حسب نوع النموذج
        switch (formId) {

            // ===== نموذج 1: إشعار ولي أمر =====
            case 'ishar_wali_amr':
                fillField('studentName', data.studentName);
                fillField('studentName_2', data.studentName);
                fillField('grade', data.grade);
                fillField('violationDay', data.violationDay);
                fillField('violationDate', data.violationDate, true);
                fillField('violationDegree', data.violationDegree, true);
                fillField('violationText', '● ' + (data.violationText || ''));
                fillField('managerName', data.managerName);
                if (data.procedures && data.procedures.length > 0) {
                    for (let i = 0; i < Math.min(data.procedures.length, 3); i++) {
                        fillField('proc_' + (i + 1), data.procedures[i]);
                    }
                }
                break;

            // ===== نموذج 2: تعهد سلوكي =====
            case 'tahood_slooki':
                fillField('tahood_studentName', data.studentName);
                fillField('tahood_grade', data.grade);
                fillField('tahood_day', data.violationDay);
                fillField('tahood_date', data.violationDate, true);
                fillField('tahood_degree', data.violationDegree, true);
                fillField('tahood_text', '● ' + (data.violationText || ''));
                break;

            // ===== نموذج 3: دعوة ولي أمر =====
            case 'dawat_wali_amr':
                fillField('dawat_studentName', data.studentName);
                fillField('dawat_grade', data.grade);
                fillField('dawat_deputyName', data.deputyName);
                // ★ بيانات من المنبثقة
                if (data.visitDay) fillField('dawat_day', data.visitDay);
                if (data.visitDate) fillField('dawat_date', data.visitDate, true);
                if (data.visitTime) fillField('dawat_time', data.visitTime);
                if (data.visitMeeting) fillField('dawat_meeting', data.visitMeeting);
                fillField('dawat_visitReason', '● ' + (data.visitReason || 'لمناقشة المستوى السلوكي للطالب.'));
                break;

            // ===== نموذج 4: محضر ضبط واقعة =====
            case 'mahdar_dab_wakea':
                fillField('mahdar_studentName', data.studentName);
                fillField('mahdar_grade', data.grade);
                fillField('mahdar_day', data.violationDay);
                fillField('mahdar_date', data.violationDate, true);
                fillField('mahdar_problem', '● ' + (data.violationText || ''));
                // ★ مكان الضبط من المنبثقة
                if (data.mahdarLocation) {
                    fillField('mahdar_location', data.mahdarLocation);
                }
                // ★ المشاهدات / المضبوطات — تفعيل ✓ بدل □
                if (data.mahdarObservations && data.mahdarObservations.length > 0) {
                    var obsLabels = ['إفادة شاهد','صور / فيديو','أدوات مضبوطة','تقرير طبي','أخرى'];
                    data.mahdarObservations.forEach(function(obs) {
                        var idx = obsLabels.indexOf(obs);
                        if (idx >= 0 && idx < 5) {
                            var chk = document.getElementById('mahdar_obs_' + idx);
                            if (chk) chk.textContent = '✓';
                        } else {
                            // نوع غير معروف = "أخرى"
                            var chk4 = document.getElementById('mahdar_obs_4');
                            if (chk4) chk4.textContent = '✓';
                            fillField('mahdar_obs_other_text', obs);
                        }
                    });
                }
                // ★ شهود الواقعة — ديناميكي
                if (data.mahdarWitnesses && data.mahdarWitnesses.length > 0) {
                    var wtb = document.getElementById('mahdar_witnesses_body');
                    if (wtb) {
                        wtb.innerHTML = '';
                        data.mahdarWitnesses.forEach(function(w, i) {
                            var tr = document.createElement('tr');
                            tr.innerHTML = '<td class="indic-num">' + toIndic(i+1) + '</td>'
                                + '<td style="text-align:right;padding-right:5px;font-weight:bold;">' + escapeHtml(w.name) + '</td>'
                                + '<td>' + escapeHtml(w.role || '') + '</td>'
                                + '<td></td>';
                            wtb.appendChild(tr);
                        });
                    }
                }
                break;

            // ===== نموذج 5: محضر لجنة (مخالفة) =====
            case 'mahdar_lajnah':
                fillField('lajnah_studentName', data.studentName);
                fillField('lajnah_grade', data.grade);
                fillField('lajnah_day', data.violationDay);
                fillField('lajnah_date', data.violationDate, true);
                fillField('lajnah_degree', data.violationDegree, true);
                fillField('lajnah_desc', '● ' + (data.violationText || ''));
                fillCommitteeMembers('lajnah_members_table', data.committeeMembers);
                // ★ الإجراءات التربوية المتخذة سابقاً
                if (data.lajnahPrevProcedures) {
                    var prevLines = data.lajnahPrevProcedures.split('\n').filter(function(l){return l.trim();});
                    for (var pi = 0; pi < Math.min(prevLines.length, 3); pi++) {
                        fillField('lajnah_prev_' + (pi+1), prevLines[pi].replace(/^[٠-٩\d]+[.)\-]\s*/, ''));
                    }
                }
                // ★ توصيات وقرارات اللجنة
                if (data.lajnahRecommendations) {
                    var recLines = data.lajnahRecommendations.split('\n').filter(function(l){return l.trim();});
                    for (var ri = 0; ri < Math.min(recLines.length, 3); ri++) {
                        fillField('lajnah_rec_' + (ri+1), recLines[ri].replace(/^[٠-٩\d]+[.)\-]\s*/, ''));
                    }
                }
                break;

            // ===== نموذج 6: محضر لجنة (غياب) =====
            case 'mahdar_lajnah_absence':
                fillField('lajnah_abs_studentName', data.studentName);
                fillField('lajnah_abs_grade', data.grade);
                fillField('lajnah_abs_day', data.violationDay);
                fillField('lajnah_abs_date', data.violationDate, true);
                // الحقول الجديدة بعد سطر "وصول غيابه إلى:"
                fillField('lajnah_abs_unexcused', data.unexcusedDays, true);
                fillField('lajnah_abs_excused', data.excusedDays, true);
                fillCommitteeMembers('lajnah_abs_members_table', data.committeeMembers);
                // ★ الإجراءات التربوية المتخذة سابقاً
                if (data.lajnahPrevProcedures) {
                    var absPrevLines = data.lajnahPrevProcedures.split('\n').filter(function(l){return l.trim();});
                    for (var api = 0; api < Math.min(absPrevLines.length, 3); api++) {
                        fillField('lajnah_abs_prev_' + (api+1), absPrevLines[api].replace(/^[٠-٩\d]+[.)\-]\s*/, ''));
                    }
                }
                // ★ توصيات وقرارات اللجنة
                if (data.lajnahRecommendations) {
                    var absRecLines = data.lajnahRecommendations.split('\n').filter(function(l){return l.trim();});
                    for (var ari = 0; ari < Math.min(absRecLines.length, 3); ari++) {
                        fillField('lajnah_abs_rec_' + (ari+1), absRecLines[ari].replace(/^[٠-٩\d]+[.)\-]\s*/, ''));
                    }
                }
                break;


            // ===== نموذج 7: إحالة طالب =====
            case 'ehalat_talib':
                fillField('ehala_studentName', data.studentName);
                fillField('ehala_grade', data.grade);
                fillField('ehala_text', '● ' + (data.violationText || ''));

                // ✅ التاريخ - إذا لم يكن موجوداً، استخدم تاريخ اليوم الهجري
                const ehalaDate = data.violationDate || new Date().toLocaleDateString('ar-SA-u-ca-islamic');
                fillField('ehala_date', ehalaDate, true);

                fillField('ehala_degree', data.violationDegree, true);

                // ✅ اسم وكيل شؤون الطلاب من الإعدادات
                if (data.deputyName) {
                    fillField('ehala_deputyName', data.deputyName);
                }
                // ✅ اسم الموجه الطلابي من الإعدادات
                if (data.counselorName) {
                    fillField('ehala_counselorName', data.counselorName);
                }
                break;

            // ===== النموذج 8: نموذج إحالة جماعية (هذا هو الكود الصحيح له) =====
            case 'group_ehala':
                // 1. تعبئة التاريخ
                const d = new Date();
                const dayName = d.toLocaleDateString('ar-SA', { weekday: 'long' });
                const dateStr = data.violationDate || d.toLocaleDateString('ar-SA-u-ca-islamic');
                fillField('ge_date', dayName + ' ' + dateStr, true);

                // 2. تعبئة اسم الوكيل
                if (data.deputyName) {
                    fillField('ge_deputy', data.deputyName);
                }

                // 3. بناء الجدول
                const tbody = document.getElementById('ge_table_body');
                if (tbody && data.studentsList && data.studentsList.length > 0) {
                    tbody.innerHTML = ''; // مسح الصفوف القديمة تماماً

                    data.studentsList.forEach((s, i) => {
                        const tr = document.createElement('tr');
                        const shortName = shortenName(s.name);

                        // تمت إزالة with-dots من الاسم لإزالة الخطوط المنقطة
                        tr.innerHTML = `
                            <td class="indic-num">${toIndic(i + 1)}</td>
                            <td style="text-align: right; padding-right:5px; font-weight:bold;">
                                ${escapeHtml(shortName)}
                            </td>
                            <td>${escapeHtml(s.grade)}</td>
                            <td class="indic-num">${toIndic(s.unexcused)}</td>
                            <td class="indic-num">${toIndic(s.excused)}</td>
                            <td></td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
                break;

            // ===== النموذج 9: رصد مخالفات (ملف الطالب) - معبأ آلياً (نسخة نهائية) =====
            case 'rasd_slooki':
                // 1. تعبئة بيانات الطالب
                fillField('rasd_s_studentName', data.studentName);
                fillField('rasd_s_grade', data.grade);
                fillField('rasd_s_class', data.class);

                // 2. تعبئة اسم الوكيل
                if (data.deputyName) {
                    fillField('rs_deputy', data.deputyName);
                }

                // 3. تعبئة جدول المخالفات
                const tbody_rs = document.getElementById('rs_table_body');
                if (tbody_rs && data.violationsList && data.violationsList.length > 0) {
                    tbody_rs.innerHTML = ''; // مسح الصفوف الفارغة

                    data.violationsList.forEach((v, i) => {
                        const tr = document.createElement('tr');

                        // معالجة نص الإجراءات (تنظيف الشرطات وتوحيد الأرقام)
                        let rawProc = v['الإجراءات'] || '';
                        let procText = rawProc.split('\n')
                            .filter(p => p.trim() !== '')
                            .map(p => {
                                // 1. حذف الشرطات القديمة من بداية السطر لمنع التكرار
                                let cleanLine = p.trim().replace(/^[-\s]+/, '');
                                // 2. حماية XSS ثم تحويل الأرقام
                                cleanLine = escapeHtml(toIndic(cleanLine));
                                // 3. إضافة شرطة موحدة في البداية
                                return '- ' + cleanLine;
                            })
                            .join('<br>');

                        tr.innerHTML = `
                            <td style="font-family: 'Traditional Arabic'; font-weight: normal; font-size: 14pt;">${toIndic(i + 1)}</td>
                            <td style="text-align: right; padding-right:5px; font-size:11pt;">${escapeHtml(toIndic(v['نص المخالفة']))}</td>
                            <td style="font-family: 'Traditional Arabic'; font-weight: normal; font-size: 14pt;">${toIndic(v['الدرجة'])}</td>
                            <td style="font-family: 'Traditional Arabic'; font-weight: normal; font-size: 13pt;">${toIndic(v['التاريخ الهجري'])}</td>
                            <td style="text-align: right; padding-right:5px; font-size:10pt; line-height: 1.4; padding-top: 5px; padding-bottom: 5px;">${procText}</td>
                        `;
                        tbody_rs.appendChild(tr);
                    });
                }
                break;

            // ===== النموذج 10: فرص تعويض (الهيكل المطور) =====
            case 'tawid_darajat':
                // 1. البيانات الأساسية للطالب
                fillField('tawid_studentName', data.studentName);
                fillField('tawid_grade', data.grade);
                fillField('tawid_class', data.class);

                // 2. بيانات المخالفة (تأتي من الواجهة الفخمة أو زر المخالفة)
                if (data.violationInfo) {
                    fillField('tawid_v_name', data.violationInfo.name);
                    fillField('tawid_v_degree', data.violationInfo.degree, true);
                    fillField('tawid_v_date', data.violationInfo.date, true);
                    fillField('tawid_v_points', data.violationInfo.points, true);
                }

                // 3. التواقيع (الموجه والوكيل)
                if (data.counselorName) {
                    fillField('tawid_guide', data.counselorName);
                }
                if (data.deputyName) {
                    fillField('tawid_deputy', data.deputyName);
                }
                break;

            // ===== نموذج 11: سلوك متميز =====
            case 'rasd_tamayuz':
                fillField('rasd_studentName', data.studentName);
                fillField('rasd_grade', data.grade);
                break;

            // ===== نموذج 12: غياب بدون عذر =====
            case 'ghiab_bidon_ozr':
                fillField('ghiab_no_studentName', data.studentName);
                fillField('ghiab_no_grade', data.grade);
                if (data.deputyName) {
                    fillField('ghiab_no_deputy', data.deputyName);
                }
                break;

            // ===== نموذج 13: غياب بعذر =====
            case 'ghiab_ozr':
                fillField('ghiab_ozr_studentName', data.studentName);
                fillField('ghiab_ozr_grade', data.grade);
                if (data.deputyName) {
                    fillField('ghiab_ozr_deputy', data.deputyName);
                }
                break;

            // ===== نموذج 14: تعهد حضور (المطور) =====
            case 'tahood_hodoor':
                fillField('tahood_h_studentName', data.studentName);
                fillField('tahood_h_grade', data.grade);

                // استقبال الرقمين بشكل منفصل كما في الإحالة
                fillField('tahood_h_unexcused', data.unexcusedDays, true); // true للأرقام الهندية
                fillField('tahood_h_excused', data.excusedDays, true);     // true للأرقام الهندية

                fillField('tahood_h_sig_student', data.studentName);
                break;

            // ===== النموذج 15: تعهد جماعي (كشف تعهد) =====
            case 'group_tahood':
                // 1. تعبئة التاريخ
                const d_gt = new Date();
                const dayName_gt = d_gt.toLocaleDateString('ar-SA', { weekday: 'long' });
                const dateStr_gt = data.violationDate || d_gt.toLocaleDateString('ar-SA-u-ca-islamic');
                fillField('gt_date', dayName_gt + ' ' + dateStr_gt, true);

                // 2. تعبئة اسم الوكيل
                if (data.deputyName) {
                    fillField('gt_deputy', data.deputyName);
                }

                // 3. بناء الجدول (الطلاب)
                const tbody_gt = document.getElementById('gt_table_body');
                if (tbody_gt && data.studentsList && data.studentsList.length > 0) {
                    tbody_gt.innerHTML = ''; // مسح القديم

                    data.studentsList.forEach((s, i) => {
                        const tr = document.createElement('tr');
                        const shortName = shortenName(s.name);

                        tr.innerHTML = `
                            <td class="indic-num">${toIndic(i + 1)}</td>
                            <td style="text-align: right; padding-right:5px; font-weight:bold;">
                                ${escapeHtml(shortName)}
                            </td>
                            <td>${escapeHtml(s.grade)}</td>
                            <td class="indic-num">${toIndic(s.unexcused)}</td>
                            <td class="indic-num">${toIndic(s.excused)}</td>
                            <td></td> `;
                        tbody_gt.appendChild(tr);
                    });
                }
                break;

            // ===== نموذج 16: عقد التزام مدرسي =====
            case 'iltizam_madrasi':
                fillField('iltizam_name', data.studentName);
                fillField('iltizam_grade', data.grade);
                fillField('iltizam_date', data.violationDate, true);
                fillField('iltizam_student_sign', data.studentName);
                break;

            // ===== نموذج 18: حالة عالية الخطورة =====
            case 'high_risk':
                fillField('risk_studentName', data.studentName);
                fillField('risk_grade', data.grade);
                // ★ نوع الخطر — تفعيل ✓
                if (data.riskTypes && data.riskTypes.length > 0) {
                    var riskLabels = ['حيازة سلاح','مخدرات','تهديد بالعنف','مضاربة جماعية','تحرش'];
                    data.riskTypes.forEach(function(rt) {
                        var idx = riskLabels.indexOf(rt);
                        if (idx >= 0) {
                            var chk = document.getElementById('risk_chk_' + idx);
                            if (chk) chk.textContent = '✓';
                        } else {
                            // "أخرى"
                            var chk5 = document.getElementById('risk_chk_5');
                            if (chk5) chk5.textContent = '✓';
                            fillField('risk_other_text', rt);
                        }
                    });
                }
                // ★ وصف الحالة
                if (data.riskDesc) fillField('risk_desc', data.riskDesc);
                // ★ راصد الحالة
                if (data.riskObserver) fillField('risk_observer', data.riskObserver);
                // ★ تاريخ ووقت الرصد
                if (data.riskDate) fillField('risk_date', data.riskDate, true);
                if (data.riskTime) fillField('risk_time', data.riskTime);
                // ★ اسم المدير
                if (data.managerName) {
                    fillField('risk_manager', data.managerName);
                    fillField('risk_manager_date', data.riskDate || '', true);
                }
                break;

            // ===== نموذج 19: إبلاغ إيذاء =====
            case 'eblagh_etha':
                fillField('eblagh_victim_name', data.studentName);
                fillField('eblagh_grade', data.grade);
                const eblaghDate = data.violationDate || new Date().toLocaleDateString('ar-SA-u-ca-islamic');
                fillField('eblagh_date', eblaghDate, true);
                // ★ بيانات المبلغ
                if (data.eblaghReporter) fillField('eblagh_reporter', data.eblaghReporter);
                if (data.eblaghRole) fillField('eblagh_role', data.eblaghRole);
                // ★ ملخص الحالة
                if (data.eblaghSummary) fillField('eblagh_summary', data.eblaghSummary);
                // ★ الإجراءات المتخذة
                if (data.eblaghProcedures && data.eblaghProcedures.length > 0) {
                    for (var epi = 0; epi < Math.min(data.eblaghProcedures.length, 3); epi++) {
                        fillField('eblagh_proc_' + (epi+1), data.eblaghProcedures[epi]);
                    }
                }
                // ★ اسم الموجه والمدير
                if (data.counselorName) fillField('eblagh_counselor', data.counselorName);
                if (data.managerName) fillField('eblagh_manager', data.managerName);
                break;

            // ===== نموذج 20: خطة تعديل سلوك =====
            case 'khota_tadeel':
                fillField('khota_studentName', data.studentName);
                fillField('khota_grade', data.grade);
                fillField('khota_class', data.class);
                // ★ بيانات من المنبثقة
                if (data.khotaDob) fillField('khota_dob', data.khotaDob, true);
                if (data.khotaAge) fillField('khota_age', data.khotaAge);
                if (data.khotaStart) fillField('khota_start', data.khotaStart, true);
                if (data.khotaEnd) fillField('khota_end', data.khotaEnd, true);
                if (data.khotaProblem) fillField('khota_problem', data.khotaProblem);
                if (data.khotaDegree) fillField('khota_degree', data.khotaDegree);
                if (data.khotaDesc) fillField('khota_desc', data.khotaDesc);
                // ★ المظاهر السلوكية
                if (data.khotaManifestations && data.khotaManifestations.length > 0) {
                    for (var kmi = 0; kmi < Math.min(data.khotaManifestations.length, 2); kmi++) {
                        fillField('khota_m' + (kmi+1), data.khotaManifestations[kmi]);
                    }
                }
                break;

            // ===== نموذج 17: سجل متابعة ورصد مخالفات (للمعلم) =====
            case 'rasd_moalem':
                if (data.subject) fillField('rasd_m_subject', data.subject);
                if (data.grade) fillField('rasd_m_grade', data.grade);
                if (data.teacherName) fillField('rasd_m_teacher', data.teacherName);
                // ★ تعبئة جدول المخالفات ديناميكياً
                if (data.violations && data.violations.length > 0) {
                    var rasdTb = document.getElementById('rasd_m_tbody');
                    if (rasdTb) {
                        rasdTb.innerHTML = '';
                        var maxRows = Math.max(data.violations.length, 8);
                        for (var ri = 0; ri < maxRows; ri++) {
                            var tr = document.createElement('tr');
                            if (ri < data.violations.length) {
                                var v = data.violations[ri];
                                tr.innerHTML = '<td class="indic-num">' + toIndic(ri + 1) + '</td>'
                                    + '<td style="text-align:right;padding-right:5px;font-weight:bold;">' + escapeHtml(v.studentName || '') + '</td>'
                                    + '<td style="text-align:right;padding-right:5px;">' + escapeHtml(v.violation || '') + '</td>'
                                    + '<td style="text-align:right;padding-right:5px;">' + escapeHtml(v.action || '') + '</td>'
                                    + '<td class="indic-num">' + escapeHtml(toIndic(v.date || '')) + '</td>'
                                    + '<td></td>';
                            } else {
                                tr.innerHTML = '<td class="indic-num">' + toIndic(ri + 1) + '</td><td></td><td></td><td></td><td></td><td></td>';
                            }
                            rasdTb.appendChild(tr);
                        }
                    }
                }
                break;

            // ===== حالة جديدة: نموذج إحالة غياب =====
            case 'ehalat_absence':
                fillField('ehala_abs_studentName', data.studentName);
                fillField('ehala_abs_grade', data.grade);
                fillField('ehala_abs_unexcused', data.unexcusedDays, true);
                fillField('ehala_abs_excused', data.excusedDays, true);
                break;
            case 'tawtheeq_tawasol':
                fillField('tawtheeq_studentName', data.studentName);
                fillField('tawtheeq_grade', data.grade);
                fillField('tawtheeq_day', data.contactDay || data.violationDay);
                fillField('tawtheeq_date', data.contactDate || data.violationDate);
                fillField('tawtheeq_contactType', data.contactType);
                fillField('tawtheeq_contactReason', data.contactReason);
                fillField('tawtheeq_contactResult', data.contactResult || 'تم التواصل بنجاح');
                fillField('tawtheeq_notes', data.contactNotes || data.notes || '');
                break;

            // ===== نموذج 23: محضر إثبات واقعة (سلوك غير تربوي) =====
            case 'mashajara':
                fillField('mashajara_day', data.day);
                fillField('mashajara_date', data.date, true);
                fillField('mashajara_time', data.time);
                fillField('mashajara_location', data.location);
                fillField('mashajara_initiator', data.initiator);
                fillField('mashajara_desc', data.description);

                // ★ الأضرار الجسدية (مصفوفة أو نص)
                if (Array.isArray(data.physicalDamage) && data.physicalDamage.length > 0) {
                    var physHtml = data.physicalDamage.map(function(d, i) {
                        return toIndic(i+1) + '- ' + escapeHtml(d);
                    }).join('<br>');
                    var physEl = document.getElementById('mashajara_physical');
                    if (physEl) physEl.innerHTML = physHtml;
                } else if (data.physicalDamage) {
                    fillField('mashajara_physical', data.physicalDamage);
                }

                // ★ الأضرار المادية (مصفوفة أو نص)
                if (Array.isArray(data.materialDamage) && data.materialDamage.length > 0) {
                    var matHtml = data.materialDamage.map(function(d, i) {
                        return toIndic(i+1) + '- ' + escapeHtml(d);
                    }).join('<br>');
                    var matEl = document.getElementById('mashajara_material');
                    if (matEl) matEl.innerHTML = matHtml;
                } else if (data.materialDamage) {
                    fillField('mashajara_material', data.materialDamage);
                }

                // ★ محرر/محررو المحضر (دعم متعدد)
                if (data.authors && data.authors.length > 0) {
                    fillField('mashajara_author', data.authors[0].name);
                    fillField('mashajara_author_role', data.authors[0].role);
                    fillField('mashajara_author_date', data.date, true);
                    // إذا أكثر من محرر، إضافة بقية المحررين
                    if (data.authors.length > 1) {
                        var authEl = document.getElementById('mashajara_author');
                        var authContainer = authEl ? authEl.parentElement : null;
                        if (authContainer) {
                            for (var ai = 1; ai < data.authors.length; ai++) {
                                var authDiv = document.createElement('div');
                                authDiv.className = 'section-block align-right';
                                authDiv.style.marginTop = '5px';
                                authDiv.innerHTML = 'اسم مُحرِّر المحضر: <span class="data-field with-dots" style="min-width:60px;">' + escapeHtml(data.authors[ai].name) + '</span> الصفة: <span class="data-field with-dots" style="min-width:60px;">' + escapeHtml(data.authors[ai].role || '') + '</span> التوقيع: <span class="with-dots" style="min-width:60px;"></span>';
                                authContainer.parentNode.insertBefore(authDiv, authContainer.nextSibling);
                            }
                        }
                    }
                } else {
                    fillField('mashajara_author', data.authorName || '');
                    fillField('mashajara_author_role', data.authorRole || '');
                    fillField('mashajara_author_date', data.date, true);
                }

                // تعبئة قائمة الطلاب ديناميكياً (حتى 12 طالب) مع أعمدة حسب العدد
                var sc = document.getElementById('mashajara_students_list');
                if (sc && data.students && data.students.length > 0) {
                    var cnt = data.students.length;
                    var cols = cnt <= 3 ? 1 : (cnt <= 6 ? 2 : 3);
                    var minN = cols === 1 ? '60px' : (cols === 2 ? '40px' : '30px');
                    var minG = cols === 1 ? '40px' : (cols === 2 ? '25px' : '20px');
                    var fs = cols === 3 ? 'font-size:12pt;' : '';
                    var html = '<div style="display:flex;flex-wrap:wrap;gap:0;">';
                    data.students.forEach(function(s) {
                        var w = cols === 1 ? '100%' : (cols === 2 ? '50%' : '33.33%');
                        html += '<div style="width:' + w + ';box-sizing:border-box;padding:2px 5px 2px 0;' + fs + '">';
                        html += 'الطالب: <span class="data-field with-dots" style="min-width:' + minN + ';">' + escapeHtml(s.name || '') + '</span> ';
                        html += 'الصف: <span class="data-field with-dots" style="min-width:' + minG + ';">' + toIndic(escapeHtml(s.grade || '')) + '</span>';
                        html += '</div>';
                    });
                    html += '</div>';
                    sc.innerHTML = html;

                    // الطرفين أو الأطراف حسب العدد
                    var pw = document.getElementById('mashajara_parties_word');
                    if (pw) { pw.innerText = cnt > 2 ? 'الأطراف' : 'الطرفين'; }
                }
                break;
            default:
                console.log('نموذج غير معرّف: ' + formId);
        }

        // ضبط الخط ثم تفعيل التعديل والطباعة
        setTimeout(function () {
            adjustAllFields();

            // ★ جعل حقول البيانات قابلة للتعديل قبل الطباعة
            document.querySelectorAll('.data-field').forEach(function(el) {
                el.setAttribute('contenteditable', 'true');
                el.style.cursor = 'text';
                el.style.outline = 'none';
            });

            // ★ إضافة شريط تحكم للطباعة (يختفي عند الطباعة)
            var bar = document.createElement('div');
            bar.id = 'edit-toolbar';
            bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-family:Tajawal,sans-serif;box-shadow:0 2px 10px rgba(0,0,0,.3);direction:rtl';
            bar.innerHTML = '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px;font-weight:700">✏️ يمكنك النقر على أي حقل لتعديله قبل الطباعة</span></div>'
                + '<button onclick="document.getElementById(\'edit-toolbar\').style.display=\'none\';window.print()" style="padding:8px 24px;background:white;color:#4f46e5;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">🖨️ طباعة</button>';
            document.body.prepend(bar);

            // إخفاء الشريط عند الطباعة
            var style = document.createElement('style');
            style.textContent = '@media print { #edit-toolbar { display:none !important; } }';
            document.head.appendChild(style);

        }, 300);
    }

    // =================================================================
    // 7. دالة مساعدة لتعبئة جدول أعضاء اللجنة
    // =================================================================
    function fillCommitteeMembers(tableId, members) {
        if (!members || !Array.isArray(members) || members.length === 0) return;

        const tbody = document.getElementById(tableId);
        if (!tbody) return;

        const rows = tbody.querySelectorAll('tr');

        for (let i = 0; i < Math.min(members.length, rows.length); i++) {
            const cells = rows[i].querySelectorAll('td');
            if (cells.length >= 2) {
                cells[1].innerText = members[i].name || members[i] || '';
                if (cells.length >= 3 && members[i].role) {
                    cells[2].innerText = members[i].role;
                }
            }
        }
    }

    // =================================================================
    // 8. ★ تطبيق الكليشة الديناميكية على النماذج
    // =================================================================
    var TEMPLATE_LOGO_URL_DEFAULT = 'https://i.ibb.co/5WxLGJPD/2025-11-15-233559.png';

    function applyLetterhead_(lh) {
        if (!lh) return;
        var imgs = document.querySelectorAll('.header-logo, img[alt="الشعار"]');

        if (lh.mode === 'image') {
            // وضع الصورة: تحديث رابط الشعار فقط
            var url = lh.imageUrl || TEMPLATE_LOGO_URL_DEFAULT;
            imgs.forEach(function (img) { img.src = url; });
        } else if (lh.mode === 'text') {
            // وضع النص: استخدام الكليشة الموحدة بالثلاثة أعمدة
            // 1) التأكد من وجود ستايلات الكليشة
            if (!document.getElementById('letterhead-dynamic-styles') && typeof getLetterheadStyles_ === 'function') {
                var style = document.createElement('style');
                style.id = 'letterhead-dynamic-styles';
                style.innerHTML = getLetterheadStyles_();
                document.head.appendChild(style);
            }

            // 2) إنشاء محتوى الكليشة النصية
            var schoolText = '';
            if (lh.letterhead && lh.letterhead.trim() !== '') {
                schoolText = lh.letterhead;
            } else {
                if (lh.eduAdmin) schoolText += lh.eduAdmin;
                if (lh.eduDept) schoolText += (schoolText ? '\n' : '') + lh.eduDept;
                if (lh.schoolName) schoolText += (schoolText ? '\n' : '') + lh.schoolName;
            }

            var textHtml = '';
            if (typeof buildLetterheadHtml_ === 'function') {
                textHtml = buildLetterheadHtml_(schoolText);
            } else {
                // Fallback لو لم تكن الدالة موجودة
                textHtml = '<div style="text-align:center;">'
                    + '<p style="font-size:13pt;font-weight:bold;margin:2px 0">المملكة العربية السعودية</p>'
                    + '<p style="font-size:13pt;font-weight:bold;margin:2px 0">وزارة التعليم</p>';
                var parts = schoolText.split('\n');
                for (var i = 0; i < parts.length; i++) {
                    if (parts[i].trim()) textHtml += '<p style="font-size:12pt;margin:2px 0">' + parts[i].trim() + '</p>';
                }
                textHtml += '</div>';
            }

            // 3) استبدال كل header-container بالنص
            document.querySelectorAll('.header-container').forEach(function (container) {
                container.style.border = 'none';
                container.style.margin = '0';
                container.style.padding = '0';
                container.innerHTML = textHtml;
            });
        }
    }

    // =================================================================
    // 9. تهيئة الصفحة عند التحميل
    // =================================================================
    // CSS (.print-template { display: none }) يتكفل بالإخفاء
    // لا نحتاج DOMContentLoaded لتجنب race condition مع fillForm
    console.log('✅ محرك الطباعة جاهز');
</script>
