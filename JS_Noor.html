// ═══════════════════════════════════════════════════════════════
// ★ v4: الجسر — التواصل مع إضافة كروم (من التجريبي v7)
// بدل window.open + postMessage
// ═══════════════════════════════════════════════════════════════
var _noorInbox = null, _noorOutbox = null;

/**
 * البحث عن عناصر الجسر في الصفحة
 * الإضافة تنشئ div#noor-bridge-inbox و div#noor-bridge-outbox
 */
function _noorFindBridge() {
  _noorInbox = document.getElementById('noor-bridge-inbox');
  _noorOutbox = document.getElementById('noor-bridge-outbox');

  // محاولة البحث في parent (لو التطبيق في iframe)
  if (!_noorInbox) { try { _noorInbox = window.parent.document.getElementById('noor-bridge-inbox'); } catch(e) {} }
  if (!_noorOutbox) { try { _noorOutbox = window.parent.document.getElementById('noor-bridge-outbox'); } catch(e) {} }

  // مراقبة الردود من الإضافة عبر MutationObserver
  if (_noorOutbox && !_noorOutbox._noorWatched) {
    _noorOutbox._noorWatched = true;
    new MutationObserver(function() {
      if (!_noorOutbox.textContent) return;
      try {
        var data = JSON.parse(_noorOutbox.textContent);
        _noorOutbox.textContent = '';
        _noorHandleExtMessage(data);
      } catch(e) {}
    }).observe(_noorOutbox, { childList: true, characterData: true, subtree: true });
  }
}

/** إرسال رسالة للإضافة عبر الجسر */
function _noorSendToExt(data) {
  _noorFindBridge();
  if (!_noorInbox) return false;
  _noorInbox.textContent = JSON.stringify(data);
  return true;
}

/** فحص اتصال الإضافة */
function _noorPing() {
  _noorSendToExt({ source: 'school-system', action: 'ping' });
}

/**
 * ★ v4: معالجة موحدة للردود من الإضافة
 * تستقبل من الجسر (MutationObserver) ومن postMessage (fallback)
 * بدل noorMessageHandler_ القديمة
 */
function _noorHandleExtMessage(data) {
  if (!data || !data.action) return;

  switch (data.action) {
    case 'connected':
      NOOR_STATE.connected = true;
      NOOR_STATE.extensionReady = true;
      NOOR_STATE.userName = data.userName || '';
      if (NOOR_STATE._connectTimer) { clearTimeout(NOOR_STATE._connectTimer); NOOR_STATE._connectTimer = null; }
      renderNoorPage();
      showEnhancedToast('success', 'تم الاتصال بنور عبر الإضافة — جاهز للتوثيق');
      break;
    case 'progress':
      NOOR_STATE.progress = { done: data.done, total: data.total, current: data.current };
      noorUpdateProgress_();
      break;
    case 'done':
      NOOR_STATE.working = false;
      noorOnComplete_(data.results);
      break;
    case 'error':
      NOOR_STATE.working = false;
      showEnhancedToast('danger', 'خطأ: ' + (data.message || ''));
      noorSwitchTab_(NOOR_STATE.currentOp);
      break;
    case 'disconnected':
      NOOR_STATE.connected = false;
      NOOR_STATE.extensionReady = false;
      renderNoorPage();
      break;
  }
}

function noorConnect_() {

  var sent = _noorSendToExt({ source: 'school-system', action: 'ping' });

  if (!sent) {
    showEnhancedToast('warning', 'الجسر غير موجود — تأكد أن إضافة نور مفعّلة ونور مفتوح في تبويب آخر');

function noorLoadRecords_(type) {
  var tbody = document.getElementById('noor-table-body');
  if (tbody) tbody.innerHTML = noorSkeletonRows_(5);

  google.script.run
    .withSuccessHandler(function(res) {
      try {
        noorRenderRecords_(res, type);
      } catch(e) {
        var tb = document.getElementById('noor-table-body');
        if (tb) tb.innerHTML = noorEmptyState_('خطأ في العرض: ' + e.message, 'error');
      }
    })
    .withFailureHandler(function(err) {
      var tb = document.getElementById('noor-table-body');
      if (tb) tb.innerHTML = noorEmptyState_('خطأ في جلب البيانات: ' + err, 'error');
    })
    .getNoorPendingRecords(currentStage, type);
}


// ═══════════════════════════════════════════════════════════════
// عرض السجلات في الجدول — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorRenderRecords_(res, type) {
  var tbody = document.getElementById('noor-table-body');
  var countEl = document.getElementById('noor-record-count');
  if (!tbody) return;

  if (!res || !res.success) {
    var errMsg = (res && res.error) ? ('خطأ: ' + res.error) : 'لا توجد سجلات معلقة';
    var errIcon = (res && res.error) ? 'error' : 'check_circle';
    tbody.innerHTML = noorEmptyState_(errMsg, errIcon);
    if (countEl) countEl.textContent = '';
    return;
  }
  if (!res.records || res.records.length === 0) {
    tbody.innerHTML = noorEmptyState_('لا توجد سجلات معلقة', 'check_circle');
    if (countEl) countEl.textContent = '';
    return;
  }

  var records = res.records;
  if (countEl) countEl.textContent = toArabicNum_(records.length) + ' سجل';

  var sorted = sortRecordsByClass_(records);
  NOOR_STATE.pendingData = sorted;
  var groupInfo = sheetGroupInfo_(sorted);

  var degreeColors = {
    'الأولى': 'bg-degree-1', 'الثانية': 'bg-degree-2', 'الثالثة': 'bg-degree-3',
    'الرابعة': 'bg-degree-4', 'الخامسة': 'bg-degree-5'
  };

  // ═══ بناء رأس الجدول حسب النوع ═══
  var html = '<div style="overflow-x:auto"><table class="sht"><thead><tr style="background:var(--sec-clr,#00695c)">'
    + '<th style="width:40px"><input type="checkbox" id="noor-select-all" onchange="noorToggleAll_(this.checked)"></th>'
    + '<th>اسم الطالب</th>'
    + '<th>الصف</th><th>الفصل</th>';

  if (type === 'violations') {
    html += '<th>المخالفة</th><th>الدرجة</th><th>التاريخ</th><th>نور</th>';
  } else if (type === 'tardiness') {
    html += '<th>نوع التأخر</th><th>التاريخ</th><th>نور</th>';
  } else if (type === 'compensation') {
    html += '<th>السلوك التعويضي</th><th>التاريخ</th><th>نور</th>';
  } else if (type === 'excellent') {
    html += '<th>السلوك المتمايز</th><th>المعلم</th><th>التاريخ</th><th>نور</th>';
  } else if (type === 'absence') {
    html += '<th>نوع الغياب \u25BC</th><th>التاريخ</th><th>نور</th>';
  }
  html += '</tr></thead><tbody>';

  // ═══ بناء صفوف الجدول ═══
  sorted.forEach(function(rec, idx) {
    var gi = groupInfo[idx];

    if (gi.border) {
      html += '<tr class="sht-sep"><td colspan="10"></td></tr>';
    }
    if (gi.first) {
      html += '<tr class="sht-gh"><td colspan="10"><span class="sht-gl">' + escapeHtml(getF_(rec, 'الصف')) + ' / ' + escapeHtml(getF_(rec, 'الفصل')) + '</span>'
        + '<span class="sht-gc mr-3">' + toArabicNum_(gi.span) + ' سجل</span></td></tr>';
    }

    var name = getF_(rec, 'اسم_الطالب') || getF_(rec, 'اسم الطالب') || '';
    var grade = getF_(rec, 'الصف') || '';
    var section = getF_(rec, 'الفصل') || '';
    var rowClass = idx % 2 === 0 ? 'rw' : 'rg';

    var noorVal = noorResolveValue_(rec, type);
    var noorBadge = noorVal
      ? '<span class="inline-block px-2 py-1 text-xs font-bold rounded bg-green-100 text-green-700" title="' + escapeHtml(noorVal) + '">\u2713 مطابق</span>'
      : '<span class="inline-block px-2 py-1 text-xs font-bold rounded bg-red-100 text-red-700">\u2717 غير مطابق</span>';

    html += '<tr class="' + rowClass + '">'
      + '<td><input type="checkbox" class="noor-cb" data-idx="' + idx + '" ' + (noorVal ? 'checked' : '') + '></td>'
      + '<td class="nm">' + escapeHtml(name) + '</td>'
      + '<td>' + escapeHtml(grade) + '</td>'
      + '<td>' + escapeHtml(section) + '</td>';

    if (type === 'violations') {
      var vName = getF_(rec, 'نص_المخالفة') || getF_(rec, 'نص المخالفة') || getF_(rec, 'المخالفة') || getF_(rec, 'نوع_المخالفة') || '';
      var degree = String(getF_(rec, 'الدرجة') || getF_(rec, 'درجة_المخالفة') || '');
      var degCls = '';
      for (var dk in degreeColors) { if (degree.indexOf(dk) >= 0) { degCls = degreeColors[dk]; break; } }
      var date = getF_(rec, 'التاريخ_الهجري') || getF_(rec, 'التاريخ الهجري') || getF_(rec, 'التاريخ هجري') || '';
      html += '<td class="text-right text-xs">' + escapeHtml(String(vName)).substring(0, 40) + '</td>'
        + '<td><span class="inline-block px-2 py-1 text-xs font-bold rounded ' + degCls + '">' + escapeHtml(degree) + '</span></td>'
        + '<td class="text-xs">' + escapeHtml(String(date)) + '</td>'
        + '<td>' + noorBadge + '</td>';

    } else if (type === 'tardiness') {
      var lateType = getF_(rec, 'نوع_التأخر') || getF_(rec, 'نوع التأخر') || 'تأخر صباحي';
      var lateDate = getF_(rec, 'التاريخ_هجري') || getF_(rec, 'التاريخ هجري') || '';
      html += '<td class="text-xs">' + escapeHtml(String(lateType)) + '</td>'
        + '<td class="text-xs">' + escapeHtml(String(lateDate)) + '</td>'
        + '<td>' + noorBadge + '</td>';

    } else if (type === 'compensation') {
      var compName = getF_(rec, 'السلوك_المتمايز') || getF_(rec, 'السلوك المتمايز') || '';
      var compDate = noorFindDate_(rec);
      html += '<td class="text-right text-xs">' + escapeHtml(String(compName)).substring(0, 40) + '</td>'
        + '<td class="text-xs">' + escapeHtml(String(compDate)) + '</td>'
        + '<td>' + noorBadge + '</td>';

    } else if (type === 'excellent') {
      var excName = getF_(rec, 'السلوك_المتمايز') || getF_(rec, 'السلوك المتمايز') || '';
      var excTeacher = getF_(rec, 'المعلم') || '';
      var excDate = noorFindDate_(rec);
      html += '<td class="text-right text-xs">' + escapeHtml(String(excName)).substring(0, 40) + '</td>'
        + '<td class="text-xs">' + escapeHtml(String(excTeacher)) + '</td>'
        + '<td class="text-xs">' + escapeHtml(String(excDate)) + '</td>'
        + '<td>' + noorBadge + '</td>';

    } else if (type === 'absence') {
      var absDate = getF_(rec, 'التاريخ_هجري') || getF_(rec, 'التاريخ هجري') || '';
      var currentAbsVal = noorResolveValue_(rec, type);
      var absSel = '<select class="noor-absence-select" data-idx="' + idx + '" '
        + 'onchange="noorSetAbsenceOverride_(' + idx + ',this.value)" '
        + 'style="font-size:12px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;min-width:130px;background:#fff">';
      ABSENCE_TYPE_OPTIONS.forEach(function(opt) {
        absSel += '<option value="' + opt.value + '"' + (currentAbsVal === opt.value ? ' selected' : '') + '>' + opt.label + '</option>';
      });
      absSel += '</select>';
      html += '<td>' + absSel + '</td>'
        + '<td class="text-xs">' + escapeHtml(String(absDate)) + '</td>'
        + '<td>' + noorBadge + '</td>';
    }

    html += '</tr>';
  });

  html += '</tbody></table></div>';

  // فوتر
  var matchCount = sorted.filter(function(r) { return !!noorResolveValue_(r, type); }).length;
  html += '<div class="tbl-footer">'
    + '<span class="s"><span class="d" style="background:#22c55e"></span> مطابق (' + toArabicNum_(matchCount) + ')</span>'
    + '<span class="s"><span class="d" style="background:#ef4444"></span> غير مطابق (' + toArabicNum_(records.length - matchCount) + ')</span>'
    + '<span class="s" style="margin-right:auto">الإجمالي: <strong>' + toArabicNum_(records.length) + '</strong> سجل</span>'
    + '</div>';

  tbody.innerHTML = html;
}


// ═══════════════════════════════════════════════════════════════
// استخراج التاريخ من السجل — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorFindDate_(rec) {
  var candidates = [
    'التاريخ_الهجري', 'التاريخ الهجري', 'التاريخ هجري',
    'التاريخ', 'وقت_الإدخال', 'وقت الإدخال',
    'التاريخ_الميلادي', 'التاريخ الميلادي'
  ];
  for (var i = 0; i < candidates.length; i++) {
    var val = getF_(rec, candidates[i]);
    if (val && String(val).trim() !== '') return String(val);
  }
  return '';
}


// ═══════════════════════════════════════════════════════════════
// منطق المطابقة مع نور — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorResolveValue_(record, type) {
  switch (type) {
    case 'violations':
      var violationId = getF_(record, 'رقم_المخالفة') || getF_(record, 'رقم المخالفة') || '';
      var id = parseInt(String(violationId), 10);
      var stageOverrides = NOOR_MAPPING['violations_' + currentStage];
      if (stageOverrides && stageOverrides.hasOwnProperty(id)) {
        return stageOverrides[id];
      }
      return NOOR_MAPPING.violations[id] || null;

    case 'tardiness':
      return '1601174,الدرجة الأولى';

    case 'compensation':
      var compText = getF_(record, 'السلوك_المتمايز') || getF_(record, 'السلوك المتمايز') || '';
      return noorMatchPositive_(compText, 'تعويض');

    case 'excellent':
      var excText = getF_(record, 'السلوك_المتمايز') || getF_(record, 'السلوك المتمايز') || '';
      return noorMatchPositive_(excText, 'متميز');

    case 'absence':
      if (record._absenceOverride) return record._absenceOverride;
      var absType = getF_(record, 'نوع_الغياب') || getF_(record, 'نوع الغياب') || '';
      var excuseType = getF_(record, 'نوع_العذر') || getF_(record, 'نوع العذر') || '';
      return noorMapAbsence_(absType, excuseType);

    default:
      return null;
  }
}

function noorMatchPositive_(behaviorText, category) {
  if (!behaviorText) return null;
  var text = String(behaviorText).trim();
  var map = NOOR_MAPPING.positive[category];
  if (!map) return null;

  if (map[text]) return map[text];

  var keys = Object.keys(map);
  for (var i = 0; i < keys.length; i++) {
    if (keys[i] !== 'أخرى' && text.indexOf(keys[i]) >= 0) return map[keys[i]];
  }
  for (var j = 0; j < keys.length; j++) {
    if (keys[j] !== 'أخرى' && keys[j].indexOf(text) >= 0) return map[keys[j]];
  }

  return map['أخرى'] || null;
}

function noorMapAbsence_(absenceType, excuseType) {
  var type = String(absenceType || '').trim();
  var excuse = String(excuseType || '').trim();

  if (excuse.indexOf('منصة') > -1 || excuse.indexOf('مدرستي') > -1 || type.indexOf('منصة') > -1) {
    if (excuse.indexOf('بدون') > -1 || type.indexOf('بدون') > -1) return '1201153,';
    return '800667,';
  }

  if (NOOR_MAPPING.absence[type]) return NOOR_MAPPING.absence[type];

  if (!excuse || excuse === 'بدون عذر' || excuse === 'بدون' || excuse === 'مرفوض') {
    return '48,';
  }
  if (excuse === 'بعذر' || excuse === 'معذور' || excuse === 'مقبول') {
    return '141,';
  }

  return '48,';
}


// ═══════════════════════════════════════════════════════════════
// تحديد/إلغاء + تجاوز الغياب — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorToggleAll_(checked) {
  document.querySelectorAll('.noor-cb').forEach(function(cb) { cb.checked = checked; });
}

function noorSetAbsenceOverride_(idx, noorValue) {
  if (!NOOR_STATE.pendingData || !NOOR_STATE.pendingData[idx]) return;
  NOOR_STATE.pendingData[idx]._absenceOverride = noorValue;
  var cb = document.querySelector('.noor-cb[data-idx="' + idx + '"]');
  if (cb) {
    var tr = cb.closest('tr');
    if (tr && noorValue) {
      var noorTd = tr.querySelector('td:last-child');
      if (noorTd) noorTd.innerHTML = '<span class="inline-block px-2 py-1 text-xs font-bold rounded bg-green-100 text-green-700">\u2713 مطابق</span>';
      cb.checked = true;
    }
  }
}

function noorApplyAbsenceTypeAll_(noorValue) {
  if (!noorValue) return;
  document.querySelectorAll('.noor-absence-select').forEach(function(sel) {
    sel.value = noorValue;
    var idx = parseInt(sel.dataset.idx);
    noorSetAbsenceOverride_(idx, noorValue);
  });
  showEnhancedToast('success', 'تم تطبيق نوع الغياب على جميع السجلات');
}


// ═══════════════════════════════════════════════════════════════
// ★ v4: بدء التنفيذ — عبر الجسر بدل postMessage
// ═══════════════════════════════════════════════════════════════
function noorStartExec_(tab) {
  if (!NOOR_STATE.connected) {
    showEnhancedToast('warning', 'يجب الاتصال بنور أولاً');
    return;
  }

  // جمع السجلات المحددة مع قيم نور
  var selected = [];
  document.querySelectorAll('.noor-cb:checked').forEach(function(cb) {
    var idx = parseInt(cb.dataset.idx);
    if (NOOR_STATE.pendingData && NOOR_STATE.pendingData[idx]) {
      var rec = NOOR_STATE.pendingData[idx];
      var noorVal = noorResolveValue_(rec, tab);
      if (noorVal) {
        rec._noorValue = noorVal;
        var tabConfig = NOOR_TABS[tab];
        rec._noorMode = {
          mowadaba: tabConfig.mow,
          deductType: tabConfig.deduct
        };
        selected.push(rec);
      }
    }
  });

  if (selected.length === 0) {
    showEnhancedToast('warning', 'لم يتم تحديد سجلات مطابقة لنور');
    return;
  }

  showStyledConfirm_({
    title: 'تأكيد التوثيق في نور',
    message: 'سيتم توثيق ' + selected.length + ' سجل في نظام نور. هل تريد المتابعة؟',
    icon: 'cloud_sync',
    color: 'emerald',
    onConfirm: function() {
      NOOR_STATE.working = true;
      NOOR_STATE.progress = { done: 0, total: selected.length };

      // ★ v4: إرسال عبر الجسر (inbox/outbox)
      var sent = _noorSendToExt({
        source: 'school-system',
        action: 'execute',
        operation: tab,
        records: selected,
        stage: currentStage,
        gradeMap: NOOR_MAPPING.grades[currentStage] || {}
      });

      if (!sent) {
        NOOR_STATE.working = false;
        showEnhancedToast('danger', 'الجسر غير متصل — تأكد من فتح نور في تبويب آخر مع تفعيل الإضافة');
        return;
      }

      noorRenderProgress_(document.getElementById('noor-content'));
      showEnhancedToast('info', 'بدء التوثيق...');
    }
  });
}


// ═══════════════════════════════════════════════════════════════
// شاشة التقدم — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorRenderProgress_(container) {
  if (!container) return;
  var p = NOOR_STATE.progress;
  var pct = p.total > 0 ? Math.round((p.done / p.total) * 100) : 0;

  container.innerHTML = ''
    + '<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-8 text-center">'
    + '<div style="width:120px;height:120px;margin:0 auto 20px;position:relative">'
    + '  <svg viewBox="0 0 120 120" style="transform:rotate(-90deg)">'
    + '    <circle cx="60" cy="60" r="52" fill="none" stroke="#e5e7eb" stroke-width="8"/>'
    + '    <circle cx="60" cy="60" r="52" fill="none" stroke="var(--sec-clr,#00695c)" stroke-width="8" stroke-linecap="round"'
    + '      stroke-dasharray="' + (2 * Math.PI * 52) + '" stroke-dashoffset="' + (2 * Math.PI * 52 * (1 - pct / 100)) + '" style="transition:stroke-dashoffset 0.5s"/>'
    + '  </svg>'
    + '  <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--c-text)">'
    + toArabicNum_(pct) + '<span style="font-size:14px;font-weight:600">%</span></div>'
    + '</div>'
    + '<h3 class="text-lg font-bold mb-2" style="color:var(--c-text)">جاري التوثيق في نور...</h3>'
    + '<p class="text-sm text-gray-400 mb-4">' + toArabicNum_(p.done) + ' من ' + toArabicNum_(p.total) + ' سجل</p>'
    + (p.current ? '<p class="text-xs text-gray-500 bg-gray-50 rounded-lg px-4 py-2 inline-block">' + escapeHtml(p.current) + '</p>' : '')
    + '<div class="mt-6">'
    + '<button onclick="noorCancelExec_()" class="btn-hero btn-hero-danger"><span class="material-symbols-outlined text-[18px]">stop</span>إيقاف</button>'
    + '</div>'
    + '</div>';
}

function noorUpdateProgress_() {
  var container = document.getElementById('noor-content');
  if (container && NOOR_STATE.working) {
    noorRenderProgress_(container);
  }
}

// ★ v4: الإلغاء عبر الجسر
function noorCancelExec_() {
  NOOR_STATE.working = false;
  _noorSendToExt({ source: 'school-system', action: 'cancel' });
  showEnhancedToast('warning', 'تم إيقاف التوثيق');
  noorSwitchTab_(NOOR_STATE.currentOp);
}


// ═══════════════════════════════════════════════════════════════
// إكمال التنفيذ — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorOnComplete_(results) {
  var container = document.getElementById('noor-content');
  if (!container) return;

  var success = results ? results.success || 0 : 0;
  var failed = results ? results.failed || 0 : 0;
  var total = success + failed;
  var updates = results ? results.updates || [] : [];

  // جدول تفصيلي بنتائج كل طالب
  var typeLabels = { violation: 'مخالفة', tardiness: 'تأخر', compensation: 'تعويضية', excellent: 'متمايز', absence: 'غياب' };
  var detailsHtml = '';
  if (NOOR_STATE.pendingData && updates.length > 0) {
    detailsHtml = '<div class="mt-6 text-right">'
      + '<h4 class="text-sm font-bold mb-3" style="color:var(--c-text)">تفاصيل التوثيق:</h4>'
      + '<div style="max-height:300px;overflow-y:auto;border:1px solid #e5e7eb;border-radius:12px">'
      + '<table class="sht"><thead><tr style="background:var(--sec-clr,#00695c)">'
      + '<th>#</th><th>اسم الطالب</th><th>الصف / الفصل</th><th>النوع</th><th>الحالة</th>'
      + '</tr></thead><tbody>';
    updates.forEach(function(u, i) {
      var rec = null;
      for (var j = 0; j < NOOR_STATE.pendingData.length; j++) {
        if (NOOR_STATE.pendingData[j]._rowIndex === u.rowIndex) { rec = NOOR_STATE.pendingData[j]; break; }
      }
      var name = rec ? (getF_(rec, 'اسم_الطالب') || getF_(rec, 'اسم الطالب') || '\u2014') : '\u2014';
      var grade = rec ? (getF_(rec, 'الصف') || '') : '';
      var section = rec ? (getF_(rec, 'الفصل') || '') : '';
      var gs = grade + (section ? ' / ' + section : '');
      var statusBadge = (u.status === 'تم')
        ? '<span class="inline-block px-2 py-1 text-xs font-bold rounded bg-green-100 text-green-700">\u2713 نجح</span>'
        : '<span class="inline-block px-2 py-1 text-xs font-bold rounded bg-red-100 text-red-700">\u2717 فشل</span>';
      detailsHtml += '<tr class="' + (i % 2 === 0 ? 'rw' : 'rg') + '">'
        + '<td class="text-xs">' + toArabicNum_(i + 1) + '</td>'
        + '<td class="nm">' + escapeHtml(name) + '</td>'
        + '<td class="text-xs">' + escapeHtml(gs) + '</td>'
        + '<td class="text-xs">' + escapeHtml(typeLabels[u.type] || u.type || '') + '</td>'
        + '<td>' + statusBadge + '</td></tr>';
    });
    detailsHtml += '</tbody></table></div></div>';
  }

  container.innerHTML = ''
    + '<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-8">'
    + '<div class="text-center">'
    + '<div style="width:80px;height:80px;margin:0 auto 16px;background:#ecfdf5;border-radius:50%;display:flex;align-items:center;justify-content:center">'
    + '  <span class="material-symbols-outlined" style="font-size:40px;color:#22c55e">check_circle</span>'
    + '</div>'
    + '<h3 class="text-xl font-bold mb-2" style="color:var(--c-text)">تم التوثيق بنجاح!</h3>'
    + '<div class="flex items-center justify-center gap-8 my-6">'
    + '  <div class="text-center"><div class="text-3xl font-black" style="color:#22c55e">' + toArabicNum_(success) + '</div><div class="text-xs text-gray-400">نجح</div></div>'
    + (failed > 0 ? '  <div class="text-center"><div class="text-3xl font-black" style="color:#ef4444">' + toArabicNum_(failed) + '</div><div class="text-xs text-gray-400">فشل</div></div>' : '')
    + '  <div class="text-center"><div class="text-3xl font-black" style="color:var(--c-text)">' + toArabicNum_(total) + '</div><div class="text-xs text-gray-400">الإجمالي</div></div>'
    + '</div></div>'
    + detailsHtml
    + '<div class="flex items-center justify-center gap-3 mt-6">'
    + '<button onclick="noorSwitchTab_(NOOR_STATE.currentOp)" class="btn-hero btn-hero-outline"><span class="material-symbols-outlined text-[18px]">arrow_back</span>عودة</button>'
    + '</div></div>';

  if (results && results.updates) {
    google.script.run.updateNoorStatus(currentStage, results.updates);
  }

  noorLoadStats_();
}


// ═══════════════════════════════════════════════════════════════
// الإحصائيات — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorLoadStats_() {
  google.script.run
    .withSuccessHandler(function(res) {
      if (!res || !res.success) return;
      var p = res.pending;
      var el;
      el = document.getElementById('ns-viol'); if (el) el.textContent = toArabicNum_(p.violations || 0);
      el = document.getElementById('ns-tard'); if (el) el.textContent = toArabicNum_(p.tardiness || 0);
      el = document.getElementById('ns-comp'); if (el) el.textContent = toArabicNum_(p.compensation || 0);
      el = document.getElementById('ns-exc');  if (el) el.textContent = toArabicNum_(p.excellent || 0);
      el = document.getElementById('ns-abs');  if (el) el.textContent = toArabicNum_(p.absence || 0);
      el = document.getElementById('ns-documented'); if (el) el.textContent = toArabicNum_(p.documentedToday || 0);
    })
    .getNoorStats(currentStage);
}


// ═══════════════════════════════════════════════════════════════
// مكونات مساعدة — بدون تغيير من v3
// ═══════════════════════════════════════════════════════════════
function noorEmptyState_(text, icon) {
  return '<div class="empty-state">'
    + '<div class="empty-state-icon"><span class="material-symbols-outlined">' + (icon || 'inbox') + '</span></div>'
    + '<h3>' + escapeHtml(text) + '</h3></div>';
}

function noorSkeletonRows_(n) {
  var html = '';
  for (var i = 0; i < n; i++) {
    html += '<div class="skeleton-row">'
      + '<div class="skeleton skeleton-cell" style="width:24px;height:14px"></div>'
      + '<div class="skeleton skeleton-cell" style="flex:2"></div>'
      + '<div class="skeleton skeleton-cell" style="flex:1"></div>'
      + '<div class="skeleton skeleton-cell" style="flex:1"></div>'
      + '<div class="skeleton skeleton-cell" style="flex:2"></div>'
      + '<div class="skeleton skeleton-cell" style="width:60px"></div>'
      + '</div>';
  }
  return html;
}
</script>
