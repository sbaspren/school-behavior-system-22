function dashGetStage_() {

}
function dashFilterByStage_(arr) {
  var stage = dashGetStage_();

function getMonthEvents_(month) {
  return EVENTS_DATA.filter(function(e) { return e.m === month + 1; });
}
function getHolidayDays_(month) {
  return EVENTS_DATA.filter(function(e) { return e.m === month + 1 && e.holiday; }).map(function(e) { return e.d; });
}
function getNextEvent_() {
  var now = new Date();
  var best = null, bestDiff = 999;
  for (var i = 0; i < EVENTS_DATA.length; i++) {
    var e = EVENTS_DATA[i];
    var evDate = new Date(now.getFullYear(), e.m - 1, e.d);
    var diff = Math.ceil((evDate - now) / 86400000);
    if (diff >= 0 && diff < bestDiff) { bestDiff = diff; best = {ev: e, days: diff}; }
  }
  return best;
}

// ★ المناسبات القادمة (أقرب N مناسبة)
function getUpcomingEvents_(count) {
  var now = new Date();
  var all = [];
  for (var i = 0; i < EVENTS_DATA.length; i++) {
    var e = EVENTS_DATA[i];
    var ed = new Date(now.getFullYear(), e.m - 1, e.d);
    if (ed < now) ed = new Date(now.getFullYear() + 1, e.m - 1, e.d);
    var diff = Math.ceil((ed - now) / 86400000);
    all.push({ev: e, days: diff});
  }
  all.sort(function(a, b) { return a.days - b.days; });
  return all.slice(0, count || 3);
}

// كشف رمضان تلقائياً باستخدام التقويم الهجري (يعمل كل سنة)
function isRamadan_() {
  try {
    var now = new Date();
    // استخدام التقويم الهجري لكشف الشهر التاسع (رمضان)
    var hijriStr = now.toLocaleDateString('en-u-ca-islamic-umalqura', {month:'numeric'});
    var hijriMonth = parseInt(hijriStr.match(/\d+/)[0]);
    return hijriMonth === 9; // رمضان = الشهر 9 هجري
  } catch(e) {
    // احتياطي: تواريخ رمضان التقريبية لعدة سنوات
    var y = now.getFullYear(), m = now.getMonth(), d = now.getDate();
    var ramadanDates = {
      2026: [[1, 17], [2, 18]],  // فبراير 17 - مارس 18
      2027: [[1, 6],  [2, 7]],   // فبراير 6 - مارس 7
      2028: [[0, 26], [1, 24]],  // يناير 26 - فبراير 24
      2029: [[0, 15], [1, 13]]   // يناير 15 - فبراير 13
    };
    var dates = ramadanDates[y];
    if (!dates) return false;
    if (m === dates[0][0] && d >= dates[0][1]) return true;
    if (m === dates[1][0] && d <= dates[1][1]) return true;
    return false;
  }
}

function getCurrentTiming_() { return isRamadan_() ? TIMING_RAMADAN : TIMING_REGULAR; }

function timeToMin_(t) {
  var p = t.split(':'); return parseInt(p[0]) * 60 + parseInt(p[1]);
}

function getCurrentPeriod_(stage) {
  var timing = getCurrentTiming_();
  var stg = stage === 'ثانوي' ? 'ث' : 'م';
  var periods = timing[stg];
  if (!periods || periods.length === 0) return null;
  var now = new Date();
  var nowMin = now.getHours() * 60 + now.getMinutes();
  // البحث عن الحصة الحالية
  for (var i = 0; i < periods.length; i++) {
    var s = timeToMin_(periods[i].s), e = timeToMin_(periods[i].e);
    if (nowMin >= s && nowMin < e) return periods[i];
  }
  // بين حصتين (فسحة/انتقال) — اعرض الحصة القادمة
  for (var j = 0; j < periods.length; j++) {
    if (nowMin < timeToMin_(periods[j].s)) return periods[j];
  }
  // بعد آخر حصة — اعرض الأخيرة مع علامة انتهت
  return periods[periods.length - 1];
}

function getTimeRemaining_(period) {
  var now = new Date();
  var nowMin = now.getHours() * 60 + now.getMinutes();
  var startMin = timeToMin_(period.s);
  var endMin = timeToMin_(period.e);
  if (nowMin < startMin) {
    var toStart = startMin - nowMin;
    return 'تبدأ بعد ' + toStart + ' د';
  }
  var rem = endMin - nowMin;
  if (rem <= 0) return 'انتهت';
  return 'باقي ' + rem + ' د';
}

}

function getSemesterProgress_() {
  var now = new Date();
  for (var i = 0; i < SEMESTER_DATES.length; i++) {
    var s = SEMESTER_DATES[i];
    var start = new Date(s.start[0], s.start[1], s.start[2]);
    var end = new Date(s.end[0], s.end[1], s.end[2]);
    if (now >= start && now <= end) {
      var total = end - start, elapsed = now - start;
      var pct = Math.min(100, Math.round((elapsed / total) * 100));
      var remaining = Math.ceil((end - now) / 86400000);
      var curWeek = Math.max(1, Math.min(s.weeks, Math.floor((now - start) / (7 * 86400000)) + 1));
      return { name: s.name, pct: pct, remaining: remaining, semIdx: i, week: curWeek, weeks: s.weeks };
    }
  }
  var nextSem = null;
  for (var j = 0; j < SEMESTER_DATES.length; j++) {
    var ns = new Date(SEMESTER_DATES[j].start[0], SEMESTER_DATES[j].start[1], SEMESTER_DATES[j].start[2]);
    if (ns > now) { nextSem = { idx: j, name: SEMESTER_DATES[j].name, date: ns }; break; }
  }
  if (nextSem) {
    var d2n = Math.ceil((nextSem.date - now) / 86400000);
    return { name: 'إجازة — ' + nextSem.name + ' بعد ' + d2n + ' يوم', pct: 100, remaining: d2n, semIdx: nextSem.idx > 0 ? nextSem.idx - 1 : 0, week: 18, weeks: 18 };
  }
  return { name: 'انتهى العام', pct: 100, remaining: 0, semIdx: 1, week: 18, weeks: 18 };
}

function dashRenderTimeline_(semIdx) {
  dashTimelineSem = semIdx;
  var sem = SEMESTER_DATES[semIdx];
  var now = new Date();
  var start = new Date(sem.start[0], sem.start[1], sem.start[2]);
  var end = new Date(sem.end[0], sem.end[1], sem.end[2]);
  var isCurrent = (now >= start && now <= end);
  var curWeek = isCurrent ? Math.max(1, Math.min(sem.weeks, Math.floor((now - start) / (7 * 86400000)) + 1)) : (now > end ? sem.weeks : 0);
  var pct = isCurrent ? Math.min(100, Math.round(((now - start) / (end - start)) * 100)) : (now > end ? 100 : 0);
  var dayNames = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  var holidayWeeks = {};
  for (var e = 0; e < sem.events.length; e++) { if (sem.events[e].type === 'holiday') holidayWeeks[sem.events[e].week] = true; }

  // الأسابيع
  var wh = '', lh = '';
  for (var w = 1; w <= sem.weeks; w++) {
    var cls = 'passed';
    if (isCurrent) { if (w > curWeek) cls = 'future'; else if (w === curWeek) cls = 'current'; }
    else if (now < start) cls = 'future';
    var isHol = holidayWeeks[w];
    var bg = '', clr = '';
    if (cls === 'current') { clr = 'color:white;font-weight:900;font-size:10px;'; }
    else if (cls === 'passed') { clr = 'color:rgba(255,255,255,.7);'; }
    else { clr = 'color:#94a3b8;'; }
    if (isHol) bg = cls === 'future' ? 'background:rgba(239,68,68,.1);' : 'background:rgba(239,68,68,.2);';
    var brd = w < sem.weeks ? (cls === 'future' ? 'border-left:1px solid #e2e8f0;' : 'border-left:1px solid rgba(255,255,255,.12);') : '';
    var rad = w === 1 ? 'border-radius:0 15px 15px 0;' : (w === sem.weeks ? 'border-radius:15px 0 0 15px;' : '');
    wh += '<div style="flex:1;height:30px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;' + clr + bg + brd + rad + '">' + w + '</div>';
    lh += '<div style="flex:1;text-align:center;font-size:8px;font-weight:600;color:' + (w === curWeek && isCurrent ? 'var(--c-primary,#4f46e5);font-weight:800' : '#94a3b8') + '">س' + w + '</div>';
  }
  var weeksEl = document.getElementById('dash-tl-weeks'); if (weeksEl) weeksEl.innerHTML = wh;
  var labelsEl = document.getElementById('dash-tl-labels'); if (labelsEl) labelsEl.innerHTML = lh;

  // الإبرة
  var needleEl = document.getElementById('dash-tl-needle');
  if (needleEl) {
    if (isCurrent) {
      var nPct = ((curWeek - 0.5) / sem.weeks) * 100;
      needleEl.style.right = nPct + '%';
      needleEl.style.transform = 'translateX(50%)';
      needleEl.style.display = 'flex';
      needleEl.innerHTML = '<div style="background:var(--c-primary,#4f46e5);color:white;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:800;white-space:nowrap;box-shadow:0 3px 10px rgba(79,70,229,.35);font-family:Noto Kufi Arabic,sans-serif;position:relative">الأسبوع ' + curWeek + ' · ' + dayNames[now.getDay()] + '<div style="position:absolute;bottom:-4px;left:50%;transform:translateX(-50%) rotate(45deg);width:8px;height:8px;background:var(--c-primary,#4f46e5);border-radius:1px"></div></div>' +
        '<div style="width:2px;height:34px;background:var(--c-primary,#4f46e5);margin-top:2px;border-radius:1px;box-shadow:0 0 6px rgba(79,70,229,.3)"></div>' +
        '<div style="width:8px;height:8px;background:var(--c-primary,#4f46e5);border:2px solid white;border-radius:50%;box-shadow:0 0 6px rgba(79,70,229,.4);margin-top:-1px"></div>';
    } else { needleEl.style.display = 'none'; }
  }

  // التقدم
  var progEl = document.getElementById('dash-tl-progress'); if (progEl) progEl.style.width = pct + '%';

  // المناسبات
  var evEl = document.getElementById('dash-tl-events');
  if (evEl) {
    var eh = '';
    for (var e = 0; e < sem.events.length; e++) {
      var ev = sem.events[e];
      var ePct = ((ev.week - 0.5) / sem.weeks) * 100;
      var ec = ev.type === 'national' ? '#10b981' : ev.type === 'holiday' ? '#ef4444' : '#6366f1';
      var lbl = ev.label.replace(/[\u{1F1E6}-\u{1F1FF}]|[\u{1F600}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{1F300}-\u{1F5FF}]/gu, '').trim();
      eh += '<div style="position:absolute;top:2px;right:' + ePct + '%;transform:translateX(50%);display:flex;flex-direction:column;align-items:center;z-index:3">';
      eh += '<div style="width:6px;height:6px;border-radius:50%;background:' + ec + ';box-shadow:0 0 0 2px ' + ec + '33;flex-shrink:0"></div>';
      eh += '<div style="font-size:7px;font-weight:600;color:#64748b;white-space:nowrap;margin-top:1px;max-width:60px;overflow:hidden;text-overflow:ellipsis">' + lbl + '</div></div>';
    }
    evEl.innerHTML = eh;
  }

  // الملخص
  var sumEl = document.getElementById('dash-tl-summary');
  if (sumEl) {
    var remaining = isCurrent ? Math.ceil((end - now) / 86400000) : 0;
    var nextEvt = null;
    if (isCurrent) {
      for (var ne = 0; ne < sem.events.length; ne++) {
        if (sem.events[ne].week >= curWeek) { nextEvt = sem.events[ne]; break; }
      }
    }
    var sh = '<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#64748b"><span style="width:8px;height:8px;border-radius:50%;background:var(--c-primary,#4f46e5)"></span>الأسبوع: <span style="font-weight:800;color:var(--c-text,#1a1d2e)">' + curWeek + ' / ' + sem.weeks + '</span></div>';
    sh += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#64748b"><span style="width:8px;height:8px;border-radius:50%;background:#10b981"></span>مضى: <span style="font-weight:800;color:var(--c-text,#1a1d2e)">' + pct + '%</span></div>';
    sh += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#64748b"><span style="width:8px;height:8px;border-radius:50%;background:#f59e0b"></span>باقي: <span style="font-weight:800;color:var(--c-text,#1a1d2e)">' + remaining + ' يوم</span></div>';
    if (nextEvt) {
      var nec = nextEvt.type === 'national' ? '#10b981' : nextEvt.type === 'holiday' ? '#ef4444' : '#6366f1';
      sh += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:#64748b"><span style="width:8px;height:8px;border-radius:50%;background:' + nec + '"></span>القادم: <span style="font-weight:800;color:' + nec + '">' + nextEvt.label + '</span></div>';
    }
    sumEl.innerHTML = sh;
  }

  // تبويبات
  for (var t = 0; t < 2; t++) {
    var tab = document.getElementById('dash-tl-tab-' + t);
    if (tab) {
      tab.style.background = t === semIdx ? 'var(--c-primary,#4f46e5)' : 'transparent';
      tab.style.color = t === semIdx ? 'white' : '#64748b';
      tab.style.boxShadow = t === semIdx ? '0 2px 6px rgba(79,70,229,.25)' : 'none';
    }
  }
}

function loadDashboardData_() {
  if (dashLoading) return;
  dashLoading = true;
  google.script.run
    .withSuccessHandler(function(data) {
      dashLoading = false;
      if (data && data.success) { dashboardData = data; populateDashboard_(data); }
      else { populateDashboardEmpty_(); }
    })
    .withFailureHandler(function() {
      dashLoading = false;
      populateDashboardEmpty_();
    })
    .getDashboardData();
}

function populateDashboard_(d) {
  var el;
  // تحديث التاريخ الهجري
  if (d.hijriDate && d.hijriDate.hijriStr) {

function buildStatsPlaceholder_() {

}

function buildStatsCards_(d) {
  var ss = d.stageStats || {'متوسط':{absence:0,tardiness:0,permissions:0,violations:0,notes:0},'ثانوي':{absence:0,tardiness:0,permissions:0,violations:0,notes:0}};
  // ★ عرض إحصاءات المرحلة المختارة فقط كرقم كبير
  var stage = dashGetStage_();
  var cur = ss[stage] || {};
  var allStages = Object.keys(ss);
  var otherStage = allStages.filter(function(s){return s !== stage;})[0] || '';
  var oth = ss[otherStage] || {};
  var ps = '';
  // حساب الاستئذان حسب المرحلة (تقريبي من النسب)
  if (cur.permissions > 0) ps = 'المرحلة الحالية فقط';
  return buildStatCard_('event_busy', 'غياب اليوم', cur.absence||0, oth.absence||0, cur.absence||0, 'orange', '', stage, otherStage) +
    buildStatCard_('timer_off', 'تأخر صباحي', cur.tardiness||0, oth.tardiness||0, cur.tardiness||0, 'red', '', stage, otherStage) +
    buildStatCard_('exit_to_app', 'استئذان', cur.permissions||0, oth.permissions||0, cur.permissions||0, 'purple', ps, stage, otherStage) +
    buildStatCard_('gavel', 'مخالفات', cur.violations||0, oth.violations||0, cur.violations||0, 'blue', '', stage, otherStage) +
    buildStatCard_('menu_book', 'ملاحظات', cur.notes||0, oth.notes||0, cur.notes||0, 'green', '', stage, otherStage) +
    buildStatCard_('family_restroom', 'أعذار', 0, 0, d.today.pendingExcuses||0, 'amber', '', stage, otherStage);
}

function buildStatCard_(icon, label, numCur, numOther, total, color, sub, curLabel, othLabel) {
  var cm = {orange:{bg:'#fff7ed',fg:'#f97316',ln:'#f97316'},red:{bg:'#fef2f2',fg:'#ef4444',ln:'#ef4444'},purple:{bg:'#faf5ff',fg:'#8b5cf6',ln:'#8b5cf6'},blue:{bg:'#eff6ff',fg:'#3b82f6',ln:'#3b82f6'},green:{bg:'#f0fdf4',fg:'#22c55e',ln:'#22c55e'},amber:{bg:'#fffbeb',fg:'#f59e0b',ln:'#f59e0b'}};
  var c = cm[color] || cm.blue;
  var showStages = (numCur !== '—' && numOther !== '—' && (numCur > 0 || numOther > 0));
  var STAGE_ABBR2 = {'متوسط':'مت','ثانوي':'ثا','ابتدائي':'بت','طفولة مبكرة':'طف'};
  var curAbbr = STAGE_ABBR2[curLabel] || curLabel;
  var othAbbr = STAGE_ABBR2[othLabel] || othLabel;
  var h = '<div class="dash-stat-card" style="background:#fff;border-radius:var(--r-lg,16px);padding:12px 10px;border:1px solid var(--c-border-light,#f0f2f7);box-shadow:0 1px 4px rgba(0,0,0,.04);position:relative;overflow:hidden;cursor:default">' +
    '<div style="position:absolute;top:0;right:0;width:3px;height:100%;background:' + c.ln + '"></div>' +
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">' +
      '<div style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:' + c.bg + ';flex-shrink:0"><span class="material-symbols-outlined" style="font-size:15px;color:' + c.fg + '">' + icon + '</span></div>' +
      '<span style="font-size:11px;font-weight:700;color:#64748b">' + label + '</span>' +
    '</div>';
  // ★ الرقم الكبير = المرحلة المختارة فقط
  h += '<div style="text-align:center;padding:4px 0"><span style="font-size:28px;font-weight:900;color:var(--c-text,#1a1d2e)">' + total + '</span></div>';
  // ★ شريط صغير يعرض المرحلة الأخرى كمرجع
  if (showStages && numOther > 0) {
    h += '<div style="border-top:1.5px solid #f1f5f9;padding-top:4px;text-align:center;font-size:9px;color:var(--c-text-muted,#9da3b8)">' + othAbbr + ': ' + numOther + '</div>';
  }
  if (sub) h += '<div style="font-size:9px;color:#a0aec0;text-align:center;margin-top:2px">' + sub + '</div>';
  h += '</div>';
  return h;
}

function buildAttendanceTable_(d) {
  var classes = getClassesFromStudents_();
  var sections = ['أ','ب','ج','د'], usedSections = {};
  for (var stage in classes) for (var g in classes[stage]) for (var sc in classes[stage][g]) usedSections[sc] = true;
  var activeSections = sections.filter(function(s) { return usedSections[s]; });
  if (activeSections.length === 0) activeSections = ['أ','ب'];

  var html = '<table style="width:100%;border-collapse:separate;border-spacing:0 3px">';
  html += '<thead><tr><th style="font-size:10px;font-weight:800;color:var(--c-text-muted,#9da3b8);padding:2px 4px;text-align:right;width:30px"></th>';
  for (var i = 0; i < activeSections.length; i++) html += '<th style="font-size:11px;font-weight:800;color:var(--c-text-muted,#9da3b8);padding:2px;text-align:center">' + activeSections[i] + '</th>';
  html += '</tr></thead><tbody>';

  // ★ فلترة حسب المرحلة المختارة
  var selectedStage = dashGetStage_();
  var stageOrder = [selectedStage], abbr = {'متوسط':'م','ثانوي':'ث'};
  for (var si = 0; si < stageOrder.length; si++) {
    var stg = stageOrder[si], stgColor = si === 0 ? '#6366f1' : '#8b5cf6';
    html += '<tr><td colspan="' + (activeSections.length + 1) + '" style="font-size:10px;font-weight:800;color:' + stgColor + ';padding:8px 4px 3px;border-bottom:2px solid ' + stgColor + '22">' + stg + '</td></tr>';
    var gradeNums = classes[stg] ? Object.keys(classes[stg]).sort() : ['1','2','3'];
    for (var gi = 0; gi < gradeNums.length; gi++) {
      var gn = gradeNums[gi];
      html += '<tr><td style="font-size:12px;font-weight:800;color:#475569;text-align:right;padding:3px 4px">' + gn + '</td>';
      for (var sci = 0; sci < activeSections.length; sci++) {
        var sec = activeSections[sci], absData = d.absenceByClass[stg] || {}, found = false, count = 0;
        for (var key in absData) { if (matchClassKey_(key, gn, sec, abbr[stg])) { found = true; count = absData[key]; break; } }
        var classExists = classes[stg] && classes[stg][gn] && classes[stg][gn][sec];
        var cellHtml, cellBg = 'transparent', cellBorder = 'transparent';
        if (!classExists) { cellHtml = '<span style="color:#e2e8f0">—</span>'; }
        else if (found && count > 0) { cellBg = '#fef2f2'; cellBorder = '#fecaca'; cellHtml = '<span style="font-size:14px;font-weight:900;color:#dc2626">' + count + '</span>'; }
        else if (found) { cellBg = '#f0fdf4'; cellBorder = '#bbf7d0'; cellHtml = '<span style="font-size:12px;font-weight:800;color:#22c55e">0</span>'; }
        else { cellBg = '#f8fafc'; cellBorder = '#e2e8f0'; cellHtml = '<span style="color:var(--c-text-muted,#9da3b8);font-size:9px;font-weight:700" class="dash-blink">انتظار</span>'; }
        html += '<td style="text-align:center;padding:5px 2px"><div style="background:' + cellBg + ';border:1px solid ' + cellBorder + ';border-radius:6px;padding:4px 0">' + cellHtml + '</div></td>';
      }
      html += '</tr>';
    }
  }
  html += '</tbody></table>';

  // ★ نسبة الحضور حسب المرحلة المختارة
  var stageStats = (d.stageStats && d.stageStats[selectedStage]) || {};
  var totalAbs = stageStats.absence || 0;
  var totalStudents = 0;
  if (APP_DATA && APP_DATA.students) {
    for (var si2 = 0; si2 < APP_DATA.students.length; si2++) {
      if (APP_DATA.students[si2]['المرحلة'] === selectedStage) totalStudents++;
    }
  }
  var attendPct = totalStudents > 0 ? Math.round(((totalStudents - totalAbs) / totalStudents) * 100) : 100;
  var pctColor = attendPct >= 95 ? '#22c55e' : attendPct >= 90 ? '#f59e0b' : '#ef4444';
  html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">';
  html += '<span style="font-size:10px;font-weight:600;color:var(--c-text-muted,#9da3b8)">نسبة الحضور</span>';
  html += '<span style="font-size:16px;font-weight:900;color:' + pctColor + '">' + attendPct + '%</span></div>';
  return buildAttBox_(html);
}

function getClassesFromStudents_() {
  var result = {};
  if (!APP_DATA || !APP_DATA.students) return result;
  for (var i = 0; i < APP_DATA.students.length; i++) {
    var st = APP_DATA.students[i], stage = st['المرحلة'] || '', grade = String(st['الصف'] || '').replace(/[^\d]/g, ''), cls = String(st['الفصل'] || '').trim(), section = '';
    if (cls.indexOf('أ') > -1) section = 'أ'; else if (cls.indexOf('ب') > -1) section = 'ب'; else if (cls.indexOf('ج') > -1) section = 'ج'; else if (cls.indexOf('د') > -1) section = 'د';
    if (!section) continue;
    if (!grade) { if (cls.indexOf('1') > -1 || cls.indexOf('الأول') > -1) grade = '1'; else if (cls.indexOf('2') > -1 || cls.indexOf('الثاني') > -1) grade = '2'; else if (cls.indexOf('3') > -1 || cls.indexOf('الثالث') > -1) grade = '3'; }
    if (!grade) continue;
    if (!result[stage]) result[stage] = {}; if (!result[stage][grade]) result[stage][grade] = {}; result[stage][grade][section] = true;
  }
  return result;
}

function matchClassKey_(key, gradeNum, section, stageAbbr) {
  var k = key.replace(/\s+/g, ''), gn = {'1':'الأول','2':'الثاني','3':'الثالث'};
  var p = [gradeNum + '-' + section, gradeNum + section, stageAbbr + gradeNum + section];
  if (gn[gradeNum]) { p.push(gn[gradeNum] + section); p.push(gn[gradeNum] + '-' + section); }
  for (var i = 0; i < p.length; i++) { if (k.indexOf(p[i].replace(/\s+/g, '')) > -1) return true; }
  return false;
}

      var placeholder = searchFields[i].getAttribute('placeholder') || '';

function dashBuildScheduleRows_(dayIdx, period, stageFilter) {
  var key = dayIdx + '_' + period;
  var entries = SCHEDULE_DATA[key] || [];
  // Filter by stage
  var filtered = [];
  for (var i = 0; i < entries.length; i++) {
    if (stageFilter === 'الكل' || entries[i][3] === stageFilter) filtered.push(entries[i]);
  }
  if (filtered.length === 0) {
    return '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--c-text-muted,#9da3b8);font-size:12px"><span class="material-symbols-outlined" style="font-size:24px;color:#e2e8f0;display:block;margin-bottom:4px">event_available</span>لا توجد حصص</td></tr>';
  }
  // Sort by class
  filtered.sort(function(a, b) { return a[1].localeCompare(b[1]); });
  var h = '';
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var stgColor = e[3] === 'ث' ? '#8b5cf6' : '#6366f1';
    var stgBg = e[3] === 'ث' ? '#faf5ff' : '#eef2ff';
    h += '<tr style="border-bottom:1px solid #f8fafc">';
    h += '<td style="padding:6px 8px;font-size:12px;font-weight:700;color:var(--c-text,#1a1d2e)"><span style="font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px;background:' + stgBg + ';color:' + stgColor + ';margin-left:4px">' + e[1] + '</span></td>';
    h += '<td style="padding:6px 8px;font-size:12px;font-weight:600;color:var(--c-text,#1a1d2e)">' + e[0] + '</td>';
    h += '<td style="padding:6px 8px;font-size:11px;color:#64748b">' + (e[2] || '—') + '</td>';
    h += '</tr>';
  }
  return h;
}

var dashCurrentPeriod = 0, dashStageIndex = 0;

// مزامنة المرحلة مع الاختيار الرئيسي
function dashSyncStage_() {
  if (typeof currentStage !== 'undefined') {
    dashStageIndex = (currentStage === 'ثانوي') ? 1 : 0;
  }
}

function dashSelectPeriod(n) {
  dashCurrentPeriod = n;
  var pN = ['الأولى','الثانية','الثالثة','الرابعة','الخامسة','السادسة','السابعة'];
  var el = document.getElementById('dash-period-name');
  if (el) el.textContent = n;

  // Update timing display
  var stgKey = dashStageIndex === 1 ? 'ث' : 'م';
  var timing = getCurrentTiming_();
  var periods = timing[stgKey];
  var pInfo = null;
  for (var i = 0; i < periods.length; i++) { if (periods[i].p === n) { pInfo = periods[i]; break; } }
  var timeEl = document.getElementById('dash-period-time');
  if (timeEl && pInfo) timeEl.textContent = pInfo.s + ' - ' + pInfo.e;

  // Update pills
  for (var i = 1; i <= 7; i++) {
    var p = document.getElementById('dash-pp-' + i); if (!p) continue;
    if (i < n) p.style.cssText = 'width:30px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#4338ca;background:#e0e7ff;cursor:pointer;border:1.5px solid transparent';
    else if (i === n) p.style.cssText = 'width:30px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;background:linear-gradient(135deg,#4f46e5,#7c3aed);cursor:pointer;border:1.5px solid #4f46e5;box-shadow:0 2px 8px rgba(79,70,229,.25)';
    else p.style.cssText = 'width:30px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--c-text-muted,#9da3b8);background:#f8fafc;cursor:pointer;border:1.5px solid transparent';
  }

  // Update table
  var dayIdx = new Date().getDay();
  var body = document.getElementById('dash-sch-body');
  if (body) body.innerHTML = dashBuildScheduleRows_(dayIdx, n, stgKey);
}

function dashToggleStage() {
  dashStageIndex = (dashStageIndex + 1) % 2;
  var stgKey = dashStageIndex === 1 ? 'ث' : 'م';
  var btn = document.getElementById('dash-stage-btn');
  if (btn) btn.textContent = dashStageIndex === 1 ? 'ثانوي' : 'متوسط';
  // Refresh table
  var _cp = getCurrentPeriod_(dashStageIndex === 1 ? 'ثانوي' : 'متوسط');
  var curP = dashCurrentPeriod || (_cp ? _cp.p : 1);
  dashSelectPeriod(curP);
}

// =================================================================
// 10. بطاقة التوثيق (الطباعة) — تفاعلية
// =================================================================
var dashPrintHidden = false;
var dashPrintDismissed = {}; // الطلاب المتجاهلين

function buildPrintingCard_(d) {
  // ★ فلترة حسب المرحلة المختارة
  var items = dashFilterByStage_(d.needsPrinting || []).filter(function(it) {
    return !dashPrintDismissed[it.studentId + '_' + it.type];
  });
  var wrap = document.getElementById('dash-printing-wrap');
  var body = document.getElementById('dash-printing-body');
  var countEl = document.getElementById('dash-print-count');
  if (!wrap || !body) return;

  if (items.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  if (countEl) countEl.textContent = items.length;

  var violations = items.filter(function(i) { return i.type === 'مخالفة'; });
  var absences = items.filter(function(i) { return i.type === 'غياب'; });

  var h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';

  // عمود المخالفات
  h += '<div>';
  h += '<div style="font-size:11px;font-weight:800;color:#dc2626;margin-bottom:6px;display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:14px">gavel</span> مخالفات بدون نماذج (' + violations.length + ')</div>';
  if (violations.length === 0) {
    h += '<div style="text-align:center;padding:8px;color:var(--c-text-muted,#9da3b8);font-size:11px">✓ لا يوجد</div>';
  } else {
    for (var vi = 0; vi < violations.length; vi++) h += buildPrintItemCompact_(violations[vi], vi);
  }
  h += '</div>';

  // عمود الغياب
  h += '<div>';
  h += '<div style="font-size:11px;font-weight:800;color:#ea580c;margin-bottom:6px;display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:14px">event_busy</span> غياب متكرر (' + absences.length + ')</div>';
  if (absences.length === 0) {
    h += '<div style="text-align:center;padding:8px;color:var(--c-text-muted,#9da3b8);font-size:11px">✓ لا يوجد</div>';
  } else {
    for (var ai = 0; ai < absences.length; ai++) h += buildPrintItemCompact_(absences[ai], 100 + ai);
  }
  h += '</div></div>';
  body.innerHTML = h;
}

function buildPrintItemCompact_(item, idx) {
  var isViol = item.type === 'مخالفة';
  var degBg = isViol ? (item.degree >= 4 ? '#dc2626' : item.degree >= 3 ? '#f97316' : '#f59e0b') : '#ea580c';
  return '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;margin-bottom:4px;background:#f8fafc;border-radius:8px;cursor:pointer" onclick="dashGoToStudent(\'' + escapeHtml(item.section) + '\',\'' + encodeURIComponent(item.name) + '\')">' +
    '<span style="font-size:10px;font-weight:900;color:white;background:' + degBg + ';padding:1px 6px;border-radius:4px;flex-shrink:0">' + (isViol ? 'د' + item.degree : item.degree + 'x') + '</span>' +
    '<span style="font-size:11px;font-weight:600;color:var(--c-text,#1a1d2e);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(item.name) + '</span>' +
    '<span style="font-size:9px;font-weight:700;color:var(--c-text-muted,#9da3b8);flex-shrink:0">' + escapeHtml(item.grade) + '</span>' +
  '</div>';
}

function buildPrintItem_(item, idx) {
  var isViol = item.type === 'مخالفة';
  var borderColor = isViol ? '#fecaca' : '#fed7aa';
  var iconColor = isViol ? '#dc2626' : '#ea580c';
  var degBg = isViol ? (item.degree >= 4 ? '#dc2626' : item.degree >= 3 ? '#f97316' : '#f59e0b') : '#ea580c';

  var h = '<div id="dash-pi-' + idx + '" style="border:1px solid ' + borderColor + ';border-radius:10px;padding:10px;margin-bottom:8px;transition:all .2s">';

  // السطر الرئيسي (قابل للضغط)
  h += '<div style="display:flex;align-items:center;gap:8px;cursor:pointer" onclick="dashTogglePrintDetail(' + idx + ')">';
  h += '<span style="font-size:11px;font-weight:900;color:white;background:' + degBg + ';padding:2px 8px;border-radius:6px;flex-shrink:0">' + (isViol ? 'د' + item.degree : item.degree + 'x') + '</span>';
  h += '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:var(--c-text,#1a1d2e);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(item.name) + '</div>';
  h += '<div style="font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(item.detail) + '</div></div>';
  h += '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:#f1f5f9;color:#64748b;flex-shrink:0">' + escapeHtml(item.grade) + ' ' + escapeHtml(item.cls) + '</span>';
  h += '<span class="material-symbols-outlined" style="font-size:18px;color:var(--c-text-muted,#9da3b8);flex-shrink:0;transition:transform .2s" id="dash-pi-arrow-' + idx + '">expand_more</span>';
  h += '</div>';

  // التفاصيل (مخفية)
  h += '<div id="dash-pi-detail-' + idx + '" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9">';

  // النماذج المطلوبة
  h += '<div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">assignment</span> النماذج المطلوبة:</div>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">';
  for (var f = 0; f < item.neededForms.length; f++) {
    h += '<span style="font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca">' + escapeHtml(item.neededForms[f]) + '</span>';
  }
  h += '</div>';

  // معلومات إضافية
  if (item.date) h += '<div style="font-size:11px;color:var(--c-text-muted,#9da3b8);margin-bottom:6px"><span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle">calendar_today</span> ' + item.date + ' · ' + item.stage + '</div>';

  // الأزرار
  h += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  // زر الانتقال للقسم
  h += '<button onclick="dashGoToStudent(\'' + escapeHtml(item.section) + '\',\'' + encodeURIComponent(item.name) + '\')" style="display:flex;align-items:center;gap:4px;padding:6px 14px;background:#4f46e5;color:white;border:none;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer"><span class="material-symbols-outlined" style="font-size:14px">open_in_new</span> فتح سجل الطالب</button>';
  // زر تجاهل
  h += '<button onclick="dashDismissPrint(\'' + escapeHtml(item.studentId) + '\',\'' + escapeHtml(item.type) + '\')" style="display:flex;align-items:center;gap:4px;padding:6px 14px;background:#f1f5f9;color:#64748b;border:none;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer"><span class="material-symbols-outlined" style="font-size:14px">visibility_off</span> تجاهل</button>';
  h += '</div></div></div>';
  return h;
}

function dashTogglePrintDetail(idx) {
  var detail = document.getElementById('dash-pi-detail-' + idx);
  var arrow = document.getElementById('dash-pi-arrow-' + idx);
  if (!detail) return;
  if (detail.style.display === 'none') {
    detail.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(180deg)';
  } else {
    detail.style.display = 'none';
    if (arrow) arrow.style.transform = '';
  }
}

function dashTogglePrintSection() {
  var body = document.getElementById('dash-printing-body');
  var toggle = document.getElementById('dash-print-toggle');
  if (!body) return;
  dashPrintHidden = !dashPrintHidden;
  body.style.display = dashPrintHidden ? 'none' : 'block';
  if (toggle) toggle.textContent = dashPrintHidden ? '▼ إظهار' : '▲ إخفاء';
}

function dashDismissPrint(studentId, type) {
  dashPrintDismissed[studentId + '_' + type] = true;
  if (dashboardData) buildPrintingCard_(dashboardData);
}

function dashGoToStudent(section, encodedName) {
  var name = decodeURIComponent(encodedName);
  // الانتقال للقسم
  switchSection(section);
  // بعد تحميل القسم، محاولة البحث عن الطالب
  setTimeout(function() {
    // محاولة ملء حقل البحث إذا وجد
    var searchFields = document.querySelectorAll('#main-content input[type="text"]');
    for (var i = 0; i < searchFields.length; i++) {
      var placeholder = searchFields[i].getAttribute('placeholder') || '';
      if (placeholder.indexOf('بحث') > -1 || placeholder.indexOf('طالب') > -1 || placeholder.indexOf('اسم') > -1) {
        searchFields[i].value = name;
        searchFields[i].dispatchEvent(new Event('input', {bubbles: true}));
        searchFields[i].focus();
        break;
      }
    }
  }, 800);
}
