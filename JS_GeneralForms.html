    // =================================================================
    // 2. إنشاء بطاقة النموذج
    // =================================================================
    function createFormCard(formId, title, desc, colorClass, icon, requiresStudent, requiresViolation = false) {
        const studentAttr = requiresStudent ? 'true' : 'false';
        const violationAttr = requiresViolation ? 'true' : 'false';
        
        return `
            <div class="form-card bg-white p-5 rounded-xl cursor-pointer border border-gray-200 hover:border-indigo-300 hover:shadow-lg transition-all group"
                 onclick="openGfModal('${formId}', '${title}', ${studentAttr}, ${violationAttr})"
                 data-form-id="${formId}">
                <div class="flex items-center gap-3 mb-2">
                    <div class="p-2 bg-gray-50 rounded-xl group-hover:bg-indigo-50 transition-colors">
                        <span class="material-symbols-outlined ${colorClass}">${icon}</span>
                    </div>
                    <h3 class="font-bold ${colorClass}">${title}</h3>
                </div>
                <p class="text-sm text-gray-500">${desc}</p>
            </div>
        `;
    }

    // =================================================================
    // 3. فتح نافذة اختيار الطالب
    // =================================================================
    let gf_currentFormId = '';
    let gf_currentFormTitle = '';
    let gf_requiresViolation = false;

    function openGfModal(formId, title, requiresStudent, requiresViolation) {
        gf_currentFormId = formId;
        gf_currentFormTitle = title;
        gf_requiresViolation = requiresViolation;
        
        // إذا النموذج لا يحتاج طالب (فارغ)، اطبع مباشرة
        if (!requiresStudent) {
            printGeneralFormDirect(formId, {});
            return;
        }
        
        // تحديث عنوان النافذة
        document.getElementById('gf-modal-title').innerText = title;
        document.getElementById('gf-modal-subtitle').innerText = 'حدد بيانات الطالب للطباعة';
        
        // تعبئة قائمة الصفوف
        const gradeSelect = document.getElementById('gf-modal-grade');
        gradeSelect.innerHTML = '<option value="">اختر الصف</option>';
        
        const grades = [...new Set(APP_DATA.students.filter(s => s['المرحلة'] === currentStage).map(s => s['الصف']))];
        const gradeOrder = ["أول", "ثاني", "ثالث"];
        grades.sort((a, b) => {
            const idxA = gradeOrder.findIndex(k => a.includes(k));
            const idxB = gradeOrder.findIndex(k => b.includes(k));
            if (idxA !== -1 && idxB !== -1) return idxA - idxB;
            return a.localeCompare(b, 'ar');
        });
        grades.forEach(g => gradeSelect.add(new Option(g, g)));
        
        // إعادة تعيين الحقول
        document.getElementById('gf-modal-class').innerHTML = '<option value="">اختر الفصل</option>';
        document.getElementById('gf-modal-class').disabled = true;
        document.getElementById('gf-modal-student').innerHTML = '<option value="">اختر الطالب</option>';
        document.getElementById('gf-modal-student').disabled = true;
        document.getElementById('gf-modal-submit-btn').disabled = true;
        
        // إخفاء/إظهار قسم المخالفات
        const violationSection = document.getElementById('gf-violation-section');
        if (requiresViolation) {
            violationSection.classList.remove('hidden');
            document.getElementById('gf-modal-violation').innerHTML = '<option value="">-- اختر الطالب أولاً --</option>';
        } else {
            violationSection.classList.add('hidden');
        }
        
        // إظهار النافذة
        document.getElementById('gf-student-modal').classList.remove('hidden');
    }

    function closeGfModal() {
        document.getElementById('gf-student-modal').classList.add('hidden');
        gf_studentViolations = [];
    }

    // =================================================================
    // 4. تعبئة القوائم المتتالية
    // =================================================================
    function gfModalPopulateClasses() {
        const grade = document.getElementById('gf-modal-grade').value;
        const classSelect = document.getElementById('gf-modal-class');
        const studentSelect = document.getElementById('gf-modal-student');
        
        classSelect.innerHTML = '<option value="">اختر الفصل</option>';
        studentSelect.innerHTML = '<option value="">اختر الطالب</option>';
        classSelect.disabled = !grade;
        studentSelect.disabled = true;
        document.getElementById('gf-modal-submit-btn').disabled = true;
        
        if (grade) {
            const classes = [...new Set(APP_DATA.students
                .filter(s => s['المرحلة'] === currentStage && s['الصف'] === grade)
                .map(s => s['الفصل']))];
            classes.sort((a, b) => a.toString().localeCompare(b.toString(), 'ar'));
            classes.forEach(c => classSelect.add(new Option(c, c)));
        }
    }

    function gfModalPopulateStudents() {
        const grade = document.getElementById('gf-modal-grade').value;
        const cls = document.getElementById('gf-modal-class').value;
        const studentSelect = document.getElementById('gf-modal-student');
        
        studentSelect.innerHTML = '<option value="">اختر الطالب</option>';
        studentSelect.disabled = !cls;
        document.getElementById('gf-modal-submit-btn').disabled = true;
        
        if (grade && cls) {
            const students = APP_DATA.students.filter(s => 
                s['المرحلة'] === currentStage && 
                s['الصف'] === grade && 
                s['الفصل'] == cls
            );
            students.sort((a, b) => a['اسم الطالب'].localeCompare(b['اسم الطالب'], 'ar'));
            students.forEach(s => {
                const opt = new Option(s['اسم الطالب'], s['رقم الطالب']);
                opt.dataset.name = s['اسم الطالب'];
                studentSelect.add(opt);
            });
        }
    }

    function gfModalOnStudentSelected() {
        const studentSelect = document.getElementById('gf-modal-student');
        const studentId = studentSelect.value;
        const submitBtn = document.getElementById('gf-modal-submit-btn');
        
        if (!studentId) {
            submitBtn.disabled = true;
            return;
        }
        
        // إذا النموذج يحتاج مخالفة، جلب مخالفات الطالب
        if (gf_requiresViolation) {
            submitBtn.disabled = true;
            loadStudentViolationsForModal(studentId);
        } else {
            submitBtn.disabled = false;
        }
    }

    // =================================================================
    // 5. جلب مخالفات الطالب (للنماذج التي تحتاج مخالفة)
    // =================================================================
    function loadStudentViolationsForModal(studentId) {
        const violationSelect = document.getElementById('gf-modal-violation');
        violationSelect.innerHTML = '<option value="">جاري التحميل...</option>';
        
        google.script.run.withSuccessHandler(function(records) {
            // فلترة مخالفات هذا الطالب
            gf_studentViolations = records.filter(r => String(r['رقم الطالب']) === String(studentId));
            
            violationSelect.innerHTML = '<option value="">-- اختر المخالفة --</option>';
            
            if (gf_studentViolations.length === 0) {
                violationSelect.innerHTML = '<option value="">لا توجد مخالفات مسجلة لهذا الطالب</option>';
                document.getElementById('gf-violation-hint').innerText = '⚠️ لا يمكن طباعة النموذج بدون مخالفة';
                return;
            }
            
            // ترتيب المخالفات من الأحدث للأقدم
            gf_studentViolations.sort((a, b) => new Date(b['وقت الإدخال']) - new Date(a['وقت الإدخال']));
            
            gf_studentViolations.forEach((v, idx) => {
                const dateStr = v['التاريخ الهجري'] || '';
                const degree = v['الدرجة'] || '';
                const text = v['نص المخالفة'] || '';
                const shortText = text.length > 30 ? text.substring(0, 30) + '...' : text;
                
                const opt = new Option(`${dateStr} - د${degree} - ${shortText}`, idx);
                violationSelect.add(opt);
            });
            
            document.getElementById('gf-violation-hint').innerText = 'اختر المخالفة ثم اضغط طباعة';
            
            // تفعيل زر الإرسال عند اختيار مخالفة
            violationSelect.onchange = function() {
                document.getElementById('gf-modal-submit-btn').disabled = !this.value;
            };
            
        }).withFailureHandler(function(err) {
            violationSelect.innerHTML = '<option value="">خطأ في جلب البيانات</option>';
            showEnhancedToast('danger', 'فشل جلب مخالفات الطالب');
        }).getCachedViolationRecords(currentStage);
    }

    // =================================================================
    // 6. تنفيذ الطباعة
    // =================================================================
    function gfModalSubmit() {
        const grade = document.getElementById('gf-modal-grade').value;
        const cls = document.getElementById('gf-modal-class').value;
        const studentSelect = document.getElementById('gf-modal-student');
        const studentName = studentSelect.options[studentSelect.selectedIndex].dataset.name || studentSelect.options[studentSelect.selectedIndex].text;
        
        // تجهيز البيانات الأساسية
        let printData = {
            studentName: studentName,
            grade: grade,
            class: cls,
            violationDate: new Date().toLocaleDateString('ar-SA-u-ca-islamic-umalqura'),
            violationDay: new Date().toLocaleDateString('ar-SA', { weekday: 'long' })
        };
        
        // إضافة بيانات الإعدادات
        if (APP_DATA.settings) {
            if (APP_DATA.settings.manager) printData.managerName = APP_DATA.settings.manager;
            if (APP_DATA.settings.deputies && APP_DATA.settings.deputies.length > 0) {
                printData.deputyName = APP_DATA.settings.deputies[0].name;
            }
            if (APP_DATA.settings.committee) printData.committeeMembers = APP_DATA.settings.committee;
        }
        
        // إذا النموذج يحتاج مخالفة
        if (gf_requiresViolation) {
            const violationIdx = document.getElementById('gf-modal-violation').value;
            if (violationIdx !== '' && gf_studentViolations[violationIdx]) {
                const v = gf_studentViolations[violationIdx];
                printData.violationInfo = {
                    name: v['نص المخالفة'],
                    degree: v['الدرجة'],
                    date: v['التاريخ الهجري'],
                    points: extractPoints(v['الإجراءات'] || '')
                };
                printData.violationText = v['نص المخالفة'];
                printData.violationDegree = v['الدرجة'];
                printData.violationDate = v['التاريخ الهجري'];
            }
        }
        
        // معالجة خاصة لسجل المخالفات
        if (gf_currentFormId === 'rasd_slooki') {
            printData.violationsList = gf_studentViolations;
        }
        
        // إغلاق النافذة والطباعة
        closeGfModal();
        printGeneralFormDirect(gf_currentFormId, printData);
    }

    // =================================================================
    // 7. دالة الطباعة المباشرة
    // =================================================================
    function printGeneralFormDirect(formId, data) {
        // ★ النماذج التي تحتاج منبثقة إضافية
        var modalForms = {
            'dawat_wali_amr': showDawatModalGeneral_,
            'tawtheeq_tawasol': showTawtheeqModal_,
            'mahdar_dab_wakea': showMahdarModal_,
            'mahdar_lajnah': showLajnahModal_,
            'mahdar_lajnah_absence': showLajnahAbsModal_,
            'tahood_hodoor': showTahoodHodoorModal_,
            'high_risk': showHighRiskModal_,
            'eblagh_etha': showEblaghModal_,
            'khota_tadeel': showKhotaModal_,
            'mashajara': showMashajaraModal_,
            'rasd_moalem': showRasdMoalemModal_
        };
        if (modalForms[formId]) {
            modalForms[formId](data);
            return;
        }
        showEnhancedToast('info', 'جاري تحضير النموذج...');
        printFormDirectly(formId, encodeURIComponent(JSON.stringify(data)));
    }

    // ★ منبثقة دعوة ولي أمر من النماذج العامة
    function showDawatModalGeneral_(baseData) {
        var tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        while (tomorrow.getDay() === 5 || tomorrow.getDay() === 6) { tomorrow.setDate(tomorrow.getDate() + 1); }
        var tomorrowStr = tomorrow.toISOString().split('T')[0];
        var dayNames = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
        var defaultDay = dayNames[tomorrow.getDay()];
        var defaultHijri = '';
        try { defaultHijri = tomorrow.toLocaleDateString('ar-SA-u-ca-islamic-umalqura', { day: 'numeric', month: 'long', year: 'numeric' }) + ' هـ'; } catch(e) { defaultHijri = ''; }

        var old = document.getElementById('dawat-modal-overlay');
        if (old) old.remove();

        var overlay = document.createElement('div');
        overlay.id = 'dawat-modal-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)';
        overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

    function extractPoints(proceduresText) {
        if (!proceduresText) return '0';
        
        // البحث عن أرقام في النص
        const numberMatch = proceduresText.match(/حسم\s*(\d+)/);
        if (numberMatch) return numberMatch[1];
        
        if (proceduresText.includes('درجة واحدة')) return '1';
        if (proceduresText.includes('درجتين') || proceduresText.includes('درجتان')) return '2';
        if (proceduresText.includes('ثلاث درجات') || proceduresText.includes('3 درجات')) return '3';
        if (proceduresText.includes('عشر درجات') || proceduresText.includes('10 درجات')) return '10';
        if (proceduresText.includes('خمس عشرة') || proceduresText.includes('15 درجة')) return '15';
        
        return '0';
    }

        violationDay: dayNames[today.getDay()]
    };
}

var _mhWitnessCount = 0;
function addMahdarWitness_() {
    _mhWitnessCount++;
    var c = document.getElementById('mh_witnesses');
    var div = document.createElement('div');
    div.style.cssText = 'display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-bottom:6px;align-items:center';
    div.innerHTML = '<select id="mh_wt_'+_mhWitnessCount+'" style="padding:8px;border:1.5px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit;background:#f4f5f9"><option value="إداري">إداري</option><option value="معلم">معلم</option><option value="طالب">طالب</option></select>'

    c.appendChild(div);

function submitMahdar_() {
    var student = _getPickedStudent(); if (!student) return;
    var obs = [];
    for(var i=0;i<5;i++){ var cb=document.getElementById('mh_obs_'+i); if(cb&&cb.checked) obs.push(cb.value==='أخرى'?document.getElementById('mh_obs_other').value:cb.value); }
    var witnesses = [];
    for(var j=1;j<=_mhWitnessCount;j++){
        var n=document.getElementById('mh_wn_'+j), t=document.getElementById('mh_wt_'+j);
        if(n&&n.value.trim()) witnesses.push({name:n.value.trim(),role:t.value});
    }
    var d = Object.assign({}, student, {
        violationText: document.getElementById('mh_problem').value,
        mahdarLocation: document.getElementById('mh_location').value,
        mahdarObservations: obs,
        mahdarWitnesses: witnesses
    });
    _mhWitnessCount = 0;
    _printAndClose('mahdar_dab_wakea', d, 'mahdar-overlay');
}

    + '<button onclick="msAddDamage(\'phys\')" style="margin-top:4px;padding:4px 12px;border:1px dashed #d1d5db;border-radius:8px;background:white;font-size:11px;cursor:pointer;font-family:inherit">+ إضافة</button></div>'
    + '<div><label style="font-size:12px;font-weight:700;color:#1a1d2e;margin-bottom:4px;display:block">الأضرار المادية</label><div id="ms_mat"></div>'
    + '<button onclick="msAddDamage(\'mat\')" style="margin-top:4px;padding:4px 12px;border:1px dashed #d1d5db;border-radius:8px;background:white;font-size:11px;cursor:pointer;font-family:inherit">+ إضافة</button></div>'
    // محرر المحضر
    + '<div><label style="font-size:12px;font-weight:700;color:#1a1d2e;margin-bottom:4px;display:block">محرر/محررو المحضر</label><div id="ms_authors"></div>'
    + '<button onclick="msAddAuthor()" style="margin-top:4px;padding:4px 12px;border:1px dashed #6366f1;border-radius:8px;background:white;color:#4f46e5;font-size:11px;cursor:pointer;font-family:inherit">+ إضافة محرر</button></div>'
    + _btnPrint('طباعة المحضر','submitMashajara_()')
    + '</div></div>';
    document.body.appendChild(ov);
    document.getElementById('ms_day').value = _dayName();
    document.getElementById('ms_date').value = _todayStr();
    document.getElementById('ms_date').addEventListener('change',function(){ document.getElementById('ms_date_hijri').textContent=_hijriFromInput('ms_date')+' هـ'; document.getElementById('ms_day').value=_dayName(new Date(this.value)); });
    document.getElementById('ms_date_hijri').textContent = _hijriDate()+' هـ';
    // تعبئة قائمة الصفوف
    var gradeSelect = document.getElementById('ms_grade');
    var grades = [...new Set(APP_DATA.students.filter(function(s){return s['المرحلة']===currentStage;}).map(function(s){return s['الصف'];}))];
    grades.sort(function(a,b){return a.localeCompare(b,'ar');});
    grades.forEach(function(g){ gradeSelect.add(new Option(g,g)); });
    // إضافة ضرر أول + محرر أول
    msAddDamage('phys'); msAddDamage('mat'); msAddAuthor();
    // بناء قائمة المسؤوليات
    window._msRoles = [];
    if(APP_DATA.settings){
        if(APP_DATA.settings.deputies) APP_DATA.settings.deputies.forEach(function(d){window._msRoles.push({name:d.name,role:d.role||'وكيل'});});
        if(APP_DATA.settings.counselors) APP_DATA.settings.counselors.forEach(function(c){window._msRoles.push({name:c.name,role:c.role||'موجه'});});
    }
    window._msStudents = [];
}
function msMPopClasses() {
    var g=document.getElementById('ms_grade').value, cs=document.getElementById('ms_class'), ss=document.getElementById('ms_student');
    cs.innerHTML='<option value="">الفصل</option>'; ss.innerHTML='<option value="">الطالب</option>'; cs.disabled=!g; ss.disabled=true;
    if(g){var classes=[...new Set(APP_DATA.students.filter(function(s){return s['المرحلة']===currentStage&&s['الصف']===g;}).map(function(s){return s['الفصل'];}))];classes.sort();classes.forEach(function(c){cs.add(new Option(c,c));});}
}
function msMPopStudents() {
    var g=document.getElementById('ms_grade').value,c=document.getElementById('ms_class').value,ss=document.getElementById('ms_student');
    ss.innerHTML='<option value="">الطالب</option>'; ss.disabled=!c;
    if(g&&c){var studs=APP_DATA.students.filter(function(s){return s['المرحلة']===currentStage&&s['الصف']===g&&s['الفصل']==c;});studs.sort(function(a,b){return a['اسم الطالب'].localeCompare(b['اسم الطالب'],'ar');});studs.forEach(function(s){var o=new Option(s['اسم الطالب'],s['رقم الطالب']);o.dataset.name=s['اسم الطالب'];o.dataset.grade=g+'/'+c;ss.add(o);});}
}
function msAddStudent() {
    var ss=document.getElementById('ms_student'); if(!ss.value) return;
    var opt=ss.options[ss.selectedIndex], name=opt.dataset.name, grade=opt.dataset.grade;
    if(window._msStudents.find(function(s){return s.id===ss.value;})) { showEnhancedToast('warning','الطالب مضاف مسبقاً'); return; }
    if(window._msStudents.length>=12) { showEnhancedToast('warning','الحد الأقصى ١٢ طالب'); return; }
    window._msStudents.push({id:ss.value, name:name, grade:grade});
    msRenderStudents();
}
function msRenderStudents() {
    var c=document.getElementById('ms_students_list'), ini=document.getElementById('ms_initiator');
    c.innerHTML=''; ini.innerHTML='<option value="">اختر المبادر</option>';
    window._msStudents.forEach(function(s,i){
        c.innerHTML += '<div style="display:flex;align-items:center;gap:6px;padding:4px 8px;background:white;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:4px;font-size:12px">'
        +'<span style="font-weight:700;color:#4f46e5">'+(i+1)+'</span> '+escapeHtml(s.name)+' <span style="color:#6b7280">('+escapeHtml(s.grade)+')</span>'
        +'<button onclick="msRemoveStudent('+i+')" style="margin-right:auto;background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">✕</button></div>';
        ini.add(new Option(s.name, s.name));
    });
}
function msRemoveStudent(idx) { window._msStudents.splice(idx,1); msRenderStudents(); }
var _msDmgCount={phys:0,mat:0};
function msAddDamage(type) {
    _msDmgCount[type]++;
    var c=document.getElementById('ms_'+type);
    var div=document.createElement('div'); div.style.cssText='margin-bottom:4px';
    div.innerHTML='<input type="text" id="ms_'+type+'_'+_msDmgCount[type]+'" placeholder="'+(type==='phys'?'ضرر جسدي...':'ضرر مادي...')+'" style="width:100%;padding:8px;border:1.5px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit;background:#f4f5f9;box-sizing:border-box">';
    c.appendChild(div);
}
var _msAuthorCount=0;
function msAddAuthor() {
    _msAuthorCount++;
    var c=document.getElementById('ms_authors');
    var div=document.createElement('div'); div.style.cssText='display:grid;grid-template-columns:1fr 2fr;gap:8px;margin-bottom:6px';
    var roleOpts='<option value="">الصفة</option>'
    +'<option value="مدير المدرسة">مدير المدرسة</option>'
    +'<option value="وكيل الشؤون التعليمية">وكيل الشؤون التعليمية</option>'
    +'<option value="وكيل شؤون الطلاب">وكيل شؤون الطلاب</option>'
    +'<option value="الموجه الطلابي">الموجه الطلابي</option>'
    +'<option value="المعلم">المعلم</option>'
    +'<option value="الإداري">الإداري</option>'
    +'<option value="custom">إدخال يدوي</option>';
    div.innerHTML='<select id="ms_ar_'+_msAuthorCount+'" onchange="msAuthorChange('+_msAuthorCount+')" style="padding:8px;border:1.5px solid #d1d5db;border-radius:10px;font-size:12px;font-family:inherit;background:white">'+roleOpts+'</select>'
    +'<input type="text" id="ms_an_'+_msAuthorCount+'" placeholder="الاسم" style="padding:8px;border:1.5px solid #d1d5db;border-radius:10px;font-size:13px;font-family:inherit;background:#f4f5f9">';
    c.appendChild(div);
}
function msAuthorChange(idx) {
    var sel=document.getElementById('ms_ar_'+idx), inp=document.getElementById('ms_an_'+idx);
    if(sel.value==='custom'){ inp.value=''; inp.placeholder='الاسم والصفة'; inp.focus(); }
    else { inp.value=''; inp.placeholder='الاسم'; inp.focus(); }
}
function submitMashajara_() {
    if(window._msStudents.length<2){ showEnhancedToast('warning','يجب إضافة طالبين على الأقل'); return; }
    var physDmg=[], matDmg=[];
    for(var i=1;i<=_msDmgCount.phys;i++){var v=document.getElementById('ms_phys_'+i);if(v&&v.value.trim())physDmg.push(v.value.trim());}
    for(var j=1;j<=_msDmgCount.mat;j++){var v2=document.getElementById('ms_mat_'+j);if(v2&&v2.value.trim())matDmg.push(v2.value.trim());}
    var authors=[];
    for(var k=1;k<=_msAuthorCount;k++){
        var sel=document.getElementById('ms_ar_'+k), nm=document.getElementById('ms_an_'+k);
        if(nm&&nm.value.trim()){
            var role=(sel.value && sel.value!=='custom')?sel.value:'';
            authors.push({name:nm.value.trim(),role:role});
        }
    }
    var d = {
        day: document.getElementById('ms_day').value,
        date: _hijriFromInput('ms_date'),
        time: document.getElementById('ms_time').value,
        location: document.getElementById('ms_location').value,
        students: window._msStudents.map(function(s){return {name:s.name,grade:s.grade};}),
        initiator: document.getElementById('ms_initiator').value,
        description: document.getElementById('ms_desc').value,
        physicalDamage: physDmg,
        materialDamage: matDmg,
        authors: authors,
        authorName: authors.length>0?authors[0].name:'',
        authorRole: authors.length>0?authors[0].role:''
    };
    // تنظيف
    window._msStudents=[]; _msDmgCount={phys:0,mat:0}; _msAuthorCount=0;
    _printAndClose('mashajara', d, 'mashajara-overlay');
}

// =================================================================
// ★ منبثقة ١٧: سجل متابعة ورصد مخالفات (للمعلم)
// =================================================================
function showRasdMoalemModal_(baseData) {
    var ov = _createOverlay('rasd-moalem-overlay');
    ov.innerHTML = '<div style="background:white;border-radius:16px;width:560px;max-width:95vw;box-shadow:0 25px 50px rgba(0,0,0,.25);overflow:hidden;direction:rtl;font-family:inherit;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">'
    + _modalHeader('سجل متابعة ورصد مخالفات (للمعلم)', 'النموذج ١٧', 'person_book', '#7c3aed,#8b5cf6', 'rasd-moalem-overlay')
    + '<div style="padding:20px;display:flex;flex-direction:column;gap:12px">'
    // خيار الطباعة: فارغ أو مملوء
    + '<div style="display:flex;gap:10px;margin-bottom:4px">'
    + '<label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #e5e7eb;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700" id="rasd_opt_blank_label">'
    + '<input type="radio" name="rasd_mode" value="blank" id="rasd_opt_blank" checked onchange="rasdToggleMode()" style="accent-color:#7c3aed"> طباعة فارغ'
    + '</label>'
    + '<label style="flex:1;display:flex;align-items:center;gap:8px;padding:12px;border:2px solid #e5e7eb;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700" id="rasd_opt_filled_label">'
    + '<input type="radio" name="rasd_mode" value="filled" id="rasd_opt_filled" onchange="rasdToggleMode()" style="accent-color:#7c3aed"> طباعة مملوء'
    + '</label>'
    + '</div>'
    // بيانات المعلم (تظهر في كلا الوضعين)
    + '<div style="border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb">'
    + '<label style="font-size:12px;font-weight:700;color:#1a1d2e;margin-bottom:8px;display:block">بيانات المعلم (اختياري في الوضع الفارغ)</label>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">'
    + _field('اسم المعلم','rasd_teacher_name','text',{ph:'اسم المعلم'})
    + _field('المادة','rasd_subject_name','text',{ph:'الرياضيات، العلوم...'})
    + _field('الصف','rasd_grade_name','text',{ph:'ثاني / أ'})
    + '</div></div>'
    // قسم المخالفات (يظهر فقط في الوضع المملوء)
    + '<div id="rasd_violations_section" style="display:none">'
    + '<div style="border:1.5px solid #e5e7eb;border-radius:12px;padding:12px;background:#f9fafb">'
    + '<label style="font-size:12px;font-weight:700;color:#1a1d2e;margin-bottom:8px;display:block">المخالفات المسجلة (حتى ١٢ سطر)</label>'
    + '<div id="rasd_viols_list"></div>'
    + '<button onclick="rasdAddViol()" style="margin-top:6px;padding:6px 14px;border:1.5px dashed #7c3aed;border-radius:10px;background:white;color:#6d28d9;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">+ إضافة مخالفة</button>'
    + '</div></div>'
    + _btnPrint('طباعة النموذج','submitRasdMoalem_()')
    + '</div></div>';
    document.body.appendChild(ov);
    // تطبيق التنسيق المبدئي (تمييز خيار "فارغ")
    rasdToggleMode();
    // إضافة 3 صفوف مخالفات افتراضية
    window._rasdViolCount = 0;
    rasdAddViol(); rasdAddViol(); rasdAddViol();
}

function rasdToggleMode() {
    var filled = document.getElementById('rasd_opt_filled').checked;
    var section = document.getElementById('rasd_violations_section');
    var blankLbl = document.getElementById('rasd_opt_blank_label');
    var filledLbl = document.getElementById('rasd_opt_filled_label');
    section.style.display = filled ? 'block' : 'none';
    blankLbl.style.borderColor = filled ? '#e5e7eb' : '#7c3aed';
    blankLbl.style.background = filled ? 'white' : '#f5f3ff';
    filledLbl.style.borderColor = filled ? '#7c3aed' : '#e5e7eb';
    filledLbl.style.background = filled ? '#f5f3ff' : 'white';
}

window._rasdViolCount = 0;
function rasdAddViol() {
    var existingRows = document.getElementById('rasd_viols_list') ? document.getElementById('rasd_viols_list').children.length : 0;
    if (existingRows >= 12) { showEnhancedToast('warning', 'الحد الأقصى ١٢ مخالفة'); return; }
    window._rasdViolCount++;
    var idx = window._rasdViolCount;
    var c = document.getElementById('rasd_viols_list');
    var div = document.createElement('div');
    div.id = 'rasd_vrow_' + idx;
    div.style.cssText = 'display:grid;grid-template-columns:auto 2fr 2fr 2fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center';
    div.innerHTML = '<span style="font-size:12px;font-weight:700;color:#6d28d9;min-width:18px;text-align:center">' + idx + '</span>'
        + '<input type="text" id="rasd_v_name_' + idx + '" placeholder="اسم الطالب" style="padding:7px 8px;border:1.5px solid #d1d5db;border-radius:8px;font-size:12px;font-family:inherit;background:#fff;min-width:0">'
        + '<input type="text" id="rasd_v_viol_' + idx + '" placeholder="المخالفة" style="padding:7px 8px;border:1.5px solid #d1d5db;border-radius:8px;font-size:12px;font-family:inherit;background:#fff;min-width:0">'
        + '<input type="text" id="rasd_v_action_' + idx + '" placeholder="الإجراء المتخذ" style="padding:7px 8px;border:1.5px solid #d1d5db;border-radius:8px;font-size:12px;font-family:inherit;background:#fff;min-width:0">'
        + '<input type="text" id="rasd_v_date_' + idx + '" placeholder="التاريخ" style="padding:7px 8px;border:1.5px solid #d1d5db;border-radius:8px;font-size:12px;font-family:inherit;background:#fff;min-width:0">'
        + '<button onclick="rasdRemoveViol(' + idx + ')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:2px">✕</button>';
    c.appendChild(div);
}

function rasdRemoveViol(idx) {
    var row = document.getElementById('rasd_vrow_' + idx);
    if (row) row.remove();
}

function submitRasdMoalem_() {
    var isFilled = document.getElementById('rasd_opt_filled').checked;
    var teacher = (document.getElementById('rasd_teacher_name').value || '').trim();
    var subject = (document.getElementById('rasd_subject_name').value || '').trim();
    var grade = (document.getElementById('rasd_grade_name').value || '').trim();

    var d = {
        teacherName: teacher,
        subject: subject,
        grade: grade
    };

    if (isFilled) {
        var violations = [];
        for (var i = 1; i <= window._rasdViolCount; i++) {
            var nameEl = document.getElementById('rasd_v_name_' + i);
            if (!nameEl) continue; // تم حذف هذا الصف
            var vName = (nameEl.value || '').trim();
            var vViol = (document.getElementById('rasd_v_viol_' + i).value || '').trim();
            var vAction = (document.getElementById('rasd_v_action_' + i).value || '').trim();
            var vDate = (document.getElementById('rasd_v_date_' + i).value || '').trim();
            if (vName || vViol) {
                violations.push({
                    studentName: vName,
                    violation: vViol,
                    action: vAction,
                    date: vDate
                });
            }
        }
        if (violations.length > 0) {
            d.violations = violations;
        }
    }

    // تنظيف
    window._rasdViolCount = 0;
    _printAndClose('rasd_moalem', d, 'rasd-moalem-overlay');
}

</script>
